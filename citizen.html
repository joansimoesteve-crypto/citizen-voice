<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice · Open Data</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-[#EEF2F5] min-h-screen flex justify-center">

<div class="w-full max-w-md bg-white min-h-screen shadow-2xl overflow-hidden rounded-[35px]">

<!-- HEADER -->

<div class="bg-gradient-to-br from-slate-700 to-slate-500 text-white p-6 rounded-b-[35px]">

<div class="text-3xl font-bold">
Citizen Voice
</div>

<div class="text-sm opacity-90 mt-1">
Panel Ciudadano · Transparencia Urbana
</div>

</div>

<!-- KPIS -->

<div class="p-4 flex flex-col gap-3">

<!-- KPI TOTAL -->

<div class="bg-gradient-to-r from-blue-500 to-blue-400 text-white p-5 rounded-[28px] shadow">

<div class="text-xs opacity-80">
Incidencias registradas
</div>

<div id="totalIncidencias"
class="text-4xl font-bold mt-1">
0
</div>

</div>

<!-- KPI TIEMPO -->

<div class="bg-gradient-to-r from-emerald-500 to-green-400 text-white p-5 rounded-[28px] shadow">

<div class="text-xs opacity-80">
Tiempo medio de resolución
</div>

<div id="avgTime"
class="text-3xl font-bold mt-1">
0 días
</div>

</div>

</div>

<!-- VALORACIONES -->

<div class="px-4 pb-3">

<div class="text-sm font-semibold text-slate-700 mb-3">
Valoración ciudadana por áreas
</div>

<div id="ratings"
class="flex flex-col gap-3">
</div>

</div>

<!-- MAPA -->

<div class="px-4 pb-4">

<div class="text-sm font-semibold text-slate-700 mb-3">
Mapa de incidencias
</div>

<div id="map"
class="w-full h-[320px] rounded-[30px] overflow-hidden shadow">
</div>

</div>

<!-- ULTIMAS -->

<div class="px-4 pb-10">

<div class="text-sm font-semibold text-slate-700 mb-3">
Últimas incidencias
</div>

<div id="latest"
class="flex flex-col gap-3">
</div>

</div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

let allData = []

/* ===================== */
/* MAP */
/* ===================== */

const map = L.map('map')
.setView([39.47,-0.37],11)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

/* ===================== */
/* LOAD */
/* ===================== */

loadData()

async function loadData(){

const { data, error } = await supabaseClient
.from("incidencias")
.select("*")

console.log(data)
console.log(error)

allData = data || []

render()

}

/* ===================== */
/* DAYS */
/* ===================== */

function daysAgo(date){

if(!date) return 0

const now = new Date()

const created = new Date(date)

const diff =
now.getTime() - created.getTime()

return Math.floor(
diff / (1000 * 60 * 60 * 24)
)

}

/* ===================== */
/* RENDER */
/* ===================== */

function render(){

/* KPI TOTAL */

document.getElementById("totalIncidencias")
.innerText = allData.length

/* KPI TIEMPO */

const resolved =
allData.filter(i =>
i.estado === "resuelto"
)

let avg = 0

if(resolved.length > 0){

avg =
resolved.reduce((acc,i)=>{

return acc + daysAgo(i.created_at)

},0) / resolved.length

}

document.getElementById("avgTime")
.innerText =
Math.round(avg) + " días"

/* ===================== */
/* VALORACIONES */
/* ===================== */

const areas = [
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad"
]

const ratings =
document.getElementById("ratings")

ratings.innerHTML = ""

areas.forEach(area=>{

const records =
allData.filter(i =>
i.area === area
)

let score = 5

if(records.length > 5) score = 4
if(records.length > 10) score = 3
if(records.length > 20) score = 2
if(records.length > 30) score = 1

const card =
document.createElement("div")

card.className =
"bg-white shadow rounded-[24px] p-4 border"

card.innerHTML = `

<div class="flex justify-between">

<div class="font-semibold text-sm text-slate-700">
${area}
</div>

<div class="text-blue-500 font-bold">
${score}/5
</div>

</div>

<div class="w-full bg-slate-200 h-3 rounded-full mt-3 overflow-hidden">

<div
class="bg-gradient-to-r from-blue-400 to-emerald-400 h-3 rounded-full"
style="width:${score*20}%">
</div>

</div>

`

ratings.appendChild(card)

})

/* ===================== */
/* MAPA */
/* ===================== */

map.eachLayer(layer=>{

if(layer instanceof L.Marker){

map.removeLayer(layer)

}

})

allData.forEach(i=>{

if(i.lat && i.lng){

const color =
i.estado === "resuelto"
? "green"
: "blue"

const marker =
L.circleMarker(
[i.lat, i.lng],
{
radius:8,
color:color,
fillOpacity:0.7
}
)
.addTo(map)

marker.bindPopup(`

<b>${i.area}</b><br>
${i.resumen}<br>
Estado: ${i.estado}

`)

}

})

/* ===================== */
/* LATEST */
/* ===================== */

const latest =
document.getElementById("latest")

latest.innerHTML = ""

allData
.slice(0,5)
.forEach(i=>{

const card =
document.createElement("div")

card.className =
"bg-[#F4F7FA] rounded-[26px] p-4 shadow"

let estadoColor = "#3b82f6"

if(i.estado==="resuelto")
estadoColor = "#22c55e"

if(i.estado==="pendiente")
estadoColor = "#f59e0b"

card.innerHTML = `

<div class="flex justify-between items-start">

<div class="text-xs text-slate-500">
${i.area || ""}
</div>

<div
class="text-[10px] font-bold"
style="color:${estadoColor}">
${i.estado || "pendiente"}
</div>

</div>

<div class="font-semibold text-sm mt-1">
${i.resumen || ""}
</div>

<div class="text-xs text-slate-500 mt-2">
Hace ${daysAgo(i.created_at)} días
</div>

`

latest.appendChild(card)

})

}

</script>

</body>

</html>
