<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice - Técnico</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-100 flex justify-center min-h-screen">

<div class="w-full max-w-md h-screen bg-white flex flex-col shadow-xl">

<!-- HEADER -->
<div class="bg-[#2F4A6D] text-white p-4 text-center">
  <div class="text-xl font-bold">Citizen Voice</div>
  <div class="text-xs opacity-90">Panel Técnico Municipal</div>
</div>

<!-- CONTROLES -->
<div class="p-3 border-b bg-white">

<select id="areaSelect" class="w-full border p-2 rounded-xl text-sm mb-2">
  <option value="">Todas las áreas</option>
  <option>Movilidad</option>
  <option>Limpieza</option>
  <option>Urbanismo</option>
  <option>Cultura</option>
  <option>Seguridad</option>
  <option>Otros</option>
</select>

<div class="flex gap-2 mb-2">
  <button onclick="setFilter('all')" class="flex-1 bg-slate-200 p-2 rounded-xl text-sm">Todas</button>
  <button onclick="setFilter('active')" class="flex-1 bg-slate-200 p-2 rounded-xl text-sm">Activas</button>
  <button onclick="setFilter('improve')" class="flex-1 bg-slate-200 p-2 rounded-xl text-sm">Mejoras</button>
</div>

<div id="stats" class="text-xs text-slate-600"></div>

</div>

<!-- LISTA -->
<div id="list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* STATE */
/* ===================== */

let allData = []
let currentFilter = "all"
let currentArea = ""

/* ===================== */
/* INIT */
/* ===================== */

document.getElementById("areaSelect").addEventListener("change", e=>{
currentArea = e.target.value
loadData(currentArea)
})

setTimeout(()=>{
loadData("")   // 🔥 carga inicial automática
},200)

/* ===================== */
/* FILTERS */
/* ===================== */

function setFilter(type){
currentFilter = type
render()
}

/* ===================== */
/* LOAD DATA */
/* ===================== */

async function loadData(area){

let query = supabaseClient
.from("incidencias")
.select("*")
.order("created_at", { ascending: false })

if(area){
query = query.eq("area", area)
}

const { data } = await query

allData = data || []

render()

}

/* ===================== */
/* RENDER */
/* ===================== */

function render(){

let data = [...allData]

/* FILTRO ACTIVAS */
if(currentFilter === "active"){
data = data.filter(i =>
i.estado !== "resuelto" && i.estado !== "desestimado"
)
}

/* FILTRO MEJORAS */
if(currentFilter === "improve"){
data = data.filter(i =>
i.tipo === "Propuesta de mejora"
)
}

/* STATS */
const total = allData.length

const activas = allData.filter(i =>
i.estado !== "resuelto" && i.estado !== "desestimado"
).length

const mejoras = allData.filter(i =>
i.tipo === "Propuesta de mejora"
).length

document.getElementById("stats").innerHTML = `
Total: <b>${total}</b> |
Activas: <b>${activas}</b> |
Mejoras: <b>${mejoras}</b>
`

/* LISTA */
const list = document.getElementById("list")
list.innerHTML = ""

data.forEach(i=>{

const card = document.createElement("div")

card.className =
"bg-[#EAF0F6] rounded-2xl p-3 shadow flex flex-col gap-1"

if(i.tipo === "Propuesta de mejora"){
card.style.borderLeft = "4px solid #22c55e"
}

card.innerHTML = `
<div class="text-xs text-slate-500">${i.area || ""}</div>

<div class="font-semibold text-sm">
${i.resumen || ""}
</div>

<div class="text-xs text-slate-600 mt-1">
${(i.acciones || []).join(" · ")}
</div>

<div class="text-[10px] mt-1 opacity-70">
Estado: ${i.estado || "pendiente"}
</div>
`

list.appendChild(card)

})

}

</script>

</body>

</html>
