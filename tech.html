<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice - Técnico</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-blue-50 flex justify-center min-h-screen">

<!-- APP -->
<div class="w-full max-w-md h-screen bg-white flex flex-col shadow-xl">

<!-- HEADER -->
<div class="bg-blue-700 text-white p-4 text-center">
  <div class="text-xl font-bold">Citizen Voice</div>
  <div class="text-xs opacity-90">Panel Técnico Municipal</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- ACCIONES -->
<div id="actions" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* UI CHAT */
/* ===================== */

const chat = document.getElementById("chat")
const actions = document.getElementById("actions")

function addBot(text){

const row = document.createElement("div")
row.className = "flex"

const bubble = document.createElement("div")
bubble.className = "bg-blue-100 text-sm p-3 rounded-2xl max-w-[85%]"
bubble.innerText = text

row.appendChild(bubble)
chat.appendChild(row)

scroll()

}

function addUser(text){

const row = document.createElement("div")
row.className = "flex justify-end"

const bubble = document.createElement("div")
bubble.className = "bg-blue-600 text-white text-sm p-3 rounded-2xl max-w-[85%]"
bubble.innerText = text

row.appendChild(bubble)
chat.appendChild(row)

scroll()

}

function scroll(){
setTimeout(()=>{
chat.scrollTop = chat.scrollHeight
},100)
}

/* ===================== */
/* BOTONES ACCIÓN */
/* ===================== */

function showActions(list, callback){

actions.innerHTML = ""

list.forEach(a=>{

const b = document.createElement("button")

b.className = "bg-blue-100 hover:bg-blue-200 text-sm px-3 py-2 rounded-xl transition"

b.innerText = a

b.onclick = ()=>{

addUser(a)
actions.innerHTML = ""
callback(a)

}

actions.appendChild(b)

})

}

/* ===================== */
/* CARGA INCIDENCIAS */
/* ===================== */

let incidencias = []
let current = 0

async function load(){

const { data } = await supabaseClient
.from("incidencias")
.select("*")
.order("created_at", { ascending: false })

incidencias = data || []

if(incidencias.length === 0){
addBot("No hay incidencias registradas.")
return
}

showIncident()

}

/* ===================== */
/* MOSTRAR INCIDENCIA */
/* ===================== */

function showIncident(){

const i = incidencias[current]

addBot("📍 Nueva incidencia detectada")

addBot("Área: " + i.area)
addBot("Resumen: " + i.resumen)

addBot("Acciones sugeridas:")

if(i.acciones){

i.acciones.forEach(a=>{
addBot("• " + a)
})

}

/* ACCIONES TECNICO */

showActions(
[
"✔ Marcar en curso",
"✔ Resuelto",
"⚠ Desestimar",
"📝 Añadir comentario"
],
handleAction
)

}

/* ===================== */
/* ACCIONES TECNICAS */
/* ===================== */

async function handleAction(action){

const i = incidencias[current]

if(action === "✔ Marcar en curso"){

await updateState(i.id, "en_curso")
addBot("Estado actualizado: EN CURSO")

}

if(action === "✔ Resuelto"){

await updateState(i.id, "resuelto")
addBot("Estado actualizado: RESUELTO")

}

if(action === "⚠ Desestimar"){

await updateState(i.id, "desestimado")
addBot("Incidencia desestimada")

}

if(action === "📝 Añadir comentario"){

const comment = prompt("Comentario técnico:")
if(comment){
await updateComment(i.id, comment)
addBot("Comentario guardado")
}

}

next()

}

/* ===================== */
/* SUPABASE UPDATE */
/* ===================== */

async function updateState(id, state){

await supabaseClient
.from("incidencias")
.update({ estado: state })
.eq("id", id)

}

async function updateComment(id, comment){

await supabaseClient
.from("incidencias")
.update({ comentario_tecnico: comment })
.eq("id", id)

}

/* ===================== */
/* SIGUIENTE */
/* ===================== */

function next(){

current++

if(current < incidencias.length){
setTimeout(showIncident, 600)
}else{
addBot("No hay más incidencias.")
}

}

/* ===================== */
/* INIT */
/* ===================== */

addBot("Bienvenido al panel técnico municipal.")
load()

</script>

</body>
</html>
