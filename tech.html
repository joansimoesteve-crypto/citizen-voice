<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice - Técnico</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-100 flex justify-center min-h-screen">

<div class="w-full max-w-md h-screen bg-white flex flex-col shadow-xl">

<!-- HEADER -->
<div class="bg-[#2F4A6D] text-white p-4 text-center">
  <div class="text-xl font-bold">Citizen Voice</div>
  <div class="text-xs opacity-90">Panel Técnico Municipal</div>
</div>

<!-- SELECTORES -->
<div class="p-3 border-b bg-white">

<!-- AREA -->
<select id="areaSelect" class="w-full border p-2 rounded-xl text-sm mb-2">
  <option value="">Selecciona área</option>
  <option>Movilidad</option>
  <option>Limpieza</option>
  <option>Urbanismo</option>
  <option>Cultura</option>
  <option>Seguridad</option>
  <option>Otros</option>
</select>

<!-- FILTRO -->
<div class="flex gap-2">
  <button onclick="setFilter('all')" class="flex-1 bg-slate-200 p-2 rounded-xl text-sm">Todas</button>
  <button onclick="setFilter('active')" class="flex-1 bg-slate-200 p-2 rounded-xl text-sm">Activas</button>
</div>

<div id="stats" class="text-xs mt-2 text-slate-600"></div>

</div>

<!-- LISTA -->
<div id="list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* STATE */
/* ===================== */

let allData = []
let filtered = []
let currentFilter = "all"

/* ===================== */
/* AREA CHANGE */
/* ===================== */

document.getElementById("areaSelect").addEventListener("change", e=>{
loadData(e.target.value)
})

function setFilter(type){
currentFilter = type
render()
}

/* ===================== */
/* LOAD SUPABASE */
/* ===================== */

async function loadData(area){

if(!area){
document.getElementById("list").innerHTML = ""
document.getElementById("stats").innerText = ""
return
}

const { data } = await supabaseClient
.from("incidencias")
.select("*")
.eq("area", area)
.order("created_at", { ascending: false })

allData = data || []

render()

}

/* ===================== */
/* RENDER */
/* ===================== */

function render(){

if(currentFilter === "active"){
filtered = allData.filter(i =>
i.estado !== "resuelto" && i.estado !== "desestimado"
)
}else{
filtered = allData
}

const list = document.getElementById("list")
const stats = document.getElementById("stats")

list.innerHTML = ""

stats.innerHTML = `
Total incidencias: <b>${allData.length}</b> |
Activas: <b>${allData.filter(i => i.estado !== "resuelto" && i.estado !== "desestimado").length}</b>
`

filtered.forEach(i=>{

const card = document.createElement("div")

card.className =
"bg-[#EAF0F6] rounded-2xl p-3 shadow flex flex-col gap-1"

card.innerHTML = `
<div class="text-xs text-slate-500">${i.area || ""}</div>

<div class="font-semibold text-sm">
${i.resumen || ""}
</div>

<div class="text-xs text-slate-600">
${(i.acciones || []).join(" · ")}
</div>

<div class="text-[10px] mt-1 opacity-70">
Estado: ${i.estado || "pendiente"}
</div>
`

list.appendChild(card)

})

}

/* INIT */
</script>

</body>

</html>
