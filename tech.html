<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Citizen Voice · Panel Técnico</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
background:
linear-gradient(
180deg,
#02120d 0%,
#05231c 45%,
#020f0b 100%
);
font-family:sans-serif;
}

/* CONTENEDOR PRINCIPAL CON SCROLL ESTILIZADO */
.main-container {
scroll-behavior: smooth;
}
.main-container::-webkit-scrollbar {
width: 4px;
}
.main-container::-webkit-scrollbar-thumb {
background: #1e3a8a;
border-radius: 20px;
}

/* HERO OPERATIVO COMPACTO - CONFIGURADO EN AZUL OSCURO */
.hero{
position:relative;
height:150px;
overflow:hidden;
background:
radial-gradient(circle at top,#1e3a8a 0%,#0f172a 60%,#02120d 100%);
}

.glow{
position:absolute;
width:180px;
height:180px;
background:rgba(30,58,138,.35);
filter:blur(50px);
border-radius:9999px;
top:-40px;
left:50%;
transform:translateX(-50%);
}

.avatar-wrapper{
position:absolute;
left:50%;
top:38%;
transform:translate(-50%,-50%);
z-index:10;
}

.avatar-ring{
position:absolute;
inset:-5px;
border-radius:9999px;
border:2px solid rgba(30,58,138,1);
box-shadow: 0 0 15px rgba(30,58,138,.6);
}

.avatar{
width:55px;
height:55px;
border-radius:9999px;
overflow:hidden;
border:2px solid rgba(255,255,255,.15);
box-shadow:0 10px 25px rgba(0,0,0,.4);
background: #111827;
}

.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}

/* CRISTAL TRANSLÚCIDO (GLASSMORPHISM) */
.glass-card {
background: rgba(255, 255, 255, 0.05);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border: 1px solid rgba(255, 255, 255, 0.07);
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}

.glass-select {
background: rgba(15, 23, 42, 0.6);
border: 1px solid rgba(255, 255, 255, 0.08);
color: white;
outline: none;
cursor: pointer;
}
.glass-select option {
background: #091e19;
color: white;
}

/* MAPA INTEGRADO */
#map {
border: 1px solid rgba(255, 255, 255, 0.08);
background: #0f172a;
}

</style>
</head>

<body class="flex justify-center items-center min-h-[100dvh] p-2">

<div class="w-full max-w-md h-[96dvh] rounded-[34px] overflow-hidden border border-white/10 bg-black/20 backdrop-blur-xl shadow-2xl flex flex-col">

<div class="hero flex-shrink-0 border-b border-white/5">
<div class="glow"></div>

<button id="fullscreen-btn" class="absolute top-4 right-4 z-30 bg-black/30 p-2.5 rounded-xl border border-white/10 text-white backdrop-blur-md transition-all hover:bg-black/50" title="Alternar pantalla completa">
