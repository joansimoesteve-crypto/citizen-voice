<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice - Técnico</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-100 flex justify-center min-h-screen">

<div class="w-full max-w-md h-screen bg-white flex flex-col shadow-xl">

<!-- HEADER -->
<div class="bg-[#2F4A6D] text-white p-4 text-center">
  <div class="text-xl font-bold">Citizen Voice</div>
  <div class="text-xs opacity-90">Panel Técnico Municipal</div>
</div>

<!-- FILTROS -->
<div class="p-3 border-b bg-white">

<!-- AREA -->
<select id="areaSelect" class="w-full border p-2 rounded-xl text-sm mb-2">
  <option value="">Todas las áreas</option>
  <option>Movilidad</option>
  <option>Limpieza</option>
  <option>Urbanismo</option>
  <option>Cultura</option>
  <option>Seguridad</option>
  <option>Otros</option>
</select>

<!-- ESTADO -->
<select id="estadoSelect" class="w-full border p-2 rounded-xl text-sm">
  <option value="">Todos los estados</option>
  <option value="pendiente">Pendiente</option>
  <option value="en_curso">En curso</option>
  <option value="resuelto">Resuelto</option>
  <option value="desestimado">Desestimado</option>
</select>

<div id="stats" class="text-xs text-slate-600 mt-2"></div>

</div>

<!-- LISTA -->
<div id="list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* STATE */
/* ===================== */

let allData = []
let areaFilter = ""
let estadoFilter = ""

/* ===================== */
/* INIT */
/* ===================== */

document.getElementById("areaSelect").addEventListener("change", e=>{
areaFilter = e.target.value
loadData()
})

document.getElementById("estadoSelect").addEventListener("change", e=>{
estadoFilter = e.target.value
render()
})

setTimeout(()=>{
loadData()
},200)

/* ===================== */
/* LOAD (TODO SUPABASE) */
/* ===================== */

async function loadData(){

let query = supabaseClient
.from("incidencias")
.select("*")
.order("created_at", { ascending: false })

if(areaFilter){
query = query.eq("area", areaFilter)
}

const { data } = await query

allData = (data || []).map(i => ({
  ...i,
  estado: i.estado || "pendiente"
}))

render()

}

/* ===================== */
/* UPDATE ESTADO */
/* ===================== */

async function updateEstado(id, newState){

await supabaseClient
.from("incidencias")
.update({ estado: newState })
.eq("id", id)

loadData()

}

/* ===================== */
/* RENDER */
/* ===================== */

function render(){

let data = [...allData]

/* filtro estado */
if(estadoFilter){
data = data.filter(i => i.estado === estadoFilter)
}

/* stats */
const total = allData.length
const pendientes = allData.filter(i => i.estado === "pendiente").length
const enCurso = allData.filter(i => i.estado === "en_curso").length
const resueltas = allData.filter(i => i.estado === "resuelto").length

document.getElementById("stats").innerHTML = `
Total: <b>${total}</b> |
Pendientes: <b>${pendientes}</b> |
En curso: <b>${enCurso}</b> |
Resueltas: <b>${resueltas}</b>
`

/* list */
const list = document.getElementById("list")
list.innerHTML = ""

data.forEach(i=>{

const card = document.createElement("div")

card.className =
"bg-[#EAF0F6] rounded-2xl p-3 shadow flex flex-col gap-2"

card.innerHTML = `
<div class="text-xs text-slate-500">${i.area || ""}</div>

<div class="font-semibold text-sm">
${i.resumen || ""}
</div>

<div class="text-xs text-slate-600">
${(i.acciones || []).join(" · ")}
</div>

<select onchange="updateEstado('${i.id}', this.value)"
class="mt-2 p-2 rounded-xl border text-sm">

<option value="pendiente" ${i.estado==="pendiente"?"selected":""}>Pendiente</option>
<option value="en_curso" ${i.estado==="en_curso"?"selected":""}>En curso</option>
<option value="resuelto" ${i.estado==="resuelto"?"selected":""}>Resuelto</option>
<option value="desestimado" ${i.estado==="desestimado"?"selected":""}>Desestimado</option>

</select>
`

list.appendChild(card)

})

}

</script>

</body>

</html>
