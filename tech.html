<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice - Técnico</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-blue-50 flex justify-center min-h-screen">

<div class="w-full max-w-md h-screen bg-white flex flex-col overflow-hidden shadow-2xl rounded-[35px]">

<!-- HEADER -->
<div class="bg-[#3C5A78] text-white p-5 text-center rounded-b-[30px]">

<div class="text-2xl font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90 mt-1">
Panel Técnico Municipal
</div>

</div>

<!-- FILTROS -->
<div class="p-3 bg-white border-b flex flex-col gap-2">

<select id="areaSelect"
class="border p-3 rounded-2xl text-sm">

<option value="">Todas las áreas</option>

<option>Movilidad</option>
<option>Limpieza</option>
<option>Urbanismo</option>
<option>Cultura</option>
<option>Seguridad</option>
<option>Otros</option>

</select>

<select id="estadoSelect"
class="border p-3 rounded-2xl text-sm">

<option value="">Todos los estados</option>

<option value="pendiente">Pendiente</option>
<option value="en_curso">En curso</option>
<option value="resuelto">Resuelto</option>
<option value="desestimado">Desestimado</option>

</select>

<select id="fechaSelect"
class="border p-3 rounded-2xl text-sm">

<option value="">Todas las fechas</option>

<option value="1">Últimas 24h</option>
<option value="7">Últimos 7 días</option>
<option value="30">Últimos 30 días</option>

</select>

<div class="flex gap-2 mt-1">

<button id="cardsBtn"
class="flex-1 bg-[#DCE7F2] p-3 rounded-2xl text-sm font-semibold">
Etiquetas
</button>

<button id="mapBtn"
class="flex-1 bg-[#DCE7F2] p-3 rounded-2xl text-sm font-semibold">
Mapa
</button>

</div>

<div id="stats"
class="text-xs text-slate-600 mt-1">
</div>

</div>

<!-- LIST -->
<div id="list"
class="flex-1 overflow-y-auto p-3 flex flex-col gap-3">
</div>

<!-- MAP -->
<div id="mapContainer"
class="hidden flex-1">

<div id="map"
class="w-full h-full">
</div>

</div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* STATE */
/* ===================== */

let allData = []

let areaFilter = ""
let estadoFilter = ""
let fechaFilter = ""

let map
let markers = []

/* ===================== */
/* INIT */
/* ===================== */

document.getElementById("areaSelect")
.addEventListener("change", e => {

areaFilter = e.target.value
render()

})

document.getElementById("estadoSelect")
.addEventListener("change", e => {

estadoFilter = e.target.value
render()

})

document.getElementById("fechaSelect")
.addEventListener("change", e => {

fechaFilter = e.target.value
render()

})

document.getElementById("cardsBtn")
.onclick = () => {

document.getElementById("list")
.classList.remove("hidden")

document.getElementById("mapContainer")
.classList.add("hidden")

}

document.getElementById("mapBtn")
.onclick = () => {

document.getElementById("list")
.classList.add("hidden")

document.getElementById("mapContainer")
.classList.remove("hidden")

setTimeout(initMap, 200)

}

loadData()

/* ===================== */
/* LOAD DATA */
/* ===================== */

async function loadData(){

const { data, error } = await supabaseClient
.from("incidencias")
.select("*")
.order("created_at", { ascending:false })

console.log(data)
console.log(error)

if(error){

alert(error.message)
return

}

allData = data || []

render()

}

/* ===================== */
/* DAYS AGO */
/* ===================== */

function daysAgo(date){

if(!date) return "-"

const now = new Date()

const created = new Date(date)

const diff = now.getTime() - created.getTime()

return Math.floor(
diff / (1000 * 60 * 60 * 24)
)

}

/* ===================== */
/* UPDATE ESTADO */
/* ===================== */

async function updateEstado(id){

const estado =
document.getElementById("estado_"+id).value

const comentario =
document.getElementById("comment_"+id).value

const { data, error } = await supabaseClient
.from("incidencias")
.update({

estado: estado,
comentario_tecnico: comentario

})
.eq("id", id)
.select()

console.log("UPDATE:", data)
console.log("ERROR:", error)

if(error){

alert("Error actualizando")
return

}

alert("Estado actualizado")

/* 🔥 RECARGA REAL DESDE SUPABASE */
await loadData()

}

/* ===================== */
/* RENDER */
/* ===================== */

function render(){

let data = [...allData]

/* FILTRO AREA */

if(areaFilter){

data = data.filter(i =>
i.area === areaFilter
)

}

/* FILTRO ESTADO */

if(estadoFilter){

data = data.filter(i =>
i.estado === estadoFilter
)

}

/* FILTRO FECHA */

if(fechaFilter){

data = data.filter(i => {

if(!i.created_at) return false

const days =
daysAgo(i.created_at)

return days <= parseInt(fechaFilter)

})

}

/* STATS */

document.getElementById("stats")
.innerHTML = `
Total registros:
<b>${data.length}</b>
`

/* LIST */

const list =
document.getElementById("list")

list.innerHTML = ""

/* CLEAR MAP */

markers.forEach(m => {

map?.removeLayer(m)

})

markers = []

data.forEach(i => {

const card =
document.createElement("div")

card.className =
"bg-[#EEF4FA] p-4 rounded-[28px] shadow flex flex-col gap-2"

/* COLOR ESTADO */

let estadoColor = "#64748b"

if(i.estado==="pendiente")
estadoColor = "#f59e0b"

if(i.estado==="en_curso")
estadoColor = "#3b82f6"

if(i.estado==="resuelto")
estadoColor = "#22c55e"

if(i.estado==="desestimado")
estadoColor = "#ef4444"

/* FECHA REAL */

let fechaTexto = "-"

if(i.created_at){

fechaTexto =
new Date(i.created_at)
.toLocaleDateString("es-ES")

}

const days =
daysAgo(i.created_at)

card.innerHTML = `

<div class="flex justify-between items-start">

<div class="text-xs text-slate-500">
${i.area || ""}
</div>

<div class="text-[10px]"
style="color:${estadoColor}">
${i.estado || "pendiente"}
</div>

</div>

<div class="font-semibold text-sm">
${i.resumen || ""}
</div>

<div class="text-xs text-slate-600">
${(i.acciones || []).join(" · ")}
</div>

<div class="text-[11px] text-slate-500">

${fechaTexto}

· Hace ${days} días

</div>

<textarea
id="comment_${i.id}"
placeholder="Comentario técnico"
class="border p-3 rounded-2xl text-sm"
>${i.comentario_tecnico || ""}</textarea>

<select
id="estado_${i.id}"
class="border p-3 rounded-2xl text-sm">

<option value="pendiente"
${i.estado==="pendiente"?"selected":""}>
Pendiente
</option>

<option value="en_curso"
${i.estado==="en_curso"?"selected":""}>
En curso
</option>

<option value="resuelto"
${i.estado==="resuelto"?"selected":""}>
Resuelto
</option>

<option value="desestimado"
${i.estado==="desestimado"?"selected":""}>
Desestimado
</option>

</select>

<button
onclick="updateEstado('${i.id}')"
class="bg-[#3C5A78] text-white p-3 rounded-2xl text-sm font-semibold">

Actualizar estado

</button>

`

list.appendChild(card)

/* ===================== */
/* MAPA */
/* ===================== */

if(i.lat && i.lng && map){

const marker =
L.marker([i.lat, i.lng])
.addTo(map)

marker.bindPopup(`
<b>${i.area}</b><br>
${i.resumen}
`)

markers.push(marker)

}

})

}

/* ===================== */
/* MAP INIT */
/* ===================== */

function initMap(){

if(map){

map.invalidateSize()
return

}

map = L.map('map')
.setView([39.47,-0.37],11)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

render()

}

</script>

</body>

</html>
