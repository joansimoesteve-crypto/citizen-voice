<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER HUMANO -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4">

<div class="flex items-center gap-3">

<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow">
<svg width="26" height="26" viewBox="0 0 64 64">
<circle cx="32" cy="20" r="10" fill="#10b981"/>
<path d="M18 52c4-10 12-15 14-15s10 5 14 15" fill="#10b981"/>
</svg>
</div>

<div>
<div class="text-xl font-bold">Citizen Voice</div>
<div class="text-xs opacity-90">Asistente virtual ciudadano</div>
</div>

</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ================= SUPABASE ================= */
const { createClient } = supabase
const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let currentMap = null

/* ================= VOZ ================= */
function speak(text){
speechSynthesis.cancel()
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
msg.rate = 1
speechSynthesis.speak(msg)
}

/* ================= BOT HUMANO ================= */
function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2 opacity-0 animate-fade"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-emerald-600"

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[85%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight

setTimeout(()=> row.style.opacity = 1, 50)

speak(text)
}

/* ================= USER ================= */
function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ================= BOTONES ================= */
function buttons(list, callback){
controls.innerHTML = ""
list.forEach(o=>{
const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = o
b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}
controls.appendChild(b)
})
}

/* ================= PREGUNTA SEMANAL ================= */
function weeklyQuestion(){

bot("Antes de empezar, una pregunta rápida.")

bot("¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons(["1","2","3","4","5"], async (v)=>{

await supabaseClient.from("weekly_engagement").insert([{
week: 1,
question: "Espacios culturales infantiles",
answer: parseInt(v),
created_at: new Date().toISOString()
}])

bot("Perfecto. Vamos con tu incidencia.")

startFlow()

})
}

/* ================= FLUJO ================= */
function startFlow(){

bot("Dime qué quieres registrar.")

buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})

}

/* ================= AREA ================= */
function askArea(){
bot("¿En qué zona ocurre?")
buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
askRate()
})
}

/* ================= VALORACIÓN ================= */
function askRate(){
bot("¿Cómo lo valorarías?")
buttons(["1","2","3","4","5"], v=>{
formData.valoracion = parseInt(v)
showMap()
})
}

/* ================= MAPA (MÁS GRANDE) ================= */
function showMap(){

bot("Indica el punto en el mapa o busca dirección.")

controls.innerHTML = ""

const wrapper = document.createElement("div")
wrapper.className = "w-full"

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-2 rounded-xl w-full mb-2"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "420px"
mapDiv.className = "rounded-2xl"

wrapper.appendChild(search)
wrapper.appendChild(mapDiv)
controls.appendChild(wrapper)

setTimeout(()=>{

if(currentMap) currentMap.remove()

currentMap = L.map("map").setView([39.47,-0.37],13)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(currentMap)

let marker
const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
geocoder.geocode(search.value, res=>{
if(res.length){
const r = res[0]
currentMap.setView(r.center,16)
marker = L.marker(r.center).addTo(currentMap)
formData.lat = r.center.lat
formData.lng = r.center.lng
bot("Ubicación registrada.")
askDescription()
}
})
}
})

currentMap.on("click", e=>{
if(marker) currentMap.removeLayer(marker)
marker = L.marker(e.latlng).addTo(currentMap)
formData.lat = e.latlng.lat
formData.lng = e.latlng.lng
bot("Ubicación guardada.")
askDescription()
})

},300)
}

/* ================= DESCRIPCIÓN ================= */
function askDescription(){

bot("Describe brevemente lo ocurrido.")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"
input.placeholder = "Escribe aquí..."

const send = document.createElement("button")
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
send.innerText = "Enviar"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient.from("incidencias").insert([formData])

bot("Registrado correctamente.")

controls.innerHTML = ""

const close = document.createElement("button")
close.innerText = "Cerrar"
close.className = "bg-gray-200 px-4 py-2 rounded-xl"

close.onclick = ()=> location.reload()

const view = document.createElement("button")
view.innerText = "Ver datos"
view.className = "bg-green-600 text-white px-4 py-2 rounded-xl"

view.onclick = ()=> window.location.href = "/citizen.html"

controls.appendChild(close)
controls.appendChild(view)
}

controls.appendChild(input)
controls.appendChild(send)
}

/* ================= START ================= */
const startBtn = document.createElement("button")
startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl"

startBtn.onclick = ()=>{
controls.innerHTML = ""
weeklyQuestion()
}

controls.appendChild(startBtn)

</script>

<style>
@keyframes fade {
from { opacity: 0; transform: translateY(5px); }
to { opacity: 1; transform: translateY(0); }
}
.animate-fade { animation: fade 0.2s ease-out; }
</style>

</body>
</html>
