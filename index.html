<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-[#EEF2F5] flex justify-center min-h-screen">

<div class="w-full max-w-md bg-white min-h-screen flex flex-col rounded-[28px] overflow-hidden">

<!-- HEADER -->
<div class="bg-emerald-600 text-white p-4">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
      👤
    </div>
    <div>
      <div class="font-bold">Citizen Voice</div>
      <div class="text-xs opacity-80">Asistente ciudadano</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 p-3 overflow-y-auto flex flex-col gap-3"></div>

<!-- MAP -->
<div id="mapContainer" class="hidden p-3">
  <div id="map" class="h-[360px] rounded-2xl"></div>
</div>

<!-- CONTROLS -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ================= SUPABASE ================= */

const supabaseClient = supabase.createClient(
  "https://saiclsejxsycmeefuhvs.supabase.co",
  "sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ================= STATE ================= */

let form = {}
let map, marker

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapContainer = document.getElementById("mapContainer")

/* ================= VOZ ================= */

function speak(text){
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "es-ES"
  speechSynthesis.cancel()
  speechSynthesis.speak(msg)
}

/* ================= BOT ================= */

function bot(text){
  const row = document.createElement("div")
  row.className = "flex gap-2"

  const avatar = document.createElement("div")
  avatar.className = "w-9 h-9 rounded-full bg-emerald-600"

  const bubble = document.createElement("div")
  bubble.className = "bg-emerald-100 p-3 rounded-2xl text-sm"
  bubble.innerText = text

  row.appendChild(avatar)
  row.appendChild(bubble)

  chat.appendChild(row)
  chat.scrollTop = chat.scrollHeight

  speak(text)
}

/* ================= USER ================= */

function user(text){
  const d = document.createElement("div")
  d.className = "ml-auto bg-emerald-600 text-white p-3 rounded-2xl text-sm"
  d.innerText = text
  chat.appendChild(d)
}

/* ================= BUTTONS ================= */

function buttons(list, cb){
  controls.innerHTML = ""

  list.forEach(v=>{
    const b = document.createElement("button")
    b.className = "bg-emerald-100 px-3 py-2 rounded-xl text-sm"
    b.innerText = v

    b.onclick = ()=>{
      user(v)
      controls.innerHTML = ""
      cb(v)
    }

    controls.appendChild(b)
  })
}

/* ================= IA (SEGURA) ================= */

async function callAI(text){

  try {
    const res = await fetch(
      "https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ inputs: text })
      }
    )

    const data = await res.json()

    return {
      resumen: data?.generated_text || "Sin análisis IA",
      acciones: ["Revisar", "Inspección", "Seguimiento"]
    }

  } catch (e) {
    return {
      resumen: "IA no disponible",
      acciones: []
    }
  }
}

/* ================= START ================= */

function start(){

  form = {}

  bot("Hola 👤 soy Citizen Voice")

  bot("¿Qué deseas registrar?")

  buttons(["Incidencia","Mejora"], v=>{
    form.tipo = v
    askWeekly()
  })
}

/* ================= WEEKLY ================= */

async function askWeekly(){

  bot("Consulta semanal: del 1 al 5, ¿importancia de mejorar la ciudad?")

  buttons(["1","2","3","4","5"], async v=>{

    form.weekly = v

    await supabaseClient
      .from("weekly_engagement")
      .insert([{
        score: v,
        created_at: new Date().toISOString()
      }])

    askArea()
  })
}

/* ================= AREA ================= */

function askArea(){

  bot("¿En qué área ocurre?")

  buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
    form.area = v
    askDescription()
  })
}

/* ================= DESCRIPTION ================= */

function askDescription(){

  bot("Describe la situación")

  controls.innerHTML = ""

  const input = document.createElement("input")
  input.className = "border p-2 rounded-xl flex-1 text-sm"

  const mic = document.createElement("button")
  mic.innerText = "🎤"

  mic.onclick = ()=>{
    const r = new webkitSpeechRecognition()
    r.lang = "es-ES"
    r.start()
    r.onresult = e=>{
      input.value = e.results[0][0].transcript
    }
  }

  const send = document.createElement("button")
  send.innerText = "Mapa"
  send.className = "bg-emerald-600 text-white px-3 rounded-xl"

  send.onclick = async ()=>{

    form.descripcion = input.value

    const ai = await callAI(input.value)
    form.resumen = ai.resumen
    form.acciones = ai.acciones

    showMap()
  }

  controls.appendChild(input)
  controls.appendChild(mic)
  controls.appendChild(send)
}

/* ================= MAP ================= */

function showMap(){

  mapContainer.classList.remove("hidden")

  setTimeout(()=>{

    if(!map){
      map = L.map("map").setView([39.47,-0.37],13)
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)
    }

    map.invalidateSize()

    map.on("click", e=>{

      if(marker) map.removeLayer(marker)

      marker = L.marker(e.latlng).addTo(map)

      form.lat = e.latlng.lat
      form.lng = e.latlng.lng

      save()
    })

  },200)
}

/* ================= SAVE ================= */

async function save(){

  bot("Guardando incidencia...")

  const { error } = await supabaseClient
    .from("incidencias")
    .insert([{
      tipo: form.tipo,
      area: form.area,
      descripcion: form.descripcion,
      lat: form.lat,
      lng: form.lng,
      weekly_score: form.weekly,
      resumen: form.resumen,
      acciones: form.acciones
    }])

  if(error){
    console.log(error)
    bot("Error en Supabase")
    return
  }

  bot("Registro completado ✔")
}

/* ================= INIT ================= */

const btn = document.createElement("button")
btn.className = "w-full bg-emerald-600 text-white p-4"
btn.innerText = "Empezar"

btn.onclick = ()=>{
  controls.innerHTML = ""
  start()
}

controls.appendChild(btn)

</script>

</body>
</html>
