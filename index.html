<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 CitizenVoice</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #e6f2e6;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}
#container {
  width: 100%;
  max-width: 500px;
  margin-top: 20px;
}
#title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #1faa59;
}
#chat {
  height: 60vh;
  background: #fff;
  border-radius: 15px;
  padding: 10px;
  overflow-y: auto;
  box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}
.bubble {
  padding: 16px;
  margin: 5px 0;
  max-width: 75%;
  border-radius: 20px;
  font-size: 1rem;
  transition: all 0.3s ease;
}
.bubble.old {
  font-size: 0.8rem;
  padding: 6px;
  opacity: 0.8;
}
.bot {
  background: #f1f1f1;
}
.user {
  background: #1faa59;
  color: white;
  margin-left: auto;
}
button.option {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 8px auto;
  padding: 16px 0;
  font-size: 1.1rem;
  border-radius: 30px;
  background: #1faa59;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
input[type=text] {
  width: 70%;
  padding: 12px;
  margin-right: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 1rem;
}
button.sendBtn, button.micBtn, button.activateMic {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
button.sendBtn { background:#1faa59; color:white; }
button.micBtn { background:#4CAF50; color:white; }
button.activateMic { background:#1faaff; color:white; width:90%; margin:10px auto; display:block; }
#mapContainer { display:none; margin-top:10px;}
#map { height: 200px; border-radius:10px; }
#ratingContainer { display:flex; justify-content:space-around; margin:10px 0; }
button.ratingBtn { border-radius:50%; width:50px; height:50px; font-size:1.2rem; font-weight:bold; background:#1faa59; color:white; border:none; cursor:pointer; }
.suggestion { padding:5px; cursor:pointer; background:#e6f2e6; margin-bottom:2px; border-radius:5px;}
.suggestion:hover { background:#cde6cd; }
</style>
</head>
<body>
<div id="container">
  <div id="title">🎤 CitizenVoice – Tu opinión importa</div>
  <button id="enableMic" class="activateMic">Activar voz y permisos de micrófono</button>
  <div id="chat"></div>

  <div id="mapContainer">
    <p>Indica tu ubicación escribiendo tu calle o lugar:</p>
    <input id="addressInput" type="text" placeholder="Escribe tu calle...">
    <div id="suggestions"></div>
    <button id="sendLocation" class="sendBtn">Confirmar ubicación</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const chat = document.getElementById('chat');
const enableMic = document.getElementById('enableMic');
let speechAllowed=false;
let area='', subarea='', tipo='', descripcion='', puntuacion=0, lat=0, lon=0;

// Activar voz
enableMic.onclick = ()=>{
    speechAllowed=true;
    addBot("¡Micrófono activado! Ahora puedo hablarte.");
    enableMic.style.display='none';
}

// Conversación
function shrinkPreviousBubbles(){
    document.querySelectorAll('.bubble:not(:last-child)').forEach(b => b.classList.add('old'));
}
function shrinkPreviousOptions(){
    document.querySelectorAll('.option').forEach(o => o.disabled=true); // solo se reduce el seleccionado
}

function addBot(message){
    shrinkPreviousBubbles();
    const div = document.createElement('div');
    div.className='bubble bot';
    div.innerText = message;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    if(speechAllowed){
        const utter = new SpeechSynthesisUtterance(message);
        utter.lang='es-ES';
        speechSynthesis.speak(utter);
    }
}

function addUser(message){
    shrinkPreviousBubbles();
    const div = document.createElement('div');
    div.className='bubble user';
    div.innerText = message;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Flujo
function askArea(){
    addBot('¿Sobre qué área quieres opinar?');
    ['Movilidad','Limpieza','Urbanismo','Cultura','Seguridad','Tramitación','Otros'].forEach(a=>{
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=a;
        btn.onclick=()=>{
            addUser(a);
            area=a;
            shrinkPreviousOptions();
            if(a==='Otros'){
                askSubarea();
            } else askTipo();
        }
        chat.appendChild(btn);
    });
}
function askSubarea(){
    addBot('Por favor, especifica tu área:');
    const input = document.createElement('input');
    input.type='text';
    input.placeholder='Escribe aquí...';
    const send = document.createElement('button');
    send.innerText='Enviar';
    send.className='sendBtn';
    send.onclick=()=>{
        if(input.value.trim()==='') return;
        addUser(input.value);
        subarea=input.value;
        askTipo();
    }
    chat.appendChild(input);
    chat.appendChild(send);
}

function askTipo(){
    addBot('¿Es una incidencia o propuesta?');
    ['Incidencia','Propuesta'].forEach(t=>{
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=t;
        btn.onclick=()=>{
            addUser(t);
            tipo=t;
            shrinkPreviousOptions();
            askDescripcion();
        }
        chat.appendChild(btn);
    });
}

function askDescripcion(){
    addBot('Describe tu mensaje usando voz o texto.');
    const input = document.createElement('input');
    input.type='text';
    input.placeholder='Escribe aquí o pulsa 🎤';
    const mic = document.createElement('button');
    mic.innerText='🎤';
    mic.className='micBtn';
    mic.onclick=()=>{
        if(!speechAllowed){ alert("Pulsa 'Activar voz' primero"); return; }
        let recognition;
        if(window.SpeechRecognition || window.webkitSpeechRecognition){
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang='es-ES';
            recognition.onresult = (e) => { input.value = e.results[0][0].transcript; }
            recognition.start();
        } else { alert("Tu navegador no soporta reconocimiento de voz"); }
    }
    const send = document.createElement('button');
    send.innerText='Enviar';
    send.className='sendBtn';
    send.onclick=()=>{
        if(input.value.trim()==='') return;
        addUser(input.value);
        descripcion=input.value;
        askPuntuacion();
    }
    chat.appendChild(input);
    chat.appendChild(mic);
    chat.appendChild(send);
}

function askPuntuacion(){
    addBot('Valora el servicio (1 = Muy malo, 5 = Excelente)');
    const ratingContainer = document.createElement('div');
    ratingContainer.id='ratingContainer';
    for(let i=1;i<=5;i++){
        const btn = document.createElement('button');
        btn.className='ratingBtn';
        btn.innerText=i;
        btn.onclick=()=>{
            addUser(i);
            puntuacion=i;
            chat.removeChild(ratingContainer);
            askUbicacion();
        }
        ratingContainer.appendChild(btn);
    }
    chat.appendChild(ratingContainer);
}

// Ubicación con Photon
function askUbicacion(){
    addBot('Indica tu ubicación escribiendo tu calle o lugar.');
    document.getElementById('mapContainer').style.display='block';
    const input = document.getElementById('addressInput');
    const suggestions = document.getElementById('suggestions');
    const sendLoc = document.getElementById('sendLocation');

    async function buscarDireccionPhoton(text){
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(text)}&limit=5`);
        const data = await res.json();
        return data.features;
    }

    input.addEventListener('input', async ()=>{
        if(input.value.length>2){
            const resultados = await buscarDireccionPhoton(input.value);
            suggestions.innerHTML='';
            resultados.forEach(lugar=>{
                const div = document.createElement('div');
                div.innerText=lugar.properties.name + ', ' + (lugar.properties.city||'');
                div.className='suggestion';
                div.onclick=()=>{
                    input.value=lugar.properties.name + ', ' + (lugar.properties.city||'');
                    lat=lugar.geometry.coordinates[1];
                    lon=lugar.geometry.coordinates[0];
                    suggestions.innerHTML='';
                }
                suggestions.appendChild(div);
            });
        } else suggestions.innerHTML='';
    });

    sendLoc.onclick=()=>{
        if(input.value.trim()==='') return;
        addUser(input.value);
        document.getElementById('mapContainer').style.display='none';
        addBot('¡Gracias! Tu opinión ha sido registrada.');
        console.log({area,subarea,tipo,descripcion,puntuacion,lat,lon});
        // Aquí se puede enviar a Google Sheets / Excel Online
    }
}

// Inicio
askArea();
</script>
</body>
</html>
