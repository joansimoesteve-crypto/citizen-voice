<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[82vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->

<div class="bg-green-700 text-white p-4 text-center">

<div class="text-lg font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Registra incidencias o propuestas de mejora en 30 segundos
</div>

</div>

<!-- CHAT -->

<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->

<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

const chat=document.getElementById("chat")
const controls=document.getElementById("controls")

let data={}

/* URL GOOGLE SHEETS */

const API="PEGA_AQUI_TU_URL"

/* VOZ */

function speak(text){

const msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.speak(msg)

}

/* BOT */

function bot(text){

const row=document.createElement("div")
row.className="flex items-start gap-2"

const avatar=document.createElement("img")

avatar.src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png"
avatar.className="w-9 h-9"

const bubble=document.createElement("div")
bubble.className="bg-green-100 p-3 rounded-xl text-sm w-[75%]"
bubble.innerText=text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

chat.scrollTop=chat.scrollHeight

speak(text)

}

/* USER */

function user(text){

const d=document.createElement("div")

d.className="bg-green-600 text-white p-3 rounded-xl text-sm w-[75%] ml-auto"

d.innerText=text

chat.appendChild(d)

chat.scrollTop=chat.scrollHeight

}

/* BOTONES */

function buttons(list,callback){

controls.innerHTML=""

list.forEach(o=>{

const b=document.createElement("button")

b.className="bg-green-100 hover:bg-green-200 px-3 py-2 rounded-lg text-sm"

b.innerText=o

b.onclick=()=>{

controls.innerHTML=""

user(o)

callback(o)

}

controls.appendChild(b)

})

}

/* START */

function start(){

bot("Hola. ¿Qué deseas registrar?")

buttons(
["Incidencia","Propuesta de mejora"],
v=>{

data.tipo=v

askArea()

})

}

/* AREA */

function askArea(){

bot("¿En qué área?")

buttons(
[
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Otros trámites"
],
v=>{

data.area=v

askRate()

})

}

/* VALORACION */

function askRate(){

bot("¿Cómo valoras esta área del 1 al 5?")

buttons(["1","2","3","4","5"],v=>{

data.valoracion=v

selectMap()

})

}

/* MAPA */

function selectMap(){

bot("Selecciona la ubicación en el mapa")

controls.innerHTML=""

const mapDiv=document.createElement("div")

mapDiv.id="map"
mapDiv.style.height="320px"
mapDiv.style.width="100%"

chat.appendChild(mapDiv)

chat.scrollTop=chat.scrollHeight

setTimeout(()=>{

const map=L.map('map').setView([39.47,-0.37],14)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

map.invalidateSize()

let marker

map.on("click",e=>{

if(marker) map.removeLayer(marker)

marker=L.marker(e.latlng).addTo(map)

data.lat=e.latlng.lat
data.lng=e.latlng.lng

user("Ubicación registrada")

askDescription()

})

},200)

}

/* DESCRIPCION */

function askDescription(){

bot("Describe la incidencia o propuesta")

controls.innerHTML=""

const input=document.createElement("input")

input.placeholder="Escribe o usa el micrófono"

input.className="border rounded-lg p-2 flex-1 text-sm"

const mic=document.createElement("button")

mic.innerText="🎤"
mic.className="bg-gray-100 px-3 py-2 rounded-lg"

mic.onclick=()=>{

const r=new webkitSpeechRecognition()

r.lang="es-ES"

r.start()

r.onresult=e=>{

input.value=e.results[0][0].transcript

}

}

const send=document.createElement("button")

send.innerText="Enviar"

send.className="bg-green-600 text-white px-3 py-2 rounded-lg text-sm"

send.onclick=()=>{

user(input.value)

data.descripcion=input.value

saveData()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

/* GUARDAR */

function saveData(){

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

bot("Gracias. Tu aportación ha sido registrada.")

console.log(data)

}

/* BOTON INICIO */

controls.innerHTML=""

const startBtn=document.createElement("button")

startBtn.innerText="Empezar"

startBtn.className="bg-green-600 text-white px-4 py-2 rounded-lg"

startBtn.onclick=()=>{

controls.innerHTML=""

start()

}

controls.appendChild(startBtn)

</script>

</body>
</html>
