<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 text-center">

<div class="flex items-center justify-center gap-3">

<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">

<svg width="28" height="28" viewBox="0 0 64 64" fill="none">
<circle cx="32" cy="32" r="30" fill="white" fill-opacity="0.2"/>
<circle cx="32" cy="24" r="10" fill="white"/>
<path d="M16 52c3-9 12-14 16-14s13 5 16 14" fill="white"/>
</svg>

</div>

<div class="text-left">
<div class="text-xl font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Asistente virtual para participación activa
</div>
</div>

</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let currentMap = null

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){

speechSynthesis.cancel()

const msg = new SpeechSynthesisUtterance(text)

msg.lang = "es-ES"
msg.rate = 1
msg.pitch = 1

speechSynthesis.speak(msg)

}

/* ===================== */
/* BOT */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")

avatar.className =
"w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center shadow"

avatar.innerHTML = `
<svg width="22" height="22" viewBox="0 0 64 64" fill="none">
<circle cx="32" cy="22" r="10" fill="white"/>
<path d="M16 52c3-9 12-14 16-14s13 5 16 14" fill="white"/>
</svg>
`

const bubble = document.createElement("div")

bubble.className =
"bg-green-100 p-3 rounded-2xl text-sm w-[80%]"

bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

chat.scrollTop = chat.scrollHeight

speak(text)

}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")

d.className =
"bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"

d.innerText = text

chat.appendChild(d)

chat.scrollTop = chat.scrollHeight

}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, callback){

controls.innerHTML = ""

list.forEach(o=>{

const b = document.createElement("button")

b.className =
"bg-green-100 hover:bg-green-200 transition px-4 py-2 rounded-xl text-sm"

b.innerText = o

b.onclick = ()=>{

controls.innerHTML = ""

user(o)

callback(o)

}

controls.appendChild(b)

})

}

/* ===================== */
/* PREGUNTA SEMANAL */
/* ===================== */

function weeklyQuestion(){

bot("Hola, soy Citizen Voice. Vamos a empezar con una pregunta rápida.")

bot("¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], async (v)=>{

const value = parseInt(v)

await supabaseClient
.from("weekly_engagement")
.insert([{
week: 1,
question: "Espacios culturales infantiles",
area: "Cultura",
answer: value,
created_at: new Date().toISOString()
}])

bot("Y ahora, ¿qué deseas registrar?")

askType()

})

}

/* ===================== */
/* START */
/* ===================== */

function askType(){

buttons(["Incidencia","Propuesta de mejora"], v=>{

formData.tipo = v

askArea()

})

}

/* ===================== */
/* AREA */
/* ===================== */

function askArea(){

bot("¿En qué área ocurre o afecta?")

buttons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Otros"
], v=>{

formData.area = v

askRate()

})

}

/* ===================== */
/* VALORACIÓN */
/* ===================== */

function askRate(){

bot("¿Cómo valoras actualmente esta área?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], v=>{

formData.valoracion = parseInt(v)

showMap()

})

}

/* ===================== */
/* MAPA */
/* ===================== */

function showMap(){

bot("Indica dónde ocurre. Puedes buscar una dirección o tocar el mapa.")

controls.innerHTML = ""

const wrapper = document.createElement("div")
wrapper.className = "w-full"

const search = document.createElement("input")

search.placeholder = "Buscar dirección..."
search.className =
"border p-3 rounded-xl w-full mb-2 text-sm"

const mapDiv = document.createElement("div")

mapDiv.id = "map"

mapDiv.style.height = "320px"

mapDiv.className = "rounded-2xl shadow"

wrapper.appendChild(search)
wrapper.appendChild(mapDiv)

controls.appendChild(wrapper)

setTimeout(()=>{

if(currentMap){
currentMap.remove()
}

currentMap = L.map('map').setView([39.47,-0.37],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(currentMap)

let marker

const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

geocoder.geocode(search.value, results=>{

if(results.length>0){

const r = results[0]

currentMap.setView(r.center,16)

if(marker) currentMap.removeLayer(marker)

marker = L.marker(r.center).addTo(currentMap)

formData.lat = r.center.lat
formData.lng = r.center.lng

wrapper.style.display = "none"

bot("Ubicación registrada.")

askDescription()

}

})

}

})

currentMap.on("click", e=>{

if(marker) currentMap.removeLayer(marker)

marker = L.marker(e.latlng).addTo(currentMap)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

wrapper.style.display = "none"

bot("Ubicación guardada.")

askDescription()

})

},300)

}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Describe brevemente la situación.")

controls.innerHTML = ""

const input = document.createElement("input")

input.placeholder = "Escribe o usa voz"

input.className =
"border p-3 rounded-xl flex-1 text-sm"

const mic = document.createElement("button")

mic.innerText = "🎤"

mic.className =
"bg-green-100 px-4 rounded-xl"

mic.onclick = ()=>{

const r = new webkitSpeechRecognition()

r.lang = "es-ES"

r.start()

r.onresult = e=>{

input.value = e.results[0][0].transcript

}

}

const send = document.createElement("button")

send.innerText = "Enviar"

send.className =
"bg-green-600 text-white px-4 py-2 rounded-xl"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

saveData()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

/* ===================== */
/* IA + SUPABASE */
/* ===================== */

async function saveData(){

try{

let ai = {
resumen:"",
acciones:[]
}

try{

const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
description: formData.descripcion
})
})

ai = await res.json()

}catch(e){}

await supabaseClient
.from("incidencias")
.insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

bot("Registro completado correctamente.")

}catch(err){

bot("Ha ocurrido un error al guardar.")

}

}

/* ===================== */
/* INIT */
/* ===================== */

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"

startBtn.className =
"w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{

controls.innerHTML = ""

weeklyQuestion()

}

controls.appendChild(startBtn)

</script>

</body>
</html>
