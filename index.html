<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 text-center">

<div class="text-xl font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Asistente virtual para participación activa · 30 segundos
</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let map, marker

/* ===================== */
/* BOT HUMANO (SVG AVATAR) */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-gradient-to-br from-green-600 to-emerald-500 flex items-center justify-center shadow"

avatar.innerHTML = `
<svg width="22" height="22" viewBox="0 0 24 24" fill="white">
<path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-4.4 0-8 2.2-8 5v3h16v-3c0-2.8-3.6-5-8-5z"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text

chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, callback){

controls.innerHTML = ""

list.forEach(o=>{

const b = document.createElement("button")
b.className = "bg-green-100 hover:bg-green-200 px-4 py-2 rounded-xl text-sm"
b.innerText = o

b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}

controls.appendChild(b)

})

}

/* ===================== */
/* START + PREGUNTA SEMANAL */
/* ===================== */

function start(){

bot("Hola 👋 soy Citizen Voice, tu asistente ciudadano.")

bot("Tardo menos de 30 segundos en ayudarte.")

setTimeout(()=>{

bot("#ConsultaSemanal-1")
bot("Del 1 al 5: ¿qué importancia das a las actividades culturales infantiles en tu ciudad?")

buttons(["1","2","3","4","5"], v=>{
formData.weekly = v
askType()
})

},800)

}

/* ===================== */
/* FLUJO */
/* ===================== */

function askType(){

bot("¿Qué quieres registrar?")

buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})

}

function askArea(){

bot("¿En qué área ocurre?")

buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
askRate()
})

}

function askRate(){

bot("Valora la situación actual del 1 al 5")

buttons(["1","2","3","4","5"], v=>{
formData.valoracion = v
showMap()
})

}

/* ===================== */
/* MAPA (ESTABLE - NO ROMPER DOM) */
/* ===================== */

function showMap(){

bot("Indica ubicación (busca o toca el mapa)")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full text-sm"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.className = "w-full h-[420px] rounded-2xl shadow mt-2"

chat.appendChild(search)
chat.appendChild(mapDiv)

setTimeout(()=>{

map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

const geocoder = L.Control.Geocoder.nominatim()

map.on("click", e=>{

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

bot("Ubicación registrada")

askDescription()

})

search.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

geocoder.geocode(search.value, res=>{

if(res.length){

const p = res[0].center

map.setView(p,16)

if(marker) map.removeLayer(marker)

marker = L.marker(p).addTo(map)

formData.lat = p.lat
formData.lng = p.lng

bot("Ubicación encontrada")

askDescription()

}

})

}

})

},400)

}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Describe el problema o propuesta")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

await save()

}

controls.appendChild(input)
controls.appendChild(send)

}

/* ===================== */
/* SAVE */
/* ===================== */

async function save(){

await supabaseClient
.from("incidencias")
.insert([formData])

bot("Gracias 🙌 registro completado")

setTimeout(showFinal,800)

}

/* ===================== */
/* FINAL */
/* ===================== */

function showFinal(){

bot("¿Qué quieres hacer ahora?")

buttons([
"Ir al cuadro de mando",
"Cerrar asistente"
], v=>{

if(v==="Ir al cuadro de mando"){
window.location.href = "/citizen.html"
}else{
chat.innerHTML = ""
bot("Asistente cerrado 👋")
}

})

}

/* ===================== */
/* INIT BUTTON */
/* ===================== */

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
