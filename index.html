<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Citizen Voice AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
background:
linear-gradient(
180deg,
#02120d 0%,
#06281f 45%,
#03140f 100%
);
overflow:hidden;
font-family:sans-serif;
}

/* HERO */

.hero{
position:relative;
height:240px;
overflow:hidden;
background:
radial-gradient(circle at top,#1dd1a1 0%,#065f46 45%,#02120d 100%);
}

.glow{
position:absolute;
width:260px;
height:260px;
background:rgba(16,185,129,.35);
filter:blur(70px);
border-radius:9999px;
top:-60px;
left:50%;
transform:translateX(-50%);
}

.avatar-wrapper{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:10;
}

.avatar-ring{
position:absolute;
inset:-10px;
border-radius:9999px;
border:3px solid rgba(16,185,129,.5);
box-shadow: 0 0 15px rgba(16,185,129,.3);
animation:pulse 3s infinite ease-in-out;
transition: all 0.3s ease;
}

.avatar-ring.active {
animation: pulse-intense 0.8s infinite ease-in-out;
border-color: rgba(52,211,153,1);
box-shadow: 0 0 25px rgba(52,211,153,.8);
}

.avatar{
width:120px;
height:120px;
border-radius:9999px;
overflow:hidden;
border:4px solid rgba(255,255,255,.15);
box-shadow:0 25px 60px rgba(0,0,0,.45);
position:relative;
z-index:2;
background: #0f172a;
}

.status{
position:absolute;
bottom:6px;
right:6px;
width:18px;
height:18px;
background:#22c55e;
border:3px solid white;
border-radius:9999px;
z-index:20;
}

/* CHAT */

#chat{
scroll-behavior:smooth;
}

#chat::-webkit-scrollbar{
width:4px;
}

#chat::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:20px;
}

/* BURBUJAS */

.bot-row{
display:flex;
gap:10px;
align-items:flex-end;
animation:fade .25s ease;
}

.bot-mini{
width:36px;
height:36px;
border-radius:9999px;
overflow:hidden;
flex-shrink:0;
border:2px solid rgba(255,255,255,.15);
background: #0f172a;
}

.bot-bubble{
background:rgba(255,255,255,.11);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:22px;
color:white;
font-size:14px;
line-height:1.5;
max-width:80%;
box-shadow:0 10px 35px rgba(0,0,0,.18);
}

.user-bubble{
background:
linear-gradient(
135deg,
#10b981,
#059669
);

padding:14px;
border-radius:22px;
color:white;
font-size:14px;
max-width:80%;
margin-left:auto;
box-shadow:0 10px 35px rgba(16,185,129,.25);
animation:fade .25s ease;
}

/* CONTROLES */

.controls{
background:rgba(0,0,0,.22);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.08);
flex-shrink: 0 !important;
}

.no-scrollbar::-webkit-scrollbar {
display: none;
}
.no-scrollbar {
-ms-overflow-style: none;
scrollbar-width: none;
}

.option-btn{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
color:white;
padding:6px 12px;
border-radius:12px;
font-size:12px;
transition:.2s;
backdrop-filter:blur(10px);
flex-shrink: 0;
}

.option-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.16);
}

.input{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
padding:10px;
border-radius:14px;
color:white;
width:100%;
outline:none;
font-size:13px;
}

.input::placeholder{
color:rgba(255,255,255,.45);
}

/* MAP */

#map{
border-radius:24px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

/* ANIMACIONES */

@keyframes pulse{
0%{
transform:scale(1);
opacity:0.8;
}
50%{
transform:scale(1.1);
opacity:0.4;
box-shadow: 0 0 25px rgba(16,185,129,.5);
}
100%{
transform:scale(1);
opacity:0.8;
}
}

@keyframes pulse-intense{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.18);
opacity:0.6;
box-shadow: 0 0 40px rgba(52,211,153,1);
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body class="flex justify-center items-center min-h-[100dvh] p-2">

<div class="w-full max-w-md h-[96dvh] rounded-[34px] overflow-hidden border border-white/10 bg-black/20 backdrop-blur-xl shadow-2xl flex flex-col">

<!-- HERO -->

<div class="hero">

<div class="glow"></div>

<div class="avatar-wrapper">

<div id="ring" class="avatar-ring"></div>

<div class="avatar">

<!-- AVATAR VECTORIAL ESTILO 3D CORPORATIVO / PIXAR -->
<svg viewBox="0 0 100 100" class="w-full h-full">
<defs>
<linearGradient id="corp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1e293b"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
</defs>
<circle cx="50" cy="50" r="50" fill="url(#corp-bg)"/>
<!-- Pelo Trasero -->
<path d="M24,55 C18,32 28,12 50,12 C72,12 82,32 76,55 C76,72 71,85 71,90 L29,90 C29,85 24,72 24,55 Z" fill="#2b1a11"/>
<!-- Ropa Profesional -->

<!-- Ojos Grandes Estilo 3D Animation -->
<ellipse cx="40" cy="42" rx="4.5" ry="4.5" fill="#ffffff"/>
<circle cx="40" cy="42" r="2.8" fill="#5c4033"/>
<circle cx="41.2" cy="40.5" r="1" fill="#ffffff"/>
<ellipse cx="60" cy="42" rx="4.5" ry="4.5" fill="#ffffff"/>
<circle cx="60" cy="42" r="2.8" fill="#5c4033"/>
<circle cx="61.2" cy="40.5" r="1" fill="#ffffff"/>
<!-- Cejas Definitivas -->
<path d="M33,35 Q39,32 45,36" stroke="#2b1a11" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M67,35 Q61,32 55,36" stroke="#2b1a11" stroke-width="2" fill="none" stroke-linecap="round"/>
<!-- Gafas Redondas Modernas (Basado en las Capturas del usuario) -->
<circle cx="40" cy="42" r="7.5" stroke="#1e293b" stroke-width="2" fill="none"/>
<circle cx="60" cy="42" r="7.5" stroke="#1e293b" stroke-width="2" fill="none"/>
<path d="M47.5,42 Q50,40 52.5,42" stroke="#1e293b" stroke-width="2" fill="none"/>
<path d="M32.5,42 Q30,41 28,43" stroke="#1e293b" stroke-width="1.5" fill="none"/>
<path d="M67.5,42 Q70,41 72,43" stroke="#1e293b" stroke-width="1.5" fill="none"/>
<!-- Nariz y Sonrisa Profesional -->
<path d="M49,46 Q50,49 51,46" stroke="#d58f66" stroke-width="1.5" fill="none" stroke-linecap="round"/>

<path d="M43,53.2 Q50,57 57,53.2" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
</svg>

</div>

<div class="status"></div>

</div>

<div class="absolute bottom-5 left-0 right-0 text-center z-20">

<div class="text-white text-2xl font-bold tracking-wide">
Citizen Voice AI
</div>

<div class="text-emerald-100 text-sm opacity-90 mt-1">
Asistente virtual para participación ciudadana
</div>

</div>

</div>

<!-- CHAT -->

<div
id="chat"
class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3"
></div>

<!-- CONTROLES -->

<div
id="controls"
class="controls p-3 flex flex-col gap-2"
></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const ring = document.getElementById("ring")

let formData = {}
let currentMap = null

function getLocalISOString() {
const d = new Date();
const pad = num => String(num).padStart(2, '0');
const offset = -d.getTimezoneOffset();
const sign = offset >= 0 ? '+' : '-';
const offsetHours = pad(Math.floor(Math.abs(offset) / 60));
const offsetMins = pad(Math.abs(offset) % 60);

return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}${sign}${offsetHours}:${offsetMins}`;
}

function pulseRing(activate, duration = 0) {
if(activate) {
ring.classList.add("active");
if(duration > 0) {
setTimeout(() => {
ring.classList.remove("active");
}, duration);
}
} else {
ring.classList.remove("active");
}
}

function scrollToBottom() {
setTimeout(() => {
chat.scrollTop = chat.scrollHeight
}, 60)
}

function speak(text){

speechSynthesis.cancel()

const msg = new SpeechSynthesisUtterance(text)

msg.lang = "es-ES"
msg.rate = 1

speechSynthesis.speak(msg)

}

function bot(text){

pulseRing(true, 1500);

const row = document.createElement("div")

row.className = "bot-row"

const avatar = document.createElement("div")

avatar.className = "bot-mini"

// MINI AVATAR VECTORIAL ESTILO 3D COORDINADO
avatar.innerHTML = `
<svg viewBox="0 0 100 100" class="w-full h-full">
<circle cx="50" cy="50" r="50" fill="#1e293b"/>
<path d="M24,55 C18,32 28,12 50,12 C72,12 82,32 76,55 Z" fill="#2b1a11"/>
<path d="M18,100 C18,83 28,73 50,73 C72,73 82,83 82,100 Z" fill="#1e293b"/>
<path d="M36,74 L50,94 L64,74 Z" fill="#ffffff"/>
<rect x="44" y="64" width="12" height="15" fill="#fcd3b6" rx="3"/>
<circle cx="50" cy="44" r="21" fill="#fcd3b6"/>
<path d="M27,38 C26,22 38,15 50,17 C65,15 73,25 72,40 Z" fill="#3a2518"/>
<circle cx="40" cy="42" r="7.5" stroke="#1e293b" stroke-width="2" fill="none"/>
<circle cx="60" cy="42" r="7.5" stroke="#1e293b" stroke-width="2" fill="none"/>
<path d="M47.5,42 Q50,40 52.5,42" stroke="#1e293b" stroke-width="2" fill="none"/>
<path d="M42,52 Q50,59 58,52" fill="none" stroke="#be123c" stroke-width="2" stroke-linecap="round"/>
</svg>
`

const bubble = document.createElement("div")

bubble.className = "bot-bubble"

bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

scrollToBottom()

speak(text)

}

function user(text){

const d = document.createElement("div")

d.className = "user-bubble"

d.innerText = text

chat.appendChild(d)

scrollToBottom()

}

function buttons(list, callback){

controls.innerHTML = ""

const btnRow = document.createElement("div")
btnRow.className = "flex flex-row flex-nowrap gap-2 overflow-x-auto w-full no-scrollbar py-1"
btnRow.style.webkitOverflowScrolling = "touch"

list.forEach(o=>{

const b = document.createElement("button")

b.className = "option-btn flex-shrink-0"

b.innerText = o

b.onclick = ()=>{

controls.innerHTML = ""

user(o)

callback(o)

}

btnRow.appendChild(b)

})

controls.appendChild(btnRow)
scrollToBottom()

}

function weeklyQuestion(){

bot("Hola, soy Citizen Voice. Vamos a empezar con una pregunta rápida: ¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], async (v)=>{

try{

await supabaseClient
.from("weekly_engagement")
.insert([{
week: 1,
question: "¿Qué importancia das a mejorar los espacios culturales infantiles?",
area: "Cultura",
answer: parseInt(v.charAt(v.length - 1)),
created_at: getLocalISOString()
}])

}catch(err){
console.log(err)
}

bot("Perfecto. ¿Qué deseas registrar?")

askType()

})

}

function askType(){

buttons([
"Incidencia",
"Propuesta de mejora"
], v=>{

formData.tipo = v

askArea()

})

}

function askArea(){

bot("¿En qué área ocurre o afecta?")

buttons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Otros"
], v=>{

formData.area = v

askRate()

})

}

function askRate(){

bot("¿Cómo valoras actualmente esta área?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], v=>{

formData.valoracion =
parseInt(v.charAt(v.length - 1))

showMap()

})

}

function showMap(){

bot("Indica dónde ocurre. Toca directamente en el mapa o usa el botón de localización actual.")

controls.innerHTML = ""

const wrapper = document.createElement("div")
wrapper.className = "w-full flex flex-col gap-2"

const geoBtn = document.createElement("button")
geoBtn.type = "button"
geoBtn.className = "w-full py-2.5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-xl text-xs font-semibold shadow-md hover:opacity-90 transition flex items-center justify-center gap-1"
geoBtn.innerHTML = "📍 Usar mi ubicación actual"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "200px"

wrapper.appendChild(geoBtn)
wrapper.appendChild(mapDiv)

controls.appendChild(wrapper)
scrollToBottom()

setTimeout(()=>{

if(currentMap){
currentMap.remove()
}

currentMap = L.map('map').setView([39.4702,-0.3768],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(currentMap)

let marker

geoBtn.onclick = () => {
if (navigator.geolocation) {
geoBtn.innerText = "Buscando señal GPS..."
navigator.geolocation.getCurrentPosition(
(position) => {
const lat = position.coords.latitude
const lon = position.coords.longitude

currentMap.setView([lat, lon], 16)

if(marker) currentMap.removeLayer(marker)
marker = L.marker([lat, lon]).addTo(currentMap)

formData.lat = lat
formData.lng = lon

pulseRing(true, 1200)

setTimeout(() => {
wrapper.style.display = "none"
bot("Ubicación registrada con éxito.")
askDescription()
}, 1000)
},
(err) => {
geoBtn.innerHTML = "📍 Usar mi ubicación actual"
alert("No se ha podido acceder al GPS. Por favor, marca la zona pulsando en el mapa.")
},
{ enableHighAccuracy: true, timeout: 8000 }
)
} else {
alert("Tu dispositivo o navegador no soporta la función de geolocalización.")
}
}

currentMap.on("click", e=>{
if(marker) currentMap.removeLayer(marker)

marker = L.marker(e.latlng).addTo(currentMap)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

pulseRing(true, 1000)

setTimeout(() => {
wrapper.style.display = "none"
bot("Ubicación guardada.")
askDescription()
}, 800)
})

},300)

}

function askDescription(){

bot("Describe brevemente la situación.")

controls.innerHTML = ""

const row = document.createElement("div")
row.className = "flex flex-row w-full gap-2 items-center"

const input = document.createElement("input")

input.placeholder = "Escribe o usa voz"

input.className =
"input flex-1 min-w-0"

const mic = document.createElement("button")

mic.innerText = "🎤"

mic.className =
"option-btn flex-shrink-0"

mic.onclick = ()=>{

const r = new webkitSpeechRecognition()

r.lang = "es-ES"

r.start()

r.onresult = e=>{

input.value = e.results[0][0].transcript

}

}

const send = document.createElement("button")

send.innerText = "Enviar"

send.className =
"option-btn flex-shrink-0"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

saveData()

}

row.appendChild(input)
row.appendChild(mic)
row.appendChild(send)
controls.appendChild(row)
scrollToBottom()

}

async function saveData(){

try{

let ai = {
resumen:"",
acciones:[]
}

try{

const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
description: formData.descripcion
})
})

ai = await res.json()

}catch(e){}

await supabaseClient
.from("incidencias")
.insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

pulseRing(true);

bot("Registro completado correctamente.")

controls.innerHTML = ""

const row = document.createElement("div")
row.className = "flex flex-row w-full gap-2"

const close = document.createElement("button")

close.className =
"option-btn flex-1"

close.innerText = "Cerrar"

close.onclick = () => {
pulseRing(false);
location.reload();
}

const panel = document.createElement("button")

panel.className =
"option-btn flex-1"

panel.innerText = "Ver datos"

panel.onclick = ()=>{

window.location.href =
"https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"

}

row.appendChild(close)
row.appendChild(panel)
controls.appendChild(row)
scrollToBottom()

}catch(err){

bot("Ha ocurrido un error al guardar.")

}

}

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"

startBtn.className =
"w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white py-2.5 rounded-2xl text-sm shadow-2xl flex-shrink-0"

startBtn.onclick = ()=>{

controls.innerHTML = ""

weeklyQuestion()

}

controls.appendChild(startBtn)
scrollToBottom()

</script>

</body>
