<style>

body{
background:
linear-gradient(
180deg,
#02120d 0%,
#06281f 45%,

);
overflow:hidden;
font-family:sans-serif;
}

/* HERO - Ajustado a 170px para liberar espacio en pantallas móviles */
.hero{
position:relative;
height:170px;
overflow:hidden;
background:
radial-gradient(circle at top,#1dd1a1 0%,#065f46 45%,#02120d 100%);
}

.glow{
position:absolute;
width:260px;
height:260px;
background:rgba(16,185,129,.35);
filter:blur(70px);
border-radius:9999px;
top:-60px;
left:50%;
transform:translateX(-50%);
}

.avatar-wrapper{
position:absolute;
left:50%;
top:45%;
transform:translate(-50%,-50%);
z-index:10;
}

.avatar-ring{
position:absolute;
inset:-10px;
border-radius:9999px;
border:2px solid rgba(255,255,255,.15);
animation:pulse 3s infinite;
}

.avatar{
width:100px;
height:100px;
border-radius:9999px;
overflow:hidden;
border:4px solid rgba(255,255,255,.15);
box-shadow:0 25px 60px rgba(0,0,0,.45);
position:relative;
z-index:2;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.status{
position:absolute;
bottom:6px;
right:6px;
width:18px;
height:18px;
background:#22c55e;
border:3px solid white;
border-radius:9999px;
z-index:20;
}

/* CHAT */

#chat{
scroll-behavior:smooth;
}

#chat::-webkit-scrollbar{
width:4px;
}

#chat::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:20px;
}

/* BURBUJAS */

.bot-row{
display:flex;
gap:10px;
align-items:flex-end;
animation:fade .25s ease;
}

.bot-mini{
width:36px;
height:36px;
border-radius:9999px;
overflow:hidden;
flex-shrink:0;
border:2px solid rgba(255,255,255,.15);
}

.bot-mini img{
width:100%;
height:100%;
object-fit:cover;
}

.bot-bubble{
background:rgba(255,255,255,.11);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:22px;
color:white;
font-size:14px;
line-height:1.5;
max-width:80%;
box-shadow:0 10px 35px rgba(0,0,0,.18);
}

.user-bubble{
background:
linear-gradient(
135deg,
#10b981,
#059669
);

padding:14px;
border-radius:22px;
color:white;
font-size:14px;
max-width:80%;
margin-left:auto;
box-shadow:0 10px 35px rgba(16,185,129,.25);
animation:fade .25s ease;
}

/* CONTROLES */

.controls{
background:rgba(0,0,0,.18);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.08);
}

.option-btn{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
color:white;
padding:12px 16px;
border-radius:18px;
font-size:14px;
transition:.2s;
backdrop-filter:blur(10px);
}

.option-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.16);
}

.input{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:18px;
color:white;
width:100%;
outline:none;
}

.input::placeholder{
color:rgba(255,255,255,.45);
}

/* MAP */

#map{
border-radius:24px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

/* ANIMACIONES */

@keyframes pulse{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.08);
opacity:.5;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
