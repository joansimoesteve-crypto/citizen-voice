<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CitizenVoice</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
margin:0;
}

.container{
max-width:520px;
width:100%;
}

.title{
font-size:40px;
font-weight:bold;
text-align:center;
color:#2e7d32;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:10px;
}

/* BOT */

.bot-avatar{
display:flex;
justify-content:center;
margin:10px 0 15px 0;
}

.head{

width:110px;
height:110px;
background:#2e7d32;
border-radius:50%;
position:relative;

}

.eye{

width:14px;
height:14px;
background:white;
border-radius:50%;
position:absolute;
top:32px;

}

.eye.left{ left:28px; }
.eye.right{ right:28px; }

.mouth{

width:34px;
height:8px;
background:white;
border-radius:4px;
position:absolute;
bottom:28px;
left:50%;
transform:translateX(-50%);

}

.talking{
animation:talk 0.25s infinite;
}

@keyframes talk{

0%{height:8px}
50%{height:20px}
100%{height:8px}

}

/* CHAT */

.chat{

background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
height:65vh;
overflow-y:auto;
display:flex;
flex-direction:column;

}

.bot{

background:#f1f1f1;
padding:14px;
border-radius:12px;
margin:6px 0;
max-width:85%;

}

.user{

background:#2e7d32;
color:white;
padding:10px;
border-radius:12px;
margin:6px 0;
align-self:flex-end;
max-width:85%;
font-size:12px;

}

button{

width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:16px;

}

textarea,input{

width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-top:6px;

}

.controls{

display:flex;
gap:8px;

}

</style>

</head>

<body>

<div class="container">

<div class="title">CitizenVoice</div>
<div class="subtitle">Tu opinión en 30 segundos</div>

<div class="bot-avatar">

<div class="head">

<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth" id="mouth"></div>

</div>

</div>

<div id="chat" class="chat"></div>

<button onclick="start()">Empezar encuesta</button>

</div>

<script>

let step=0
let data={}
const chat=document.getElementById("chat")

/* BOT HABLA */

function speak(text){

let mouth=document.getElementById("mouth")
mouth.classList.add("talking")

let msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"

msg.onend=()=>{
mouth.classList.remove("talking")
}

speechSynthesis.cancel()
speechSynthesis.speak(msg)

}

/* CHAT */

function bot(text){

let div=document.createElement("div")
div.className="bot"
div.innerText=text

chat.appendChild(div)

speak(text)

scroll()

}

function user(text){

let div=document.createElement("div")
div.className="user"
div.innerText=text

chat.appendChild(div)

scroll()

}

function scroll(){

setTimeout(()=>{
chat.scrollTop=chat.scrollHeight+500
},200)

}

/* LIMPIAR OPCIONES */

function clearOptions(){

document.querySelectorAll(".option").forEach(b=>b.remove())

}

/* INICIO */

function start(){

document.querySelector("button").remove()

step=1
next()

}

/* PASOS */

function next(){

if(step==1){

bot("¿Sobre qué área quieres opinar?")

options([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
],area)

}

if(step==2){

bot("¿Es una incidencia o una propuesta?")

options(["Incidencia","Propuesta"],tipo)

}

if(step==3){

bot("Describe la incidencia o propuesta")

let div=document.createElement("div")

div.id="descBox"

div.innerHTML=`

<textarea id="desc"></textarea>

<div class="controls">
<button onclick="voice()">🎤</button>
<button onclick="sendDesc()">Enviar</button>
</div>

`

chat.appendChild(div)

scroll()

}

if(step==4){

bot("Indica dirección o código de urna")

let div=document.createElement("div")

div.id="locBox"

div.innerHTML=`

<input id="loc" placeholder="Ej: Calle Mayor 10 o URNA-03">

<button onclick="sendLocation()">Enviar</button>

`

chat.appendChild(div)

scroll()

}

if(step==5){

bot("Valora el servicio de 1 a 5")

options(["1","2","3","4","5"],rate)

}

if(step==6){

bot("Gracias. Tu opinión ayuda a mejorar la ciudad.")

console.log(data)

}

}

/* BOTONES */

function options(list,callback){

list.forEach(v=>{

let b=document.createElement("button")

b.innerText=v
b.className="option"

b.onclick=()=>{

clearOptions()

user(v)

callback(v)

}

chat.appendChild(b)

})

}

/* RESPUESTAS */

function area(v){

data.area=v
step=2
next()

}

function tipo(v){

data.tipo=v
step=3
next()

}

function sendDesc(){

let val=document.getElementById("desc").value

data.descripcion=val

user(val)

document.getElementById("descBox").remove()

step=4
next()

}

function sendLocation(){

let val=document.getElementById("loc").value

data.ubicacion=val

user(val)

document.getElementById("locBox").remove()

step=5
next()

}

function rate(v){

data.valoracion=v

user("Valoración "+v)

step=6
next()

}

/* VOZ */

function voice(){

if(!('webkitSpeechRecognition' in window)){
alert("Voz no soportada")
return
}

let rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=function(e){

document.getElementById("desc").value=e.results[0][0].transcript

}

rec.start()

}

</script>

</body>
</html>
