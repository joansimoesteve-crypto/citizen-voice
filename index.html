<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<style>
#map { height: 520px; }
</style>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 text-center">
<div class="text-xl font-bold">
Citizen Voice
</div>
<div class="text-xs opacity-90">
Asistente virtual para participación activa · 30 segundos
</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- MAPA -->
<div id="mapWrap" class="hidden p-2">
<div id="map" class="rounded-2xl shadow"></div>
</div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ================= SUPABASE ================= */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ================= GLOBAL ================= */

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapWrap = document.getElementById("mapWrap")

let formData = {}
let map = null
let marker = null

/* ================= VOZ ================= */

function speak(text){
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

/* ================= BOT HUMANO ================= */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center shadow"

avatar.innerHTML = `
<svg width="18" height="18" viewBox="0 0 24 24" fill="white">
<circle cx="12" cy="8" r="4"/>
<path d="M4 20c2-4 14-4 16 0"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[85%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight

speak(text)
}

/* ================= USER ================= */

function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[85%] ml-auto"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ================= BOTONES ================= */

function buttons(list, cb){
controls.innerHTML = ""

list.forEach(t=>{
const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = t

b.onclick = ()=>{
controls.innerHTML = ""
user(t)
cb(t)
}

controls.appendChild(b)
})
}

/* ================= IA ================= */

async function callAI(description){
try{
const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ description })
})
return await res.json()
}catch(e){
return { resumen:"", acciones:[] }
}
}

/* ================= START ================= */

function start(){

formData = {}

bot("Hola, soy Citizen Voice. Asistente virtual para la participación ciudadana.")
speak("Hola, soy Citizen Voice")

/* WEEKLY */
bot("📊 Consulta semanal: ¿Cómo valoras la importancia de mejorar actividades culturales infantiles?")

buttons([
"😡 1","😕 2","😐 3","🙂 4","😄 5"
], async v=>{

formData.weekly = v

/* 🔥 SUPABASE WEEKLY */
await supabaseClient
.from("weekly_engagement")
.insert([{
value: v,
question: "actividades culturales infantiles"
}])

askType()

})
}

/* ================= TIPO ================= */

function askType(){
bot("¿Qué quieres registrar hoy?")
buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})
}

/* ================= AREA ================= */

function askArea(){
bot("¿En qué área ocurre y cómo valoras su estado actual?")
buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
askRate()
})
}

/* ================= RATING ================= */

function askRate(){
bot("Valora del 1 al 5 la situación actual")
buttons(["😡1","😕2","😐3","🙂4","😄5"], v=>{
formData.valoracion = v
showMap()
})
}

/* ================= MAPA FIX (NO ROMPE + MÁS GRANDE) ================= */

function showMap(){

bot("Indica la ubicación (puedes buscar o tocar el mapa)")

controls.innerHTML = ""
mapWrap.classList.remove("hidden")

setTimeout(()=>{

if(!map){

map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

}else{
map.invalidateSize()
}

const geocoder = L.Control.Geocoder.nominatim()

map.off()
map.on("click", e=>{

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

mapWrap.classList.add("hidden")

askDescription()

})

},250)
}

/* ================= DESCRIPCIÓN ================= */

function askDescription(){

bot("Describe la incidencia o mejora")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"
input.placeholder = "Escribe o usa voz"

const mic = document.createElement("button")
mic.innerText = "🎤"
mic.className = "bg-green-100 px-3 rounded-xl"

mic.onclick = ()=>{
const r = new webkitSpeechRecognition()
r.lang = "es-ES"
r.start()
r.onresult = e=>{
input.value = e.results[0][0].transcript
}
}

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

const ai = await callAI(input.value)

/* ================= SUPABASE INCIDENCIAS ================= */

await supabaseClient
.from("incidencias")
.insert([{
...formData,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

bot("Registro completado correctamente")

showEnd()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)
}

/* ================= FINAL ================= */

function showEnd(){

controls.innerHTML = ""

const panel = document.createElement("button")
panel.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
panel.innerText = "Ver datos"

panel.onclick = ()=>{
window.location.href =
"https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
}

const close = document.createElement("button")
close.className = "bg-gray-200 px-4 py-2 rounded-xl"
close.innerText = "Cerrar"

close.onclick = ()=>location.reload()

controls.appendChild(panel)
controls.appendChild(close)
}

/* ================= INIT ================= */

const startBtn = document.createElement("button")
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
