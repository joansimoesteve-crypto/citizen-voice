<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4">

<div class="flex items-center gap-3">

<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center overflow-hidden">
<svg width="22" height="22" viewBox="0 0 64 64">
<circle cx="32" cy="32" r="30" fill="#f3d6b3"/>
<circle cx="22" cy="26" r="3" fill="#333"/>
<circle cx="42" cy="26" r="3" fill="#333"/>
<path d="M22 42c5 6 15 6 20 0" stroke="#333" stroke-width="3" fill="none"/>
</svg>
</div>

<div>
<div class="font-bold text-lg">Citizen Voice</div>
<div class="text-xs opacity-90">Asistente ciudadano</div>
</div>

</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- MAP -->
<div id="mapContainer" class="hidden p-2">
<div id="map" class="w-full h-[340px] rounded-2xl shadow"></div>
</div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

let formData = {}
let map = null
let marker = null

/* ===================== */
/* BOT */
/* ===================== */

function bot(text){
const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-green-600 flex items-center justify-center"

avatar.innerHTML = `
<svg width="20" height="20" viewBox="0 0 64 64">
<circle cx="32" cy="32" r="30" fill="#f3d6b3"/>
<circle cx="22" cy="26" r="3" fill="#333"/>
<circle cx="42" cy="26" r="3" fill="#333"/>
<path d="M22 42c5 6 15 6 20 0" stroke="#333" stroke-width="3" fill="none"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, cb){
controls.innerHTML = ""

list.forEach(t=>{
const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = t

b.onclick = ()=>{
controls.innerHTML = ""
user(t)
cb(t)
}

controls.appendChild(b)
})
}

/* ===================== */
/* PREGUNTA SEMANAL (RESTO ESTABLE) */
/* ===================== */

async function saveWeekly(answer){

await supabaseClient
.from("weekly_consultations")
.insert([{
week_id: "week-1",
question: "Importancia actividades culturales",
answer: answer
}])
}

/* ===================== */
/* START */
/* ===================== */

function start(){

formData = {}

bot("Hola, soy Citizen Voice, tu asistente virtual para la participación ciudadana.")

bot("Consulta semanal:")

bot("¿Qué importancia das a mejorar actividades culturales en la ciudad?")

buttons(["😡 1","😕 2","😐 3","🙂 4","😄 5"], async v=>{

await saveWeekly(v)

formData.weekly = v

askType()
})

}

/* ===================== */
/* FLUJO INCIDENCIAS */
/* ===================== */

function askType(){

bot("¿Qué quieres registrar?")

buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})

}

function askArea(){

bot("¿En qué área?")

buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
askRating()
})

}

function askRating(){

bot("¿Cómo valoras esta área actualmente?")

buttons(["1","2","3","4","5"], v=>{
formData.valoracion = v
showMap()
})

}

/* ===================== */
/* MAPA (ESTABLE) */
/* ===================== */

function showMap(){

bot("Selecciona ubicación")

controls.innerHTML = ""
mapContainer.classList.remove("hidden")

setTimeout(()=>{

if(!map){
map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)
}

map.invalidateSize()

map.off()

map.on("click", e=>{

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

askDescription()

})

},200)

}

/* ===================== */
/* DESCRIPCIÓN + SAVE */
/* ===================== */

function askDescription(){

bot("Describe la incidencia o mejora")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"

const send = document.createElement("button")
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
send.innerText = "Enviar"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient
.from("incidencias")
.insert([formData])

bot("Registro guardado correctamente")

showFinal()
}

controls.appendChild(input)
controls.appendChild(send)

}

/* ===================== */
/* FINAL */
/* ===================== */

function showFinal(){

controls.innerHTML = ""

const close = document.createElement("button")
close.className = "bg-gray-200 px-4 py-2 rounded-xl"
close.innerText = "Cerrar"

close.onclick = ()=> location.reload()

const panel = document.createElement("button")
panel.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
panel.innerText = "Ver datos"

panel.onclick = ()=>{
window.location.href =
"https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
}

controls.appendChild(close)
controls.appendChild(panel)

}

/* ===================== */
/* INIT */
/* ===================== */

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapContainer = document.getElementById("mapContainer")

const startBtn = document.createElement("button")
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
