<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- GEOCODER -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-green-700 text-white p-4 text-center">

<div class="text-2xl font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Incidencias en 30 segundos
</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* VARIABLES */
/* ===================== */

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){

const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
speechSynthesis.speak(msg)

}

/* ===================== */
/* USER MESSAGE */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text

chat.appendChild(d)

setTimeout(()=> chat.scrollTop = chat.scrollHeight, 100)

}

/* ===================== */
/* BOT MESSAGE (SIN ICONOS) */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex"

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(bubble)
chat.appendChild(row)

setTimeout(()=> chat.scrollTop = chat.scrollHeight, 100)

speak(text)

}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, callback){

controls.innerHTML = ""

list.forEach(o=>{

const b = document.createElement("button")
b.className = "bg-green-100 hover:bg-green-200 transition px-4 py-2 rounded-xl text-sm"
b.innerText = o

b.onclick = ()=>{

controls.innerHTML = ""

user(o)

callback(o)

}

controls.appendChild(b)

})

}

/* ===================== */
/* START */
/* ===================== */

function start(){

bot("Hola. ¿Qué deseas registrar?")

buttons(
["Incidencia","Propuesta de mejora"],
v=>{
formData.tipo = v
askArea()
})

}

/* ===================== */
/* AREA */
/* ===================== */

function askArea(){

bot("¿En qué área?")

buttons(
["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad","Otros"],
v=>{
formData.area = v
askRate()
})

}

/* ===================== */
/* VALORACIÓN */
/* ===================== */

function askRate(){

bot("Valora del 1 al 5 la situación actual")

buttons(
["1","2","3","4","5"],
v=>{
formData.valoracion = v
showMap()
})

}

/* ===================== */
/* MAPA */
/* ===================== */

function showMap(){

bot("Busca o marca la ubicación")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full mb-2 text-sm"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "500px"
mapDiv.className = "rounded-2xl shadow"

chat.appendChild(search)
chat.appendChild(mapDiv)

setTimeout(()=> chat.scrollTop = chat.scrollHeight, 200)

setTimeout(()=>{

const map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let marker
const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{

if(e.key === "Enter"){

geocoder.geocode(search.value,(results)=>{

if(results.length > 0){

const r = results[0]

map.setView(r.center,16)

if(marker) map.removeLayer(marker)

marker = L.marker(r.center).addTo(map)

formData.lat = r.center.lat
formData.lng = r.center.lng

bot("Ubicación guardada")

askDescription()

}

})

}

})

map.on("click",e=>{

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

bot("Ubicación guardada")

askDescription()

})

},300)

}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Describe la incidencia")

controls.innerHTML = ""

const input = document.createElement("input")
input.placeholder = "Escribe o usa micrófono"
input.className = "border p-3 rounded-xl flex-1 text-sm"

const mic = document.createElement("button")
mic.innerText = "🎤"
mic.className = "bg-green-100 px-4 rounded-xl"

mic.onclick = ()=>{

const r = new webkitSpeechRecognition()
r.lang = "es-ES"
r.start()

r.onresult = e=>{
input.value = e.results[0][0].transcript
}

}

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"

send.onclick = ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

saveData()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

/* ===================== */
/* IA (HUGGING FACE VIA VERCEL API) */
/* ===================== */

async function callAI(description){

  try {

    const res = await fetch("/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ description })
    })

    const data = await res.json()

    console.log("🔥 RESPUESTA API /api/ai:", data)

    return data

  } catch(err){

    console.log("❌ ERROR CALLAI:", err)

    return {
      resumen:"",
      acciones:[]
    }

  }

}

/* ===================== */
/* GUARDAR EN SUPABASE */
/* ===================== */

async function saveData(){

try{

const aiData = await callAI(formData.descripcion)

const incidencia = {

tipo: formData.tipo || "",
area: formData.area || "",
valoracion: formData.valoracion || "",
descripcion: formData.descripcion || "",
lat: formData.lat || null,
lng: formData.lng || null,
resumen: aiData.resumen || "",
acciones: aiData.acciones || []

}

const { error } = await supabaseClient
.from("incidencias")
.insert([incidencia])

if(error){

bot("Error guardando incidencia")
return

}

bot("Incidencia registrada correctamente")

}catch(err){

console.log(err)
bot("Ha ocurrido un error")

}

}

/* ===================== */
/* START BUTTON */
/* ===================== */

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"

startBtn.className =
"w-full bg-green-600 hover:bg-green-700 transition text-white px-4 py-3 rounded-xl text-lg"

startBtn.onclick = ()=>{

controls.innerHTML = ""
start()

}

controls.appendChild(startBtn)

</script>

</body>
</html>
