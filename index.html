<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[85vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->

<div class="bg-green-700 text-white p-4 text-center">

<div class="text-lg font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Registra incidencias en 30 segundos con el asistente urbano
</div>

</div>

<!-- CHAT -->

<div id="chat" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

<!-- CONTROLES -->

<div id="controls" class="p-3 border-t flex flex-wrap gap-2 items-center"></div>

</div>

<script>

const chat=document.getElementById("chat")
const controls=document.getElementById("controls")

let data={}

function speak(text){

const msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.speak(msg)

}

function bot(text){

const row=document.createElement("div")
row.className="flex items-start gap-2 max-w-[85%]"

const avatar=document.createElement("img")
avatar.src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png"
avatar.className="w-8 h-8"

const bubble=document.createElement("div")
bubble.className="bg-gray-100 p-3 rounded-xl text-sm"
bubble.innerText=text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

chat.scrollTop=chat.scrollHeight

speak(text)

}

function user(text){

const d=document.createElement("div")

d.className="bg-green-600 text-white p-3 rounded-xl max-w-[75%] ml-auto text-sm"

d.innerText=text

chat.appendChild(d)

chat.scrollTop=chat.scrollHeight

}

function buttons(list,callback){

controls.innerHTML=""

list.forEach(o=>{

const b=document.createElement("button")

b.className="bg-green-100 hover:bg-green-200 px-3 py-2 rounded-lg text-sm"

b.innerText=o

b.onclick=()=>{

controls.innerHTML=""

user(o)

callback(o)

}

controls.appendChild(b)

})

}

function start(){

bot("Hola 👋 ¿Qué deseas registrar?")

buttons(["Incidencia","Propuesta"],v=>{

data.tipo=v

askArea()

})

}

function askArea(){

bot("¿En qué área?")

buttons(
["Limpieza","Movilidad","Seguridad","Espacio público"],
v=>{

data.area=v

askDescription()

})

}

function askDescription(){

bot("Describe brevemente el problema o usa el micrófono")

controls.innerHTML=""

const input=document.createElement("input")

input.placeholder="Escribe aquí..."

input.className="border rounded-lg p-2 flex-1 text-sm"

const mic=document.createElement("button")
mic.innerText="🎤"
mic.className="bg-gray-100 px-3 py-2 rounded-lg"

mic.onclick=()=>{

const r=new webkitSpeechRecognition()

r.lang="es-ES"

r.start()

r.onresult=e=>{

input.value=e.results[0][0].transcript

}

}

const send=document.createElement("button")

send.innerText="Enviar"

send.className="bg-green-600 text-white px-3 py-2 rounded-lg text-sm"

send.onclick=()=>{

if(input.value==="") return

user(input.value)

data.descripcion=input.value

controls.innerHTML=""

finish()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

function finish(){

bot("✅ Gracias. Tu aportación ha sido registrada.")

}

start()

</script>

</body>

</html>
