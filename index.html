<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

<!-- ===================== -->
<!-- HEADER CREDIBILIDAD -->
<!-- ===================== -->

<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4">

<div class="flex items-center gap-3">

<!-- AVATAR HUMANO (NO ICONOS LEÍBLES) -->
<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center overflow-hidden">

<!-- SVG cara humana simple -->
<svg width="34" height="34" viewBox="0 0 24 24" fill="white">
<path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/>
<path d="M4 21c0-3.3 3.6-6 8-6s8 2.7 8 6"/>
</svg>

</div>

<div>
<div class="font-bold text-lg">Citizen Voice</div>
<div class="text-xs opacity-90">
Asistente virtual para participación ciudadana
</div>
</div>

</div>

</div>

<!-- ===================== -->
<!-- CHAT -->
<!-- ===================== -->

<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let map, marker
let mapReady = false

/* ===================== */
/* BOT (SIN ICONOS LEÍBLES) */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className =
"w-10 h-10 rounded-full bg-green-600 flex items-center justify-center"

avatar.innerHTML = `
<svg width="20" height="20" viewBox="0 0 24 24" fill="white">
<path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/>
<path d="M4 21c0-3.3 3.6-6 8-6s8 2.7 8 6"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text

chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, cb){

controls.innerHTML = ""

list.forEach(t=>{

const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"

b.innerText = t

b.onclick = ()=>{
controls.innerHTML = ""
user(t)
cb(t)
}

controls.appendChild(b)

})

}

/* ===================== */
/* START */
/* ===================== */

function start(){

bot("Vamos a registrar tu participación.")

bot("#ConsultaSemanal-1 ¿Qué importancia das a mejorar actividades culturales infantiles?")

buttons(["1","2","3","4","5"], v=>{
formData.weekly = v
askType()
})

}

/* ===================== */
/* MAPA FIX (ESTE ES EL CLAVE) */
/* ===================== */

function initMap(){

if(mapReady) return

map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

mapReady = true
}

/* ===================== */
/* MAPA STEP */
/* ===================== */

function showMap(){

bot("Indica ubicación")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full text-sm"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.className = "w-full h-[480px] rounded-2xl shadow mt-2"

chat.appendChild(search)
chat.appendChild(mapDiv)

setTimeout(()=>{

initMap()

setTimeout(()=>{
map.invalidateSize()
},200)

let geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

geocoder.geocode(search.value, r=>{

if(r.length){

let p = r[0].center

map.setView(p,16)

if(marker) map.removeLayer(marker)

marker = L.marker(p).addTo(map)

formData.lat = p.lat
formData.lng = p.lng

askDescription()

}

})

}

})

map.on("click", e=>{

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

askDescription()

})

},300)

}

/* ===================== */
/* FLUJO (RESUMIDO) */
/* ===================== */

function askType(){
bot("¿Incidencia o mejora?")
buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})
}

function askArea(){
bot("¿En qué área?")
buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
showMap()
})
}

function askDescription(){

bot("Describe la situación")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1"

const send = document.createElement("button")
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
send.innerText = "Enviar"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient
.from("incidencias")
.insert([formData])

bot("Registro completado")

}

controls.appendChild(input)
controls.appendChild(send)

}

/* ===================== */
/* START BUTTON */
/* ===================== */

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
