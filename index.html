<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 text-center">
<div class="text-xl font-bold">Citizen Voice</div>
<div class="text-xs opacity-90">Asistente ciudadano</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE (NO TOCAR) */
/* ===================== */
const { createClient } = supabase
const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}

/* ===================== */
/* VOZ */
/* ===================== */
function speak(text){
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

/* ===================== */
/* BOT SIMPLE Y ESTABLE */
/* ===================== */
function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-white flex items-center justify-center shadow"
avatar.innerHTML = "🙂"

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight

speak(text)
}

/* ===================== */
/* USER */
/* ===================== */
function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* BOTONES */
/* ===================== */
function buttons(list, callback){
controls.innerHTML = ""
list.forEach(o=>{
const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = o
b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}
controls.appendChild(b)
})
}

/* ===================== */
/* START */
/* ===================== */
function start(){

formData = {}

bot("Hola, soy Citizen Voice. Vamos a empezar con una pregunta rápida.")

setTimeout(()=> weeklyQuestion(), 800)
}

/* ===================== */
/* WEEKLY (FIJO + FUNCIONAL) */
/* ===================== */
function weeklyQuestion(){

bot("¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons(["1","2","3","4","5"], async (v)=>{

formData.weekly = parseInt(v)

await supabaseClient.from("weekly_engagement").insert([{
week: new Date().getMonth()+1,
question: "Espacios culturales infantiles",
answer: formData.weekly,
created_at: new Date().toISOString()
}])

bot("Gracias. Ahora sí, vamos con tu registro.")

setTimeout(()=> askType(), 900)
})
}

/* ===================== */
/* FLUJO INCIDENCIAS */
/* ===================== */
function askType(){
bot("¿Qué quieres registrar?")
buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})
}

function askArea(){
bot("¿En qué área?")
buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad","Otros"], v=>{
formData.area = v
askRate()
})
}

function askRate(){
bot("Valora la situación del 1 al 5")
buttons(["1","2","3","4","5"], v=>{
formData.valoracion = v
showMap()
})
}

/* ===================== */
/* MAPA (TU VERSIÓN SEGURA) */
/* ===================== */
function showMap(){

bot("Indica la ubicación")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full mb-2 text-sm"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "400px"
mapDiv.className = "rounded-2xl shadow"

chat.appendChild(search)
chat.appendChild(mapDiv)

setTimeout(()=>{

const map = L.map('map').setView([39.47,-0.37],13)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let marker
const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
geocoder.geocode(search.value, results=>{
if(results.length){
const r = results[0]
map.setView(r.center,16)

if(marker) map.removeLayer(marker)
marker = L.marker(r.center).addTo(map)

formData.lat = r.center.lat
formData.lng = r.center.lng

bot("Ubicación registrada")

setTimeout(()=> askDescription(), 600)
}
})
}
})

map.on("click", e=>{
if(marker) map.removeLayer(marker)
marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

bot("Ubicación registrada")

setTimeout(()=> askDescription(), 600)
})

},300)
}

/* ===================== */
/* DESCRIPCIÓN + SUPABASE */
/* ===================== */
function askDescription(){

bot("Cuéntame qué ha pasado")

controls.innerHTML = ""

const input = document.createElement("input")
input.placeholder = "Escribe o habla"
input.className = "border p-3 rounded-xl flex-1 text-sm"

const mic = document.createElement("button")
mic.innerText = "🎤"
mic.className = "bg-green-100 px-3 rounded-xl"

mic.onclick = ()=>{
const r = new webkitSpeechRecognition()
r.lang = "es-ES"
r.start()
r.onresult = e=>{
input.value = e.results[0][0].transcript
}
}

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient.from("incidencias").insert([formData])

bot("Registrado correctamente")
}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)
}

/* ===================== */
/* INIT */
/* ===================== */
const startBtn = document.createElement("button")
startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
