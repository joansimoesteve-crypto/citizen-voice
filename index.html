<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CitizenVoice</title>

<style>

body{
font-family: Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
text-align:center;
font-size:42px;
font-weight:900;
color:#2c5cff;
margin-bottom:10px;
letter-spacing:1px;
}

.chat{
background:#f8f8f8;
border-radius:12px;
padding:15px;
height:220px;
overflow-y:auto;
margin-bottom:15px;
}

.bubble{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.inputArea{
display:flex;
flex-direction:column;
gap:10px;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.buttons{
display:flex;
gap:10px;
}

button{
border:none;
border-radius:50px;
cursor:pointer;
padding:10px 14px;
font-size:14px;
}

.mic{
background:#2c5cff;
color:white;
}

.send{
background:#28a745;
color:white;
}

.location{
background:#ff9800;
color:white;
}

.small{
padding:6px 10px;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>CitizenVoice</h1>

<div id="chat" class="chat"></div>

<div class="inputArea">

<label><b>Valora el servicio al que te estás refiriendo</b></label>

<input id="respuesta" placeholder="Escribe tu respuesta...">

<div class="buttons">

<button id="micBtn" class="mic" onclick="startVoice()">🎤</button>

<button id="sendBtn" class="send" onclick="sendAnswer()">Enviar</button>

<button id="locBtn" class="location" onclick="getLocation()">📍</button>

</div>

</div>

</div>

<script>

let preguntas=[
"Hola, gracias por participar. ¿Qué servicio municipal deseas valorar?",
"¿Cómo valorarías el servicio del 1 al 5?",
"Describe brevemente tu experiencia."
];

let paso=0;

let synth=window.speechSynthesis;

function speak(text){

let msg=new SpeechSynthesisUtterance(text);

msg.lang="es-ES";

speechSynthesis.cancel();
speechSynthesis.speak(msg);

}

function mostrarPregunta(){

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="bubble">${preguntas[paso]}</div>`;

chat.scrollTop=chat.scrollHeight;

speak(preguntas[paso]);

}

window.onload=function(){

setTimeout(mostrarPregunta,500);

}

function sendAnswer(){

let input=document.getElementById("respuesta");

if(input.value==="") return;

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="bubble">${input.value}</div>`;

input.value="";

paso++;

document.getElementById("micBtn").classList.add("small");
document.getElementById("sendBtn").classList.add("small");

if(paso<preguntas.length){

setTimeout(mostrarPregunta,500);

}else{

chat.innerHTML+=`<div class="bubble">Gracias por tu participación.</div>`;

}

chat.scrollTop=chat.scrollHeight;

}

function startVoice(){

let recognition=new webkitSpeechRecognition();

recognition.lang="es-ES";

recognition.onresult=function(e){

document.getElementById("respuesta").value=e.results[0][0].transcript;

};

recognition.start();

}

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="bubble">Ubicación registrada ✔</div>`;

chat.scrollTop=chat.scrollHeight+200;

});

}

</script>

</body>
</html>
