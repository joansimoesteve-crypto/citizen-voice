<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- GEOCODER -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-green-700 text-white p-4 text-center">
<div class="text-2xl font-bold">Citizen Voice</div>
<div class="text-xs opacity-90">Incidencias en 30 segundos</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ===================== */
/* ESTADO */
/* ===================== */

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let data = {}

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
speechSynthesis.speak(msg)
}

/* ===================== */
/* BOT */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-green-600 flex items-center justify-center text-xl"
avatar.innerHTML = "🤖"

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
setTimeout(()=>chat.scrollTop = chat.scrollHeight,100)

speak(text)
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text
chat.appendChild(d)
setTimeout(()=>chat.scrollTop = chat.scrollHeight,100)
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list,callback){
controls.innerHTML = ""

list.forEach(o=>{
const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = o

b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}

controls.appendChild(b)
})
}

/* ===================== */
/* START */
/* ===================== */

function start(){
bot("Hola, ¿qué deseas registrar?")
buttons(["Incidencia","Propuesta de mejora"], v=>{
data.tipo = v
askArea()
})
}

/* ===================== */
/* AREA */
/* ===================== */

function askArea(){
bot("¿En qué área?")
buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad","Otros"], v=>{
data.area = v
askRate()
})
}

/* ===================== */
/* VALORACIÓN */
/* ===================== */

function askRate(){
bot("Valora del 1 al 5")
buttons(["1","2","3","4","5"], v=>{
data.valoracion = v
showMap()
})
}

/* ===================== */
/* MAPA */
/* ===================== */

function showMap(){

bot("Marca o busca ubicación 📍")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full mb-2"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "450px"
mapDiv.className = "rounded-xl"

chat.appendChild(search)
chat.appendChild(mapDiv)

setTimeout(()=>chat.scrollTop = chat.scrollHeight,200)

setTimeout(()=>{

const map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let marker

const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown", e=>{
if(e.key === "Enter"){

geocoder.geocode(search.value, results=>{
if(results.length){

const r = results[0]

map.setView(r.center,16)

if(marker) map.removeLayer(marker)
marker = L.marker(r.center).addTo(map)

data.lat = r.center.lat
data.lng = r.center.lng

user("Ubicación encontrada")
askDescription()

}
})

}
})

map.on("click", e=>{
if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

data.lat = e.latlng.lat
data.lng = e.latlng.lng

user("Ubicación guardada")
askDescription()
})

},300)

}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Describe la incidencia")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1"
input.placeholder = "Escribe aquí..."

const send = document.createElement("button")
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
send.innerText = "Enviar"

send.onclick = ()=>{
if(!input.value) return

user(input.value)
data.descripcion = input.value
saveData()
}

controls.appendChild(input)
controls.appendChild(send)

}

/* ===================== */
/* GEMINI */
/* ===================== */

async function callGemini(description, area, tipo){

const prompt = `
Devuelve SOLO JSON:

{
"resumen":"",
"acciones":[]
}

Texto:
${description}
Área:${area}
Tipo:${tipo}
`

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyD4eEVcGUPBuDzlE5edGhud4DYlZBAj1D8",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
}
)

const json = await res.json()

const text = json?.candidates?.[0]?.content?.parts?.[0]?.text || ""

try{
const match = text.match(/\{[\s\S]*\}/)
return JSON.parse(match[0])
}catch(e){
return {resumen:text,acciones:[]}
}

}

/* ===================== */
/* GUARDAR (ARREGLADO) */
/* ===================== */

async function saveData(){

const incidencia = {
fecha: new Date().toISOString(),   // 🔥 FIX CLAVE
tipo: data.tipo || "",
area: data.area || "",
valoracion: data.valoracion || "",
descripcion: data.descripcion || "",
lat: data.lat ?? null,
lng: data.lng ?? null
}

console.log("INCIDENCIA:", incidencia)

const { data: saved, error } = await supabaseClient
.from("incidencias")
.insert([incidencia])
.select()

if(error){
console.log("SUPABASE ERROR:", error)
bot("Error guardando ❌")
return
}

const id = saved?.[0]?.id

const aiData = await callGemini(
data.descripcion,
data.area,
data.tipo
)

const { error: updateError } = await supabaseClient
.from("incidencias")
.update({
resumen: aiData.resumen,
acciones: aiData.acciones
})
.eq("id", id)

if(updateError){
console.log("UPDATE ERROR:", updateError)
bot("Error IA ❌")
return
}

bot("Incidencia registrada y analizada correctamente ✅")

}

/* ===================== */
/* START BUTTON */
/* ===================== */

const startBtn = document.createElement("button")
startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white p-3 rounded-xl"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
