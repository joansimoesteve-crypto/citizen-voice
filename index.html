<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 flex items-center gap-3">

  <!-- BOT AVATAR FIJO (MEJORADO) -->
  <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center shadow-lg shrink-0">
    <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="20" r="10" fill="white"/>
      <path d="M18 52c4-10 12-15 14-15s10 5 14 15" fill="white"/>
      <circle cx="28" cy="18" r="1.8" fill="#10b981"/>
      <circle cx="36" cy="18" r="1.8" fill="#10b981"/>
      <path d="M28 24c2 2 6 2 8 0" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div>
    <div class="text-lg font-bold">Citizen Voice</div>
    <div class="text-xs opacity-90">Asistente virtual ciudadano</div>
  </div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 scroll-smooth"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE (INTACTO) */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let currentMap = null

/* ===================== */
/* SCROLL AUTOMÁTICO FIABLE */
/* ===================== */

function scrollChat(){
  setTimeout(()=>{
    chat.scrollTop = chat.scrollHeight
  }, 50)
}

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){
speechSynthesis.cancel()
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
msg.rate = 1
speechSynthesis.speak(msg)
}

/* ===================== */
/* BOT (MEJOR UX) */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-9 h-9 rounded-full bg-emerald-600 flex items-center justify-center shadow shrink-0"
avatar.innerHTML = "🧑‍💬"

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%] leading-relaxed"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

scrollChat()
speak(text)
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text

chat.appendChild(d)

scrollChat()
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, callback){

controls.innerHTML = ""

list.forEach(o=>{

const b = document.createElement("button")
b.className = "bg-green-100 hover:bg-green-200 transition px-4 py-2 rounded-xl text-sm"
b.innerText = o

b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}

controls.appendChild(b)
})

scrollChat()
}

/* ===================== */
/* PREGUNTA SEMANAL */
/* ===================== */

function weeklyQuestion(){

bot("Vamos a empezar con una pregunta rápida.")

setTimeout(()=>{
bot("¿Qué importancia das a mejorar los espacios culturales infantiles?")
}, 900)

buttons([
"1","2","3","4","5"
], async (v)=>{

try{
await supabaseClient.from("weekly_engagement").insert([{
week: 1,
question: "Espacios culturales infantiles",
area: "Cultura",
answer: parseInt(v),
created_at: new Date().toISOString()
}])
}catch(e){}

bot("Perfecto. Ahora dime qué quieres registrar.")
askType()
})
}

/* ===================== */
/* FLUJO (SIN CAMBIOS) */
/* ===================== */

function askType(){
buttons(["Incidencia","Propuesta de mejora"], v=>{
formData.tipo = v
bot("¿En qué área ocurre?")
askArea()
})
}

function askArea(){
buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad","Otros"], v=>{
formData.area = v
bot("Valora del 1 al 5 la situación")
askRate()
})
}

function askRate(){
buttons(["1","2","3","4","5"], v=>{
formData.valoracion = v
showMap()
})
}

/* ===================== */
/* MAPA (INTACTO) */
/* ===================== */

function showMap(){

bot("Indica dónde ocurre")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full mb-2 text-sm"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "320px"
mapDiv.className = "rounded-2xl shadow"

controls.appendChild(search)
controls.appendChild(mapDiv)

setTimeout(()=>{

if(currentMap) currentMap.remove()

currentMap = L.map('map').setView([39.47,-0.37],13)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(currentMap)

let marker

const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
geocoder.geocode(search.value, results=>{
if(results.length>0){

const r = results[0]

currentMap.setView(r.center,16)

if(marker) currentMap.removeLayer(marker)
marker = L.marker(r.center).addTo(currentMap)

formData.lat = r.center.lat
formData.lng = r.center.lng

bot("Ubicación registrada")
askDescription()
}
})
}
})

currentMap.on("click", e=>{
if(marker) currentMap.removeLayer(marker)
marker = L.marker(e.latlng).addTo(currentMap)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

bot("Ubicación guardada")
askDescription()
})

},300)
}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Describe brevemente la situación.")

controls.innerHTML = ""

const input = document.createElement("input")
input.placeholder = "Escribe aquí..."
input.className = "border p-3 rounded-xl flex-1 text-sm"

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient.from("incidencias").insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng
}])

bot("Registro completado")

}

controls.appendChild(input)
controls.appendChild(send)

scrollChat()
}

/* ===================== */
/* INIT */
/* ===================== */

const startBtn = document.createElement("button")
startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{
controls.innerHTML = ""
weeklyQuestion()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
