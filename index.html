<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CitizenVoice</title>

<style>

body{
font-family:Arial, sans-serif;
background:#e8f5e9;
margin:0;
display:flex;
justify-content:center;
}

#container{
max-width:520px;
width:100%;
padding:10px;
}

#title{
font-size:26px;
font-weight:bold;
text-align:center;
color:#1b5e20;
}

#subtitle{
text-align:center;
font-size:14px;
margin-bottom:10px;
}

#chat{
background:white;
border-radius:15px;
padding:15px;
height:70vh;
overflow-y:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.bubble{
padding:14px;
margin:6px 0;
border-radius:16px;
max-width:75%;
font-size:16px;
}

.bot{
background:#f1f1f1;
}

.user{
background:#1faa59;
color:white;
margin-left:auto;
}

.bubble.old{
font-size:12px;
opacity:0.8;
}

button.option{
display:block;
width:90%;
margin:6px auto;
padding:14px;
font-size:16px;
border:none;
border-radius:25px;
background:#1faa59;
color:white;
cursor:pointer;
}

.inputRow{
display:flex;
gap:6px;
margin-top:8px;
}

.inputRow input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.micBtn{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#43a047;
color:white;
font-size:18px;
}

.sendBtn{
padding:0 14px;
border-radius:10px;
border:none;
background:#1faa59;
color:white;
font-weight:bold;
}

.ratingContainer{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.ratingBtn{
width:45px;
height:45px;
border-radius:50%;
background:#1faa59;
border:none;
color:white;
font-size:18px;
}

.suggestion{
padding:5px;
background:#e0f2f1;
margin:2px 0;
cursor:pointer;
border-radius:5px;
}

</style>
</head>

<body>

<div id="container">

<div id="title">CitizenVoice</div>
<div id="subtitle">Deja tu opinión en solo 30 segundos</div>

<div id="chat"></div>

</div>

<script>

const chat=document.getElementById("chat")

let area=""
let subarea=""
let tipo=""
let descripcion=""
let puntuacion=""
let lat=""
let lon=""

let speechAllowed=true

function scrollChat(){
chat.scrollTop=chat.scrollHeight
}

function shrinkBubbles(){
document.querySelectorAll('.bubble').forEach(b=>{
b.classList.add("old")
})
}

function addBot(text){

shrinkBubbles()

const div=document.createElement("div")
div.className="bubble bot"
div.innerText=text

chat.appendChild(div)

scrollChat()

if(speechAllowed){
const msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.speak(msg)
}

}

function addUser(text){

shrinkBubbles()

const div=document.createElement("div")
div.className="bubble user"
div.innerText=text

chat.appendChild(div)

scrollChat()

}

function removeOptions(){
document.querySelectorAll(".option").forEach(b=>b.remove())
}

function askArea(){

addBot("¿Sobre qué área quieres opinar?")

const areas=[
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
]

areas.forEach(a=>{

const btn=document.createElement("button")
btn.className="option"
btn.innerText=a

btn.onclick=()=>{

area=a

addUser(a)

removeOptions()

if(a==="Otros") askSubarea()
else askTipo()

}

chat.appendChild(btn)

})

scrollChat()

}

function askSubarea(){

addBot("Especifica el área")

const input=document.createElement("input")

const send=document.createElement("button")
send.innerText="Enviar"
send.className="sendBtn"

send.onclick=()=>{

subarea=input.value

addUser(subarea)

input.remove()
send.remove()

askTipo()

}

chat.appendChild(input)
chat.appendChild(send)

}

function askTipo(){

addBot("¿Es una incidencia o propuesta?")

const opciones=["Incidencia","Propuesta"]

opciones.forEach(t=>{

const btn=document.createElement("button")
btn.className="option"
btn.innerText=t

btn.onclick=()=>{

tipo=t

addUser(t)

removeOptions()

askDescripcion()

}

chat.appendChild(btn)

})

scrollChat()

}

function askDescripcion(){

addBot("Describe tu mensaje. Puedes usar texto o voz.")

const row=document.createElement("div")
row.className="inputRow"

const input=document.createElement("input")

const mic=document.createElement("button")
mic.innerText="🎤"
mic.className="micBtn"

mic.onclick=()=>{

let recognition

if(window.SpeechRecognition || window.webkitSpeechRecognition){

recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="es-ES"

recognition.onresult=e=>{
input.value=e.results[0][0].transcript
}

recognition.start()

}

}

const send=document.createElement("button")
send.innerText="Enviar"
send.className="sendBtn"

send.onclick=()=>{

descripcion=input.value

addUser(descripcion)

row.remove()

askPuntuacion()

}

row.appendChild(input)
row.appendChild(mic)
row.appendChild(send)

chat.appendChild(row)

scrollChat()

}

function askPuntuacion(){

addBot("Valora el servicio de 1 a 5")

const div=document.createElement("div")
div.className="ratingContainer"

for(let i=1;i<=5;i++){

const btn=document.createElement("button")
btn.className="ratingBtn"
btn.innerText=i

btn.onclick=()=>{

puntuacion=i

addUser(i)

div.remove()

askUbicacion()

}

div.appendChild(btn)

}

chat.appendChild(div)

}

function askUbicacion(){

addBot("Indica la ubicación donde propones o señalas la incidencia.")

const input=document.createElement("input")
input.placeholder="Escribe calle o lugar..."

const suggestions=document.createElement("div")

const send=document.createElement("button")
send.innerText="Enviar ubicación"
send.className="sendBtn"

chat.appendChild(input)
chat.appendChild(suggestions)
chat.appendChild(send)

scrollChat()

async function buscar(text){

const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(text)}&limit=5`)

const data=await res.json()

return data.features

}

input.addEventListener("input",async()=>{

if(input.value.length<3)return

const results=await buscar(input.value)

suggestions.innerHTML=""

results.forEach(r=>{

const div=document.createElement("div")

div.className="suggestion"

div.innerText=r.properties.name

div.onclick=()=>{

input.value=r.properties.name

lat=r.geometry.coordinates[1]
lon=r.geometry.coordinates[0]

suggestions.innerHTML=""

}

suggestions.appendChild(div)

})

})

send.onclick=async()=>{

addUser(input.value)

input.remove()
suggestions.remove()
send.remove()

const registro={
area,
subarea,
tipo,
descripcion,
puntuacion,
lat,
lon,
timestamp:Date.now()
}

const hash=await generarHash(JSON.stringify(registro))

registro.hash=hash

console.log("Registro verificado",registro)

addBot("Tu opinión ha sido registrada correctamente. Gracias por participar.")

}

}

async function generarHash(text){

const msgUint8=new TextEncoder().encode(text)

const hashBuffer=await crypto.subtle.digest("SHA-256",msgUint8)

const hashArray=Array.from(new Uint8Array(hashBuffer))

const hashHex=hashArray.map(b=>b.toString(16).padStart(2,"0")).join("")

return hashHex

}

askArea()

</script>

</body>
</html>
