<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CitizenVoice</title>

<style>

body{
font-family: Arial;
background:#f2f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:420px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
text-align:center;
font-size:38px;
font-weight:800;
color:#1f4fbf;
margin-bottom:20px;
}

.chat{
background:#f7f7f7;
padding:20px;
border-radius:15px;
height:200px;
overflow-y:auto;
margin-bottom:15px;
}

.bubble{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

.btn{
border:none;
padding:10px 14px;
border-radius:50px;
cursor:pointer;
font-size:14px;
}

.mic{
background:#1f4fbf;
color:white;
}

.send{
background:#27ae60;
color:white;
}

.location{
background:#ff9800;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>CitizenVoice</h1>

<div class="chat" id="chat"></div>

<div>

<label><b>Valora el servicio al que te estás refiriendo</b></label>

<input id="respuesta" placeholder="Escribe tu respuesta...">

<div class="controls">

<button class="btn mic" onclick="startVoice()">🎤</button>

<button class="btn send" onclick="sendAnswer()">Enviar</button>

<button class="btn location" onclick="getLocation()">📍</button>

</div>

</div>

</div>

<script>

let preguntas = [
"Hola. ¿Qué servicio municipal deseas valorar?",
"¿Cómo valorarías el servicio del 1 al 5?",
"Describe brevemente tu experiencia."
];

let paso = 0;
let respuestas = {};

let synth = window.speechSynthesis;

function hablar(texto){

let msg = new SpeechSynthesisUtterance(texto);
msg.lang="es-ES";

synth.speak(msg);

}

function mostrarPregunta(){

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="bubble">${preguntas[paso]}</div>`;

hablar(preguntas[paso]);

}

window.onload=mostrarPregunta;

function sendAnswer(){

let input=document.getElementById("respuesta");

let valor=input.value;

if(valor==="") return;

respuestas[paso]=valor;

input.value="";

paso++;

if(paso<preguntas.length){

mostrarPregunta();

}else{

chat.innerHTML+=`<div class="bubble">Gracias por tu participación.</div>`;

registrar();

}

}

function startVoice(){

let recognition=new webkitSpeechRecognition();

recognition.lang="es-ES";

recognition.onresult=function(event){

document.getElementById("respuesta").value=event.results[0][0].transcript;

};

recognition.start();

}

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

respuestas.lat=pos.coords.latitude;

respuestas.lon=pos.coords.longitude;

alert("Ubicación registrada");

});

}

function hash(str){

let h=0;

for(let i=0;i<str.length;i++){

h=((h<<5)-h)+str.charCodeAt(i);

h|=0;

}

return h;

}

function registrar(){

let data={

fecha:new Date(),

servicio:respuestas[0],

valoracion:respuestas[1],

descripcion:respuestas[2],

lat:respuestas.lat,

lon:respuestas.lon

};

data.hash=hash(JSON.stringify(data));

fetch("TU_WEBHOOK_POWER_AUTOMATE",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

});

}

</script>

</body>

</html>
