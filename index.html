<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<style>
#map {
  height: 320px;
  width: 100%;
}
</style>

</head>

<body class="bg-[#EEF2F5] flex justify-center min-h-screen">

<div class="w-full max-w-md bg-white shadow-xl rounded-[30px] overflow-hidden flex flex-col">

<!-- HEADER -->
<div class="bg-gradient-to-r from-emerald-600 to-green-500 text-white p-4">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
      👤
    </div>
    <div>
      <div class="font-bold">Citizen Voice</div>
      <div class="text-xs opacity-80">Asistente ciudadano</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 p-3 overflow-y-auto flex flex-col gap-3"></div>

<!-- MAP -->
<div id="mapContainer" class="hidden p-3">
  <div id="map"></div>
</div>

<!-- CONTROLS -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ================= SUPABASE ================= */

const supabaseClient = supabase.createClient(
  "https://saiclsejxsycmeefuhvs.supabase.co",
  "sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ================= STATE ================= */

let form = {}
let map, marker

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapContainer = document.getElementById("mapContainer")

/* ================= VOZ ================= */

function speak(t){
  const msg = new SpeechSynthesisUtterance(t)
  msg.lang = "es-ES"
  speechSynthesis.cancel()
  speechSynthesis.speak(msg)
}

/* ================= BOT ================= */

function bot(t){
  const row = document.createElement("div")
  row.className = "flex gap-2 items-start"

  const avatar = document.createElement("div")
  avatar.className = "w-9 h-9 rounded-full bg-emerald-600 flex items-center justify-center text-white"
  avatar.innerHTML = "🙂"

  const bubble = document.createElement("div")
  bubble.className = "bg-emerald-100 p-3 rounded-2xl text-sm"
  bubble.innerText = t

  row.appendChild(avatar)
  row.appendChild(bubble)

  chat.appendChild(row)
  chat.scrollTop = chat.scrollHeight

  speak(t)
}

/* ================= USER ================= */

function user(t){
  const d = document.createElement("div")
  d.className = "ml-auto bg-emerald-600 text-white p-3 rounded-2xl text-sm"
  d.innerText = t
  chat.appendChild(d)
}

/* ================= BUTTONS ================= */

function buttons(list, cb){
  controls.innerHTML = ""
  list.forEach(v=>{
    const b = document.createElement("button")
    b.className = "bg-emerald-100 px-3 py-2 rounded-xl text-sm"
    b.innerText = v
    b.onclick = ()=>{
      user(v)
      controls.innerHTML = ""
      cb(v)
    }
    controls.appendChild(b)
  })
}

/* ================= START ================= */

function start(){

  form = {}

  bot("Hola, soy Citizen Voice. Asistente virtual para la participación ciudadana.")

  bot("Consulta semanal activa")

  bot("¿Qué importancia das del 1 al 5 a mejorar actividades culturales infantiles?")

  buttons([
    "1 😡","2 😕","3 😐","4 🙂","5 😄"
  ], v=>{
    form.weekly = v
    askType()
  })
}

/* ================= TYPE ================= */

function askType(){
  bot("¿Qué quieres registrar?")
  buttons(["Incidencia","Mejora"], v=>{
    form.tipo = v
    askArea()
  })
}

/* ================= AREA ================= */

function askArea(){
  bot("¿En qué área ocurre?")
  buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
    form.area = v
    askRating()
  })
}

/* ================= RATING ================= */

function askRating(){
  bot("¿Cómo valoras actualmente esta área?")
  buttons(["1 😡","2 😕","3 😐","4 🙂","5 😄"], v=>{
    form.valoracion = v
    showMap()
  })
}

/* ================= MAP ================= */

function showMap(){

  bot("Selecciona ubicación en el mapa")

  mapContainer.classList.remove("hidden")

  setTimeout(()=>{

    if(!map){
      map = L.map("map").setView([39.47,-0.37],13)

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
        attribution:""
      }).addTo(map)
    }

    map.invalidateSize()

    map.on("click", e=>{

      if(marker) map.removeLayer(marker)

      marker = L.marker(e.latlng).addTo(map)

      form.lat = e.latlng.lat
      form.lng = e.latlng.lng

      askDescription()
    })

  },300)
}

/* ================= DESCRIPTION ================= */

function askDescription(){

  bot("Describe la situación")

  controls.innerHTML = ""

  const input = document.createElement("input")
  input.className = "border p-2 rounded-xl flex-1 text-sm"

  const mic = document.createElement("button")
  mic.innerText = "🎤"
  mic.className = "px-3 bg-gray-200 rounded-xl"

  mic.onclick = ()=>{
    const r = new webkitSpeechRecognition()
    r.lang = "es-ES"
    r.start()
    r.onresult = e=>{
      input.value = e.results[0][0].transcript
    }
  }

  const send = document.createElement("button")
  send.innerText = "Enviar"
  send.className = "bg-emerald-600 text-white px-4 rounded-xl"

  send.onclick = async ()=>{

    if(!input.value) return

    form.descripcion = input.value

    user(input.value)

    /* ================= SUPABASE INCIDENCIAS ================= */

    await supabaseClient
      .from("incidencias")
      .insert([form])

    /* ================= SUPABASE WEEKLY ================= */

    await supabaseClient
      .from("weekly_engagement")
      .insert([{
        valoracion: form.weekly
      }])

    bot("Registro guardado correctamente")

    finish()
  }

  controls.appendChild(input)
  controls.appendChild(mic)
  controls.appendChild(send)
}

/* ================= FIN ================= */

function finish(){

  controls.innerHTML = ""

  const panel = document.createElement("button")
  panel.className = "bg-emerald-600 text-white px-4 py-2 rounded-xl"
  panel.innerText = "Ver datos"

  panel.onclick = ()=>{
    window.location.href =
    "https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
  }

  const close = document.createElement("button")
  close.className = "bg-gray-200 px-4 py-2 rounded-xl"
  close.innerText = "Cerrar"

  close.onclick = ()=> location.reload()

  controls.appendChild(panel)
  controls.appendChild(close)
}

/* ================= INIT ================= */

const startBtn = document.createElement("button")
startBtn.className = "w-full bg-emerald-600 text-white p-4 rounded-xl"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
  controls.innerHTML = ""
  start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
