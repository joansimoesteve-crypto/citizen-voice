<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<div class="bg-green-700 text-white p-4 text-center font-bold text-xl">
Citizen Voice
</div>

<div id="chat" class="flex-1 overflow-y-auto p-3"></div>

<div id="controls" class="p-3 border-t flex gap-2 flex-wrap"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}

function bot(text){
const d = document.createElement("div")
d.className = "bg-green-100 p-3 rounded-xl mb-2 w-[80%]"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-xl mb-2 ml-auto w-[80%]"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

function callAI(description){

return fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ description })
}).then(r=>r.json())

}

async function saveData(){

const ai = await callAI(formData.descripcion)

const incidencia = {
tipo: formData.tipo || "",
area: formData.area || "",
valoracion: formData.valoracion || "",
descripcion: formData.descripcion || "",
lat: formData.lat || null,
lng: formData.lng || null,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}

const { error } = await supabaseClient
.from("incidencias")
.insert([incidencia])

if(error){
bot("Error guardando")
return
}

bot("Incidencia guardada")
}

function askDescription(){

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-2 flex-1"
input.placeholder = "Descripción"

const btn = document.createElement("button")
btn.innerText = "Enviar"
btn.className = "bg-green-600 text-white px-4 rounded"

btn.onclick = ()=>{

formData.descripcion = input.value
user(input.value)
saveData()

}

controls.appendChild(input)
controls.appendChild(btn)

}

bot("Listo para empezar")
askDescription()

</script>

</body>
</html>
