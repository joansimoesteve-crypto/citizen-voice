<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Citizen Voice AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

body {
background: linear-gradient(180deg, #02110c 0%, #052c22 50%, #010a07 100%);
overflow: hidden;
font-family: 'Inter', sans-serif;
}

/* HERO PREMIUM COHESIVO */
.hero {
position: relative;
height: 250px;
overflow: hidden;
background: radial-gradient(circle at top, #10b981 0%, #064e3b 60%, #02110c 100%);
border-bottom: 1px solid rgba(16, 185, 129, 0.2);
}

.glow {
position: absolute;
width: 300px;
height: 300px;
background: rgba(16, 185, 129, 0.4);
filter: blur(80px);
border-radius: 9999px;
top: -80px;
left: 50%;
transform: translateX(-50%);
pointer-events: none;
}

/* AVATAR INTERACTIVO TIPO UPV */
.avatar-wrapper {
position: absolute;
left: 50%;
top: 48%;
transform: translate(-50%, -50%);
z-index: 10;
}

.avatar-ring {
position: absolute;
inset: -8px;
border-radius: 9999px;
border: 2px solid rgba(16, 185, 129, 0.4);
box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
animation: pulseAmbient 4s infinite ease-in-out;
transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Efecto Onda de Voz cuando habla */
.avatar-ring.active {
animation: pulseVoice 1.2s infinite ease-in-out;
border-color: rgba(52, 211, 153, 0.9);
background: rgba(16, 185, 129, 0.05);
}

.avatar-ring.active::after {
content: '';
position: absolute;
inset: -20px;
border-radius: 9999px;
border: 2px solid rgba(52, 211, 153, 0.4);
opacity: 0;
animation: ripple 1.2s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
}

.avatar {
width: 125px;
height: 125px;
border-radius: 9999px;
overflow: hidden;
border: 4px solid rgba(255, 255, 255, 0.2);
box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
position: relative;
z-index: 2;
background: #0b1511;
transition: transform 0.3s ease;
}

.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center;
}

.status {
position: absolute;
bottom: 8px;
right: 8px;
width: 16px;
height: 16px;
background: #10b981;
border: 2px solid #052c22;
border-radius: 9999px;
z-index: 20;
box-shadow: 0 0 10px #10b981;
}

/* PANEL DE CHAT */
#chat {
scroll-behavior: smooth;
}

#chat::-webkit-scrollbar {
width: 4px;
}

#chat::-webkit-scrollbar-thumb {
background: rgba(16, 185, 129, 0.5);
border-radius: 20px;
}

/* BURBUJAS DE DIÁLOGO */
.bot-row {
display: flex;
gap: 12px;
align-items: flex-end;
animation: slideInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.bot-mini {
width: 34px;
height: 34px;
border-radius: 9999px;
overflow: hidden;
flex-shrink: 0;
border: 1.5px solid rgba(255, 255, 255, 0.2);
background: #0b1511;
}

.bot-mini img {
width: 100%;
height: 100%;
object-fit: cover;
}

.bot-bubble {
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border: 1px solid rgba(255, 255, 255, 0.08);
padding: 14px 16px;
border-radius: 20px 20px 20px 4px;
color: rgba(255, 255, 255, 0.95);
font-size: 14px;
line-height: 1.5;
max-width: 82%;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.user-bubble {
background: linear-gradient(135deg, #10b981 0%, #047857 100%);
padding: 14px 16px;
border-radius: 20px 20px 4px 20px;
color: white;
font-size: 14px;
line-height: 1.5;
max-width: 82%;
margin-left: auto;
box-shadow: 0 8px 25px rgba(16, 185, 129, 0.25);
animation: slideInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
font-weight: 500;
}

/* CONTROLES Y BOTONES */
.controls {
background: rgba(2, 12, 9, 0.6);
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);
border-top: 1px solid rgba(255, 255, 255, 0.06);
flex-shrink: 0 !important;
}

.no-scrollbar::-webkit-scrollbar {
display: none;
}
.no-scrollbar {
-ms-overflow-style: none;
scrollbar-width: none;
}

.option-btn {
background: rgba(255, 255, 255, 0.07);
border: 1px solid rgba(255, 255, 255, 0.08);
color: #e2e8f0;
padding: 8px 16px;
border-radius: 14px;
font-size: 13px;
font-weight: 500;
transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
backdrop-filter: blur(8px);
flex-shrink: 0;
animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.option-btn:hover {
transform: translateY(-2px);
background: rgba(16, 185, 129, 0.2);
border-color: rgba(16, 185, 129, 0.4);
color: white;
box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);
}

.input {
background: rgba(255, 255, 255, 0.06);
border: 1px solid rgba(255, 255, 255, 0.08);
padding: 12px 16px;
border-radius: 16px;
color: white;
width: 100%;
outline: none;
font-size: 14px;
transition: all 0.3s ease;
}

.input:focus {
border-color: rgba(16, 185, 129, 0.5);
background: rgba(255, 255, 255, 0.1);
box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
}

.input::placeholder {
color: rgba(255, 255, 255, 0.35);
}

/* MAP COMPONENT */
#map {
border-radius: 20px;
overflow: hidden;
box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
border: 1px solid rgba(255, 255, 255, 0.1);
}

/* ANIMACIONES COMPLETA DINÁMICA */
@keyframes pulseAmbient {
0%, 100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
50% { transform: scale(1.04); opacity: 0.3; box-shadow: 0 0 25px rgba(16, 185, 129, 0.1); }
}

@keyframes pulseVoice {
0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(52, 211, 153, 0.6); }
50% { transform: scale(1.08); box-shadow: 0 0 35px rgba(52, 211, 153, 0.9); }
}

@keyframes ripple {
0% { transform: scale(1); opacity: 1; }
100% { transform: scale(1.25); opacity: 0; }
}

@keyframes slideInUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
from { opacity: 0; transform: scale(0.9); }
to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body class="flex justify-center items-center min-h-[100dvh] p-2">

<div class="w-full max-w-md h-[96dvh] rounded-[38px] overflow-hidden border border-white/10 bg-black/30 backdrop-blur-2xl shadow-2xl flex flex-col">

<!-- HERO -->
<div class="hero">
<div class="glow"></div>

<!-- BOTÓN PANTALLA COMPLETA -->
<button id="fullscreen-btn" class="absolute top-4 right-4 z-30 bg-white/5 hover:bg-white/15 text-white p-2.5 rounded-xl backdrop-blur-md transition-all duration-200 border border-white/10" title="Pantalla completa">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4" />
  </svg>
</button>

<div class="avatar-wrapper">
<div id="ring" class="avatar-ring"></div>
<div class="avatar">
<img src="avatar.png" alt="Citizen Voice Avatar">
</div>
<div class="status"></div>
</div>

<div class="absolute bottom-5 left-0 right-0 text-center z-20 px-4">
<div class="text-white text-2xl font-bold tracking-wide">
Citizen Voice AI
</div>
<div class="text-emerald-300/80 text-xs font-medium uppercase tracking-wider mt-1">
Participación Ciudadana Continua
</div>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-4"></div>

<!-- CONTROLES -->
<div id="controls" class="controls p-4 flex flex-col gap-3"></div>

</div>

<script>
const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const ring = document.getElementById("ring")
const fullscreenBtn = document.getElementById("fullscreen-btn")

fullscreenBtn.onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener("fullscreenchange", () => {
  if (document.fullscreenElement) {
    fullscreenBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>`;
  } else {
    fullscreenBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4" /></svg>`;
  }
});

let formData = {}
let currentMap = null

function getLocalISOString() {
const d = new Date();
const pad = num => String(num).padStart(2, '0');
const offset = -d.getTimezoneOffset();
const sign = offset >= 0 ? '+' : '-';
const offsetHours = pad(Math.floor(Math.abs(offset) / 60));
const offsetMins = pad(Math.abs(offset) % 60);

return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}${sign}${offsetHours}:${offsetMins}`;
}

function pulseRing(activate, duration = 0) {
if(activate) {
ring.classList.add("active");
if(duration > 0) {
setTimeout(() => {
ring.classList.remove("active");
}, duration);
}
} else {
ring.classList.remove("active");
}
}

function scrollToBottom() {
setTimeout(() => {
chat.scrollTop = chat.scrollHeight
}, 60)
}

function speak(text){
speechSynthesis.cancel()
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
msg.rate = 1
speechSynthesis.speak(msg)
}

function bot(text){
pulseRing(true, 2500);

const row = document.createElement("div")
row.className = "bot-row"

const avatar = document.createElement("div")
avatar.className = "bot-mini"
avatar.innerHTML = `<img src="avatar.png" alt="AI">`

const bubble = document.createElement("div")
bubble.className = "bot-bubble"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)
chat.appendChild(row)

scrollToBottom()
speak(text)
}

function user(text){
const d = document.createElement("div")
d.className = "user-bubble"
d.innerText = text
chat.appendChild(d)
scrollToBottom()
}

function buttons(list, callback){
controls.innerHTML = ""

const btnRow = document.createElement("div")
btnRow.className = "flex flex-row flex-nowrap gap-2 overflow-x-auto w-full no-scrollbar py-1"
btnRow.style.webkitOverflowScrolling = "touch"

list.forEach((o, index)=>{
const b = document.createElement("button")
b.className = "option-btn flex-shrink-0"
b.style.animationDelay = `${index * 0.05}s`
b.innerText = o

b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}
btnRow.appendChild(b)
})

controls.appendChild(btnRow)
scrollToBottom()
}

// REDISEÑO CX: ENCUADRE DE PREGUNTA SEMANAL DE OPINIÓN CONTINUA
function weeklyQuestion(){
bot("🗓️ CONSULTA SEMANAL DE OPINIÓN CONTINUA\n\nHola, soy tu asistente virtual de Citizen Voice. Para ayudarnos a mantener una escucha activa y mejorar la ciudad en tiempo real, iniciamos con la pregunta clave de esta semana:\n\n¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], async (v)=>{
try{
await supabaseClient
.from("weekly_engagement")
.insert([{
week: 1,
question: "¿Qué importancia das a mejorar los espacios culturales infantiles?",
area: "Cultura",
answer: parseInt(v.charAt(v.length - 1)),
created_at: getLocalISOString()
}])
}catch(err){
console.log(err)
}

bot("Muchas gracias por tu valoración continua. Ahora, pasemos a tu reporte personalizado. ¿Qué deseas registrar hoy?")
askType()
})
}

function askType(){
buttons([
"📍 Incidencia",
"💡 Propuesta de mejora"
], v=>{
// Limpieza de emojis para no romper la base de datos si requiere coincidencia exacta de strings cortos
formData.tipo = v.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim()
askArea()
})
}

function askArea(){
bot("¿A qué área de gestión afecta principalmente?")
buttons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Otros"
], v=>{
formData.area = v
askRate()
})
}

function askRate(){
bot("¿Cómo valoras el estado actual de esta área específica?")
buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], v=>{
formData.valoracion = parseInt(v.charAt(v.length - 1))
showMap()
})
}

function showMap(){
bot("Geolocalización del reporte: Toca directamente sobre el mapa o activa tu ubicación actual mediante el botón superior.")
controls.innerHTML = ""

const wrapper = document.createElement("div")
wrapper.className = "w-full flex flex-col gap-2.5"

const geoBtn = document.createElement("button")
geoBtn.type = "button"
geoBtn.className = "w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-xl text-xs font-semibold shadow-md hover:opacity-95 active:scale-[0.99] transition-all flex items-center justify-center gap-1.5"
geoBtn.innerHTML = "📍 Usar mi ubicación en tiempo real"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "210px"

wrapper.appendChild(geoBtn)
wrapper.appendChild(mapDiv)
controls.appendChild(wrapper)
scrollToBottom()

setTimeout(()=>{
if(currentMap){
currentMap.remove()
}

currentMap = L.map('map').setView([39.4702,-0.3768],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(currentMap)

let marker

geoBtn.onclick = () => {
if (navigator.geolocation) {
geoBtn.innerText = "Sincronizando señal GPS..."
navigator.geolocation.getCurrentPosition(
(position) => {
const lat = position.coords.latitude
const lon = position.coords.longitude

currentMap.setView([lat, lon], 16)
if(marker) currentMap.removeLayer(marker)
marker = L.marker([lat, lon]).addTo(currentMap)

formData.lat = lat
formData.lng = lon

pulseRing(true, 1200)

setTimeout(() => {
wrapper.style.display = "none"
bot("Ubicación guardada con éxito.")
askDescription()
}, 1000)
},
(err) => {
geoBtn.innerHTML = "📍 Usar mi ubicación en tiempo real"
alert("Acceso denegado al GPS. Por favor, marca el punto directamente tocando sobre el mapa.")
},
{ enableHighAccuracy: true, timeout: 8000 }
)
} else {
alert("Este dispositivo no soporta geolocalización nativa.")
}
}

currentMap.on("click", e=>{
if(marker) currentMap.removeLayer(marker)
marker = L.marker(e.latlng).addTo(currentMap)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

pulseRing(true, 1000)

setTimeout(() => {
wrapper.style.display = "none"
bot("Ubicación fijada correctamente.")
askDescription()
}, 800)
})

},300)
}

function askDescription(){
bot("Para finalizar, describe brevemente la situación actual (puedes escribir o dictar usando tu voz).")
controls.innerHTML = ""

const row = document.createElement("div")
row.className = "flex flex-row w-full gap-2 items-center"

const input = document.createElement("input")
input.placeholder = "Escribe un mensaje o usa el micrófono..."
input.className = "input flex-1 min-w-0"

const mic = document.createElement("button")
mic.innerHTML = "🎤"
mic.className = "option-btn flex-shrink-0 !py-3"

mic.onclick = ()=>{
const r = new webkitSpeechRecognition()
r.lang = "es-ES"
r.start()
mic.innerText = "⏳"
r.onresult = e=>{
input.value = e.results[0][0].transcript
mic.innerHTML = "🎤"
}
r.onerror = () => { mic.innerHTML = "🎤" }
}

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "option-btn flex-shrink-0 !bg-emerald-600 hover:!bg-emerald-500 text-white !py-3"

send.onclick = async ()=>{
if(!input.value) return
user(input.value)
formData.descripcion = input.value
saveData()
}

row.appendChild(input)
row.appendChild(mic)
row.appendChild(send)
controls.appendChild(row)
scrollToBottom()
}

async function saveData(){
try{
let ai = { resumen:"", acciones:[] }
try{
const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ description: formData.descripcion })
})
ai = await res.json()
}catch(e){}

await supabaseClient
.from("incidencias")
.insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

pulseRing(true);
bot("✨ Registro completado con éxito en el sistema central de gobernanza inteligente.");

controls.innerHTML = ""
const row = document.createElement("div")
row.className = "flex flex-row w-full gap-2"

const close = document.createElement("button")
close.className = "option-btn flex-1"
close.innerText = "Finalizar"
close.onclick = () => {
pulseRing(false);
location.reload();
}

const panel = document.createElement("button")
panel.className = "option-btn flex-1 !bg-white/10"
panel.innerText = "Ver Panel Global"
panel.onclick = ()=>{
window.location.href = "https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
}

row.appendChild(close)
row.appendChild(panel)
controls.appendChild(row)
scrollToBottom()

}catch(err){
bot("Lo siento, ha ocurrido un contratiempo técnico al sincronizar los datos.");
}
}

// BOTÓN INICIAL
const startBtn = document.createElement("button")
startBtn.innerText = "Iniciar Consulta Ciudadana"
startBtn.className = "w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 text-white py-3.5 rounded-2xl text-sm font-semibold shadow-2xl transition-all transform active:scale-[0.99] flex-shrink-0"

startBtn.onclick = ()=>{
controls.innerHTML = ""
weeklyQuestion()
}

controls.appendChild(startBtn)
scrollToBottom()
</script>

</body>
</html>
