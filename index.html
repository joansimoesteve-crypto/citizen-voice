<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<style>

/* 📱 APP SIN CORTES */
.app{
height:100dvh;
max-height:100dvh;
display:flex;
flex-direction:column;
}

/* EVITA QUE SE PIERDAN BOTONES ABAJO */
body{
margin:0;
overflow:hidden;
background:linear-gradient(180deg,#02120d,#06281f,#03140f);
font-family:sans-serif;
}

/* CHAT FIJO Y SEGURO */
#chat{
flex:1;
overflow-y:auto;
scroll-behavior:smooth;
padding-bottom:120px; /* 👈 CLAVE: evita que tapen botones */
}

/* SCROLL MÁS FUERTE */
#chat::-webkit-scrollbar{width:8px;}
#chat::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:20px;
}

/* CONTROLES SIEMPRE VISIBLES */
.controls{
position:sticky;
bottom:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(20px);
padding-bottom:calc(env(safe-area-inset-bottom) + 10px);
z-index:50;
}

/* BURBUJAS */
.bot-row{display:flex;gap:10px;align-items:flex-end;}
.bot-bubble{
background:rgba(255,255,255,.12);
color:white;
padding:14px;
border-radius:20px;
max-width:80%;
}
.user-bubble{
background:#10b981;
color:white;
padding:14px;
border-radius:20px;
max-width:80%;
margin-left:auto;
}

.option-btn{
background:rgba(255,255,255,.1);
color:white;
padding:12px 16px;
border-radius:16px;
border:1px solid rgba(255,255,255,.1);
}

</style>

</head>

<body>

<div class="app w-full max-w-md mx-auto">

<!-- CHAT -->
<div id="chat"></div>

<!-- CONTROLES -->
<div id="controls" class="controls flex flex-wrap gap-2 p-3"></div>

</div>

<script>

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}

/* 🔥 FULL SCROLL REAL */
function scrollChat(){
requestAnimationFrame(()=>{
chat.scrollTop = chat.scrollHeight
})
}

/* 🎤 VOZ NATURAL */
function speak(text){
speechSynthesis.cancel()

const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
msg.rate = 0.92
msg.pitch = 1.1

const voices = speechSynthesis.getVoices()
const natural = voices.find(v =>
v.lang.includes("es") && (
v.name.toLowerCase().includes("google") ||
v.name.toLowerCase().includes("maria") ||
v.name.toLowerCase().includes("español")
)
)

if(natural) msg.voice = natural

speechSynthesis.speak(msg)
}

/* BOT */
function bot(text){

const row = document.createElement("div")
row.className="bot-row"

const bubble = document.createElement("div")
bubble.className="bot-bubble"
bubble.innerText=text

row.appendChild(bubble)
chat.appendChild(row)

scrollChat()
speak(text)
}

/* USER */
function user(text){
const d=document.createElement("div")
d.className="user-bubble"
d.innerText=text

chat.appendChild(d)
scrollChat()
}

/* BOTONES (FIX CRÍTICO) */
function buttons(list, callback){

controls.innerHTML=""

list.forEach(o=>{
const b=document.createElement("button")
b.className="option-btn"
b.innerText=o

b.onclick=()=>{
controls.innerHTML=""
user(o)
callback(o)
}

controls.appendChild(b)
})

scrollChat()
}

/* FLUJO BASE (TUYO SIN ROMPER) */
function weeklyQuestion(){

bot("Hola, soy Citizen Voice. ¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons(["😡 1","😕 2","😐 3","🙂 4","😄 5"], (v)=>{

bot("Perfecto. ¿Qué deseas registrar?")
askType()

})

}

function askType(){

buttons(["Incidencia","Propuesta de mejora"], v=>{
formData.tipo=v
bot("¿En qué área afecta?")
askArea()
})

}

function askArea(){

buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad","Otros"], v=>{
formData.area=v
bot("Gracias. Ahora describe la situación.")
askDescription()
})

}

function askDescription(){

controls.innerHTML=""

const input=document.createElement("input")
input.placeholder="Escribe aquí..."
input.className="option-btn"

const send=document.createElement("button")
send.innerText="Enviar"
send.className="option-btn"

send.onclick=()=>{
if(!input.value) return
user(input.value)
formData.descripcion=input.value
bot("Registro completado.")
}

controls.appendChild(input)
controls.appendChild(send)

}

/* START */
const start=document.createElement("button")
start.innerText="Empezar"
start.className="option-btn w-full"

start.onclick=()=>{
controls.innerHTML=""
weeklyQuestion()
}

controls.appendChild(start)

</script>

</body>
</html>
