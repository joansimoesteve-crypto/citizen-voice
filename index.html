<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<style>

body{
background:
linear-gradient(
180deg,
#02120d 0%,
#06281f 45%,
#03140f 100%
);
overflow:hidden;
font-family:sans-serif;
}

/* HERO - Reducido de 240px a 150px para optimizar el espacio vertical */
.hero{
position:relative;
height:150px;
overflow:hidden;
background:
radial-gradient(circle at top,#1dd1a1 0%,#065f46 45%,#02120d 100%);
}

.glow{
position:absolute;
width:260px;
height:260px;
background:rgba(16,185,129,.35);
filter:blur(70px);
border-radius:9999px;
top:-60px;
left:50%;
transform:translateX(-50%);
}

.avatar-wrapper{
position:absolute;
left:50%;
top:42%;
transform:translate(-50%,-50%);
z-index:10;
}

.avatar-ring{
position:absolute;
inset:-10px;
border-radius:9999px;
border:2px solid rgba(255,255,255,.15);
animation:pulse 3s infinite;
}

/* AVATAR - Reducido de 120px a 90px */
.avatar{
width:90px;
height:90px;
border-radius:9999px;
overflow:hidden;
border:4px solid rgba(255,255,255,.15);
box-shadow:0 25px 60px rgba(0,0,0,.45);
position:relative;
z-index:2;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.status{
position:absolute;
bottom:4px;
right:4px;
width:16px;
height:16px;
background:#22c55e;
border:3px solid white;
border-radius:9999px;
z-index:20;
}

/* CHAT */

#chat{
scroll-behavior:smooth;
}

#chat::-webkit-scrollbar{
width:4px;
}

#chat::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:20px;
}

/* BURBUJAS */

.bot-row{
display:flex;
gap:10px;
align-items:flex-end;
animation:fade .25s ease;
}

.bot-mini{
width:36px;
height:36px;
border-radius:9999px;
overflow:hidden;
flex-shrink:0;
border:2px solid rgba(255,255,255,.15);
}

.bot-mini img{
width:100%;
height:100%;
object-fit:cover;
}

.bot-bubble{
background:rgba(255,255,255,.11);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:22px;
color:white;
font-size:14px;
line-height:1.5;
max-width:80%;
box-shadow:0 10px 35px rgba(0,0,0,.18);
}

.user-bubble{
background:
linear-gradient(
135deg,
#10b981,
#059669
);

padding:14px;
border-radius:22px;
color:white;
font-size:14px;
max-width:80%;
margin-left:auto;
box-shadow:0 10px 35px rgba(16,185,129,.25);
animation:fade .25s ease;
}

/* CONTROLES */

.controls{
background:rgba(0,0,0,.18);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.08);
}

.option-btn{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
color:white;
padding:12px 16px;
border-radius:18px;
font-size:14px;
transition:.2s;
backdrop-filter:blur(10px);
}

.option-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.16);
}

.input{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:18px;
color:white;
width:100%;
outline:none;
}

.input::placeholder{
color:rgba(255,255,255,.45);
}

/* MAP */

#map{
border-radius:24px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

/* ANIMACIONES */

@keyframes pulse{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.08);
opacity:.5;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body class="flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] rounded-[34px] overflow-hidden border border-white/10 bg-black/20 backdrop-blur-xl shadow-2xl flex flex-col">

<div class="hero">

<div class="glow"></div>

<div class="avatar-wrapper">

<div class="avatar-ring"></div>

<div class="avatar">

<img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=400&auto=format&fit=crop"/>

</div>

<div class="status"></div>

</div>

<div class="absolute bottom-2 left-0 right-0 text-center z-20">

<div class="text-white text-xl font-bold tracking-wide">
Citizen Voice AI
</div>

<div class="text-emerald-100 text-xs opacity-90 mt-0.5">
Asistente virtual para participación ciudadana
</div>

</div>

</div>

<div
id="chat"
class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3 min-h-0"
></div>

<div
id="controls"
class="controls p-4 flex flex-wrap gap-2"
></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let currentMap = null

function speak(text){

speechSynthesis.cancel()

const msg = new SpeechSynthesisUtterance(text)

msg.lang = "es-ES"
msg.rate = 1

speechSynthesis.speak(msg)

}

function bot(text){

const row = document.createElement("div")

row.className = "bot-row"

const avatar = document.createElement("div")

avatar.className = "bot-mini"

avatar.innerHTML = `
<img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=400&auto=format&fit=crop"/>
`

const bubble = document.createElement("div")

bubble.className = "bot-bubble"

bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

chat.scrollTop = chat.scrollHeight

speak(text)

}

function user(text){

const d = document.createElement("div")

d.className = "user-bubble"

d.innerText = text

chat.appendChild(d)

chat.scrollTop = chat.scrollHeight

}

function buttons(list, callback){

controls.innerHTML = ""

list.forEach(o=>{

const b = document.createElement("button")

b.className = "option-btn"

b.innerText = o

b.onclick = ()=>{

controls.innerHTML = ""

user(o)

callback(o)

}

controls.appendChild(b)

})

}

function weeklyQuestion(){

bot("Hola, soy Citizen Voice. Vamos a empezar con una pregunta rápida: ¿Qué importancia das a mejorar los espacios culturales infantiles?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], async (v)=>{

try{

await supabaseClient
.from("weekly_engagement")
.insert([{
week: 1,
question: "¿Qué importancia das a mejorar los espacios culturales infantiles?",
area: "Cultura",
answer: parseInt(v.charAt(v.length - 1)),
created_at: new Date().toISOString()
}])

}catch(err){
console.log(err)
}

bot("Perfecto. ¿Qué deseas registrar?")

askType()

})

}

function askType(){

buttons([
"Incidencia",
"Propuesta de mejora"
], v=>{

formData.tipo = v

askArea()

})

}

function askArea(){

bot("¿En qué área ocurre o afecta?")

buttons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Otros"
], v=>{

formData.area = v

askRate()

})

}

function askRate(){

bot("¿Cómo valoras actualmente esta área?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], v=>{

formData.valoracion =
parseInt(v.charAt(v.length - 1))

showMap()

})

}

function showMap(){

bot("Indica dónde ocurre. Puedes buscar una dirección o tocar el mapa.")

controls.innerHTML = ""

const wrapper = document.createElement("div")
wrapper.className = "w-full"

const search = document.createElement("input")

search.placeholder = "Buscar dirección..."

search.className =
"input mb-2"

const mapDiv = document.createElement("div")

mapDiv.id = "map"

mapDiv.style.height = "200px" /* Reducido de 340px a 200px para que el mapa no empuje los controles fuera de la pantalla */

wrapper.appendChild(search)
wrapper.appendChild(mapDiv)

controls.appendChild(wrapper)

setTimeout(()=>{

if(currentMap){
currentMap.remove()
}

currentMap = L.map('map').setView([39.47,-0.37],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(currentMap)

let marker

const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

geocoder.geocode(search.value, results=>{

if(results.length>0){

const r = results[0]

currentMap.setView(r.center,16)

if(marker) currentMap.removeLayer(marker)

marker = L.marker(r.center).addTo(currentMap)

formData.lat = r.center.lat
formData.lng = r.center.lng

wrapper.style.display = "none"

bot("Ubicación registrada.")

askDescription()

}

})

}

})

currentMap.on("click", e=>{

if(marker) currentMap.removeLayer(marker)

marker = L.marker(e.latlng).addTo(currentMap)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

wrapper.style.display = "none"

bot("Ubicación guardada.")

askDescription()

})

},300)

}

function askDescription(){

bot("Describe brevemente la situación.")

controls.innerHTML = ""

const input = document.createElement("input")

input.placeholder = "Escribe o usa voz"

input.className =
"input flex-1"

const mic = document.createElement("button")

mic.innerText = "🎤"

mic.className =
"option-btn"

mic.onclick = ()=>{

const r = new webkitSpeechRecognition()

r.lang = "es-ES"

r.start()

r.onresult = e=>{

input.value = e.results[0][0].transcript

}

}

const send = document.createElement("button")

send.innerText = "Enviar"

send.className =
"option-btn"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

saveData()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

async function saveData(){

try{

let ai = {
resumen:"",
acciones:[]
}

try{

const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
description: formData.descripcion
})
})

ai = await res.json()

}catch(e){}

await supabaseClient
.from("incidencias")
.insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

bot("Registro completado correctamente.")

controls.innerHTML = ""

const close = document.createElement("button")

close.className =
"option-btn flex-1"

close.innerText = "Cerrar"

close.onclick = ()=> location.reload()

const panel = document.createElement("button")

panel.className =
"option-btn flex-1"

panel.innerText = "Ver datos"

panel.onclick = ()=>{

window.location.href =
"https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"

}

controls.appendChild(close)
controls.appendChild(panel)

}catch(err){

bot("Ha ocurrido un error al guardar.")

}

}

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"

startBtn.className =
"w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white py-4 rounded-2xl text-lg shadow-2xl"

startBtn.onclick = ()=>{

controls.innerHTML = ""

weeklyQuestion()

}

controls.appendChild(startBtn)

</script>

</body>
</html>
