<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4">

<div class="flex items-center gap-3">

<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center shadow-lg">

<!-- AVATAR MÁS HUMANO -->
<svg width="26" height="26" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="20" r="10" fill="#ffffff"/>
  <circle cx="28" cy="18" r="1.6" fill="#0f766e"/>
  <circle cx="36" cy="18" r="1.6" fill="#0f766e"/>
  <path d="M27 24c3 2 7 2 10 0" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>
  <path d="M18 52c4-10 12-15 14-15s10 5 14 15" fill="#ffffff" opacity="0.9"/>
</svg>

</div>

<div>
<div class="text-xl font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Asistente virtual para participación ciudadana
</div>
</div>

</div>

</div>

<!-- CHAT (MEJORADO UX) -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 bg-gradient-to-b from-white/80 to-green-50/40 backdrop-blur-sm"></div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let currentMap = null

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){
speechSynthesis.cancel()
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
msg.rate = 1
speechSynthesis.speak(msg)
}

/* ===================== */
/* SCROLL MEJORADO */
/* ===================== */

function scrollChat(){
setTimeout(() => {
chat.scrollTo({
top: chat.scrollHeight,
behavior: "smooth"
})
}, 50)
}

/* ===================== */
/* BOT */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className =
"w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center shadow"

avatar.innerHTML = `
<svg width="24" height="24" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="20" r="10" fill="white"/>
  <circle cx="28" cy="18" r="1.6" fill="#0f766e"/>
  <circle cx="36" cy="18" r="1.6" fill="#0f766e"/>
  <path d="M27 24c3 2 7 2 10 0" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className =
"bg-white/80 backdrop-blur-md border border-emerald-100 p-3 rounded-2xl text-sm w-[80%] shadow-sm"

bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

scrollChat()
speak(text)
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className =
"bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"

d.innerText = text

chat.appendChild(d)

scrollChat()
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, callback){

controls.innerHTML = ""

list.forEach(o=>{

const b = document.createElement("button")
b.className =
"bg-green-100 hover:bg-green-200 transition px-4 py-2 rounded-xl text-sm"

b.innerText = o

b.onclick = ()=>{
controls.innerHTML = ""
user(o)
callback(o)
}

controls.appendChild(b)

})
}

/* ===================== */
/* SUPABASE SAVE (SIN CAMBIOS) */
/* ===================== */

async function saveData(){

try{

let ai = { resumen:"", acciones:[] }

try{

const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ description: formData.descripcion })
})

ai = await res.json()

}catch(e){}

await supabaseClient.from("incidencias").insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

bot("Registro completado correctamente.")

controls.innerHTML = ""

const close = document.createElement("button")
close.className = "flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl"
close.innerText = "Cerrar"
close.onclick = ()=> location.reload()

const panel = document.createElement("button")
panel.className = "flex-1 bg-green-600 text-white py-3 rounded-xl"
panel.innerText = "Ver datos"
panel.onclick = ()=>{
window.location.href =
"https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
}

controls.appendChild(close)
controls.appendChild(panel)

}catch(err){
bot("Ha ocurrido un error al guardar.")
}
}

/* ===================== */
/* START (SIN CAMBIOS) */
/* ===================== */

const startBtn = document.createElement("button")
startBtn.innerText = "Empezar"
startBtn.className =
"w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{
controls.innerHTML = ""
weeklyQuestion()
}

controls.appendChild(startBtn)

/* ===================== */
/* TODO LO DEMÁS IGUAL QUE TU CÓDIGO */
/* ===================== */

</script>

</body>
</html>
