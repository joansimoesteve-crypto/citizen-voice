<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-green-50 flex justify-center min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER HUMANO -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4">

<div class="flex items-center gap-3">

<!-- 👤 BOT MÁS HUMANO -->
<div class="w-12 h-12 rounded-full overflow-hidden bg-white flex items-center justify-center">

<!-- cara humana ilustrada -->
<svg width="34" height="34" viewBox="0 0 64 64">
<circle cx="32" cy="32" r="30" fill="#f3d6b3"/>
<circle cx="22" cy="26" r="3" fill="#333"/>
<circle cx="42" cy="26" r="3" fill="#333"/>
<path d="M22 42c5 6 15 6 20 0" stroke="#333" stroke-width="3" fill="none"/>
</svg>

</div>

<div>
<div class="font-bold text-lg">Citizen Voice</div>
<div class="text-xs opacity-90">Asistente ciudadano</div>
</div>

</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- MAPA (NO BLOQUEANTE) -->
<div id="mapContainer" class="hidden p-2">
<div id="map" class="w-full h-[360px] rounded-2xl shadow"></div>
</div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapContainer = document.getElementById("mapContainer")

let formData = {}
let map = null
let marker = null

/* VOZ */
function speak(text){
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
msg.rate = 1
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

/* BOT HUMANO (SIN ETIQUETAS) */
function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-green-600 flex items-center justify-center overflow-hidden"

avatar.innerHTML = `
<svg width="22" height="22" viewBox="0 0 64 64">
<circle cx="32" cy="32" r="30" fill="#f3d6b3"/>
<circle cx="22" cy="26" r="3" fill="#333"/>
<circle cx="42" cy="26" r="3" fill="#333"/>
<path d="M22 42c5 6 15 6 20 0" stroke="#333" stroke-width="3" fill="none"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight
speak(text)
}

/* USER */
function user(text){
const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text
chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* BOTONES */
function buttons(list, cb){

controls.innerHTML = ""

list.forEach(t=>{

const b = document.createElement("button")

b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = t

b.onclick = ()=>{
controls.innerHTML = ""
user(t)
cb(t)
}

controls.appendChild(b)

})

}

/* START */
function start(){

formData = {}

bot("Hola, soy Citizen Voice. Estoy aquí para ayudarte a mejorar tu ciudad.")

bot("Primero quiero hacerte una pregunta rápida.")

bot("¿Cómo valoras la importancia de actividades culturales para la ciudad?")

buttons(["😡 1","😕 2","😐 3","🙂 4","😄 5"], v=>{
formData.weekly = v
askType()
})

}

/* TIPO */
function askType(){

bot("¿Qué quieres registrar?")

buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})

}

/* AREA */
function askArea(){

bot("¿En qué área ocurre?")

buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
askRating()
})

}

/* VALORACIÓN CON CARITAS */
function askRating(){

bot("¿Cómo valoras actualmente esta área?")

buttons(["😡 1","😕 2","😐 3","🙂 4","😄 5"], v=>{
formData.valoracion = v
showMap()
})

}

/* MAPA NO BLOQUEANTE */
function showMap(){

bot("Ahora selecciona la ubicación en el mapa.")

controls.innerHTML = ""
mapContainer.classList.remove("hidden")

setTimeout(()=>{

if(!map){

map = L.map('map').setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

setTimeout(()=> map.invalidateSize(), 300)

}

map.off()

map.on("click", e=>{

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

askDescription()

})

},200)

}

/* DESCRIPCIÓN */
function askDescription(){

bot("Descríbeme el problema o mejora.")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"

const send = document.createElement("button")
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
send.innerText = "Enviar"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient
.from("incidencias")
.insert([formData])

bot("Perfecto, registro enviado correctamente.")

showFinal()

}

controls.appendChild(input)
controls.appendChild(send)

}

/* FINAL */
function showFinal(){

controls.innerHTML = ""

const close = document.createElement("button")
close.className = "bg-gray-200 px-4 py-2 rounded-xl"
close.innerText = "Cerrar"

close.onclick = ()=> location.reload()

const panel = document.createElement("button")
panel.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
panel.innerText = "Ver datos"

panel.onclick = ()=> window.location.href = "/panel.html"

controls.appendChild(close)
controls.appendChild(panel)

}

/* INIT */
const startBtn = document.createElement("button")
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
