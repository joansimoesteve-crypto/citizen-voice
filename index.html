<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 CitizenVoice</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #e6f2e6;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}
#container {
  width: 100%;
  max-width: 500px;
  margin-top: 20px;
}
#title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #1faa59;
}
#chat {
  height: 80vh;
  background: #fff;
  border-radius: 15px;
  padding: 10px;
  overflow-y: auto;
  box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}
.bubble {
  padding: 12px;
  margin: 5px 0;
  max-width: 75%;
  border-radius: 20px;
  font-size: 0.95rem;
}
.bot {
  background: #f1f1f1;
}
.user {
  background: #1faa59;
  color: white;
  margin-left: auto;
}
button.option {
  background: #1faa59;
  color: white;
  border: none;
  border-radius: 30px;
  padding: 10px 20px;
  margin: 3px;
  cursor: pointer;
  font-weight: bold;
}
input[type=text] {
  width: 70%;
  padding: 8px;
  margin-right: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
button.sendBtn {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #1faa59;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
button.micBtn {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="container">
  <div id="title">🎤 CitizenVoice – Tu opinión importa</div>
  <div id="chat"></div>
</div>

<script>
const chat = document.getElementById('chat');

function addBot(message, speak=true){
    const div = document.createElement('div');
    div.className='bubble bot';
    div.innerText = message;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    if(speak){
        const utter = new SpeechSynthesisUtterance(message);
        utter.lang='es-ES';
        speechSynthesis.speak(utter);
    }
}

function addUser(message){
    const div = document.createElement('div');
    div.className='bubble user';
    div.innerText = message;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Variables globales
let area='', tipo='', descripcion='', puntuacion=0, lat=0, lon=0;

function askArea(){
    addBot('¿Sobre qué área quieres opinar?');
    ['Urbanismo','Limpieza','Movilidad','Seguridad','Parques','Otra'].forEach(a=>{
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=a;
        btn.onclick=()=>{
            addUser(a);
            area=a;
            chat.innerHTML=''; 
            askTipo();
        }
        chat.appendChild(btn);
    });
}

function askTipo(){
    addBot('¿Es una incidencia o propuesta?');
    ['Incidencia','Propuesta'].forEach(t=>{
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=t;
        btn.onclick=()=>{
            addUser(t);
            tipo=t;
            chat.innerHTML='';
            askDescripcion();
        }
        chat.appendChild(btn);
    });
}

function askDescripcion(){
    addBot('Describe tu mensaje usando voz o texto.');
    const input = document.createElement('input');
    input.type='text';
    input.placeholder='Escribe aquí o pulsa 🎤';
    const mic = document.createElement('button');
    mic.innerText='🎤';
    mic.className='micBtn';
    mic.onclick=()=>{
        let recognition;
        if(window.SpeechRecognition || window.webkitSpeechRecognition){
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang='es-ES';
            recognition.onresult = (e) => { input.value = e.results[0][0].transcript; }
            recognition.start();
        } else { alert("Tu navegador no soporta reconocimiento de voz"); }
    }
    const send = document.createElement('button');
    send.innerText='Enviar';
    send.className='sendBtn';
    send.onclick=()=>{
        if(input.value.trim()==='') return;
        addUser(input.value);
        descripcion=input.value;
        chat.innerHTML='';
        askPuntuacion();
    }
    chat.appendChild(input);
    chat.appendChild(mic);
    chat.appendChild(send);
}

function askPuntuacion(){
    addBot('Valora el servicio (1 = Muy malo, 5 = Excelente)');
    for(let i=1;i<=5;i++){
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=i;
        btn.onclick=()=>{
            addUser(i);
            puntuacion=i;
            chat.innerHTML='';
            askUbicacion();
        }
        chat.appendChild(btn);
    }
}

function askUbicacion(){
    addBot('Detectando ubicación 📍...');
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition((pos)=>{
            lat=pos.coords.latitude;
            lon=pos.coords.longitude;
            addBot('¡Listo! Gracias por participar.');
            console.log({area, tipo, descripcion, puntuacion, lat, lon});
            // Aquí se puede enviar a Google Sheets / Excel Online
        }, (err)=>{
            addBot('No se pudo obtener ubicación: '+err.message, false);
        });
    } else {
        addBot('Geolocalización no soportada', false);
    }
}

// Iniciar flujo
askArea();

</script>
</body>
</html>
