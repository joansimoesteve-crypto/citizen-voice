<script>

let step=0
let data={}
const chat=document.getElementById("chat")

function speak(text){

let msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)

}

function addBot(text){

let div=document.createElement("div")
div.className="bubble"
div.innerText=text

chat.appendChild(div)

speak(text)

scroll()

}

function addUser(text){

let div=document.createElement("div")
div.className="user"
div.innerText=text

chat.appendChild(div)

scroll()

}

function scroll(){

setTimeout(()=>{
chat.scrollTop=chat.scrollHeight
},200)

}

function clearButtons(){

document.querySelectorAll(".option").forEach(e=>e.remove())

}

function startSurvey(){

document.querySelector("button").remove()

step=1
next()

}

function next(){

if(step==1){

addBot("¿Sobre qué área quieres opinar?")

createButtons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
],selectArea)

}

if(step==2){

addBot("¿Es una incidencia o una propuesta?")

createButtons([
"Incidencia",
"Propuesta"
],selectType)

}

if(step==3){

addBot("Describe la incidencia o propuesta")

let div=document.createElement("div")

div.innerHTML=`

<textarea id="desc" style="height:90px"></textarea>

<div class="controls">
<button id="micBtn" onclick="startVoice()">🎤</button>
<button id="sendDescBtn" onclick="sendDesc()">Enviar</button>
</div>

`

chat.appendChild(div)

scroll()

}

if(step==4){

addBot("Indica la ubicación aproximada")

let div=document.createElement("div")

div.innerHTML=`

<input id="calle" placeholder="Calle">

<input id="numero" placeholder="Número">

<input id="cp" placeholder="Código Postal">

<div class="controls">
<button onclick="sendLocation()">Enviar ubicación</button>
<button onclick="useGPS()">📍 GPS</button>
</div>

`

chat.appendChild(div)

scroll()

}

if(step==5){

addBot("Valora el servicio")

createButtons(["1","2","3","4","5"],rate)

}

if(step==6){

addBot("Gracias. Tu opinión ha sido registrada.")

console.log(data)

}

}

function createButtons(arr,callback){

arr.forEach(v=>{

let b=document.createElement("button")

b.innerText=v
b.className="option"

b.onclick=()=>{

clearButtons()

addUser(v)

callback(v)

}

chat.appendChild(b)

})

}

function selectArea(v){

data.area=v
step=2
next()

}

function selectType(v){

data.tipo=v
step=3
next()

}

function sendDesc(){

let val=document.getElementById("desc").value

data.descripcion=val

addUser(val)

/* eliminar controles */

document.getElementById("micBtn").remove()
document.getElementById("sendDescBtn").remove()

step=4
next()

}

function sendLocation(){

let calle=document.getElementById("calle").value
let numero=document.getElementById("numero").value
let cp=document.getElementById("cp").value

let ubicacion=calle+" "+numero+" "+cp

data.ubicacion=ubicacion

addUser(ubicacion)

step=5
next()

}

function rate(v){

data.valoracion=v

addUser("Valoración "+v)

step=6
next()

}

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Tu navegador no soporta voz")
return
}

let rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=function(e){
document.getElementById("desc").value=e.results[0][0].transcript
}

rec.start()

}

function useGPS(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let coords="Lat "+pos.coords.latitude.toFixed(5)+" , Lng "+pos.coords.longitude.toFixed(5)

data.ubicacion=coords

addUser(coords)

step=5
next()

})

}

}

</script>
