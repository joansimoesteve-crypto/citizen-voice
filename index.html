<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 flex items-center gap-3">

<!-- AVATAR HUMANO -->
<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center shadow">
<svg width="26" height="26" viewBox="0 0 64 64">
<circle cx="32" cy="20" r="10" fill="white"/>
<path d="M18 52c4-10 12-15 14-15s10 5 14 15" fill="white"/>
<circle cx="28" cy="18" r="2" fill="#10b981"/>
<circle cx="36" cy="18" r="2" fill="#10b981"/>
<path d="M28 24c2 2 6 2 8 0" stroke="#10b981" stroke-width="2"/>
</svg>
</div>

<div>
<div class="font-bold text-lg">Citizen Voice</div>
<div class="text-xs opacity-90">Asistente ciudadano conversacional</div>
</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- CONTROLES -->
<div id="controls" class="p-2 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE (NO TOCADO) */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")

let formData = {}
let mapInstance = null

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){
const msg = new SpeechSynthesisUtterance(text)
msg.lang = "es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

/* ===================== */
/* BOT (más humano, menos robótico) */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center shadow"

avatar.innerHTML = `
<svg width="22" height="22" viewBox="0 0 64 64">
<circle cx="32" cy="20" r="10" fill="white"/>
<path d="M18 52c4-10 12-15 14-15s10 5 14 15" fill="white"/>
<circle cx="28" cy="18" r="2" fill="#10b981"/>
<circle cx="36" cy="18" r="2" fill="#10b981"/>
<path d="M28 24c2 2 6 2 8 0" stroke="#10b981" stroke-width="2"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight

speak(text)

}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text

chat.appendChild(d)
chat.scrollTop = chat.scrollHeight

}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, cb){

controls.innerHTML = ""

list.forEach(t=>{

const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = t

b.onclick = ()=>{

controls.innerHTML = ""
user(t)
cb(t)

}

controls.appendChild(b)

})

}

/* ===================== */
/* START FLUIDO */
/* ===================== */

function start(){

formData = {}

bot("Hola, soy Citizen Voice.")

setTimeout(()=>{
bot("Voy a ayudarte a registrar lo que ocurre en tu ciudad.")
},600)

setTimeout(()=>{
bot("¿Qué quieres hacer hoy?")
buttons(["Incidencia","Propuesta"], v=>{
formData.tipo = v
askArea()
})
},1200)

}

/* ===================== */
/* AREA */
/* ===================== */

function askArea(){

bot("¿En qué zona o tema ocurre?")

buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
askRate()
})

}

/* ===================== */
/* VALORACIÓN */
/* ===================== */

function askRate(){

bot("Del 1 al 5, ¿cómo lo valorarías?")

buttons(["1","2","3","4","5"], v=>{
formData.valoracion = v
showMap()
})

}

/* ===================== */
/* MAPA (más ligero y menos invasivo) */
/* ===================== */

function showMap(){

bot("Dime dónde ocurre. Puedes tocar el mapa o buscar.")

controls.innerHTML = ""

const search = document.createElement("input")
search.placeholder = "Buscar dirección..."
search.className = "border p-3 rounded-xl w-full text-sm"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.className = "rounded-2xl shadow mt-2"
mapDiv.style.height = "260px"

controls.appendChild(search)
controls.appendChild(mapDiv)

setTimeout(()=>{

if(mapInstance){
mapInstance.remove()
}

mapInstance = L.map("map").setView([39.47,-0.37],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(mapInstance)

let marker

const geocoder = L.Control.Geocoder.nominatim()

search.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

geocoder.geocode(search.value, res=>{

if(res.length){

const r = res[0]

mapInstance.setView(r.center,16)

if(marker) mapInstance.removeLayer(marker)

marker = L.marker(r.center).addTo(mapInstance)

formData.lat = r.center.lat
formData.lng = r.center.lng

bot("Perfecto, ubicación registrada.")
askDescription()

}

})

}

})

mapInstance.on("click", e=>{

if(marker) mapInstance.removeLayer(marker)

marker = L.marker(e.latlng).addTo(mapInstance)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

bot("Ubicación guardada.")
askDescription()

})

},300)

}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Cuéntame qué ocurre, con tus palabras.")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"
input.placeholder = "Escribe o usa voz"

const mic = document.createElement("button")
mic.innerText = "🎤"
mic.className = "bg-green-100 px-3 rounded-xl"

mic.onclick = ()=>{

const r = new webkitSpeechRecognition()
r.lang = "es-ES"
r.start()

r.onresult = e=>{
input.value = e.results[0][0].transcript
}

}

const send = document.createElement("button")
send.innerText = "Enviar"
send.className = "bg-green-600 text-white px-4 rounded-xl"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

await supabaseClient.from("incidencias").insert([formData])

bot("Perfecto, lo he registrado.")

setTimeout(()=>finish(),800)

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

/* ===================== */
/* FINAL LIMPIO */
/* ===================== */

function finish(){

controls.innerHTML = ""

const close = document.createElement("button")
close.className = "flex-1 bg-slate-200 p-3 rounded-xl"
close.innerText = "Cerrar"
close.onclick = ()=>location.reload()

const panel = document.createElement("button")
panel.className = "flex-1 bg-green-600 text-white p-3 rounded-xl"
panel.innerText = "Ver datos"
panel.onclick = ()=>{
window.location.href =
"https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
}

controls.appendChild(close)
controls.appendChild(panel)

}

/* ===================== */
/* INIT */
/* ===================== */

const startBtn = document.createElement("button")
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
