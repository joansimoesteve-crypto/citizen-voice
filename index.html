<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-center min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER MINIMAL -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4 text-center">
  <div class="text-lg font-bold">Citizen Voice</div>
</div>

<!-- AVATAR AREA (AI STEVE STYLE) -->
<div id="assistant" class="flex flex-col items-center justify-center flex-1 px-4">

  <div id="avatar"
       class="w-36 h-36 rounded-full bg-gradient-to-br from-emerald-500 to-green-700 flex items-center justify-center shadow-2xl animate-pulse">

    <svg width="70" height="70" viewBox="0 0 64 64">
      <circle cx="32" cy="24" r="14" fill="white"/>
      <circle cx="27" cy="22" r="2.5" fill="#10b981"/>
      <circle cx="37" cy="22" r="2.5" fill="#10b981"/>
      <path d="M26 30c3 3 9 3 12 0" stroke="#10b981" stroke-width="2" fill="none"/>
      <path d="M18 56c4-10 12-14 14-14s10 4 14 14" fill="white"/>
    </svg>

  </div>

  <div id="subtitle" class="mt-5 text-center text-gray-600 text-sm px-4">
    Pulsa empezar para hablar conmigo
  </div>

</div>

<!-- CONTROLES (solo acciones puntuales) -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE (NO TOCADO) */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

let formData = {}
let currentMap = null

const controls = document.getElementById("controls")

/* ===================== */
/* VOZ */
/* ===================== */

function speak(text){
  speechSynthesis.cancel()
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "es-ES"
  speechSynthesis.speak(msg)
}

/* ===================== */
/* AVATAR TALK (CLAVE UX) */
/* ===================== */

function bot(text){
  document.getElementById("subtitle").innerText = text
  speak(text)
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){
  const d = document.createElement("div")
  d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
  d.innerText = text
  document.getElementById("assistant").appendChild(d)
}

/* ===================== */
/* BUTTONS (flotantes UX) */
/* ===================== */

function buttons(list, callback){
  controls.innerHTML = ""

  list.forEach(o=>{
    const b = document.createElement("button")
    b.className = "bg-green-100 hover:bg-green-200 px-4 py-2 rounded-xl text-sm"
    b.innerText = o
    b.onclick = ()=>{
      controls.innerHTML = ""
      user(o)
      callback(o)
    }
    controls.appendChild(b)
  })
}

/* ===================== */
/* START */
/* ===================== */

function start(){
  bot("Hola, soy Citizen Voice. Vamos a empezar con una pregunta rápida.")

  setTimeout(()=>{
    weeklyQuestion()
  }, 1200)
}

/* ===================== */
/* WEEKLY (igual pero integrado UX) */
/* ===================== */

function weeklyQuestion(){

  bot("¿Qué importancia das a mejorar los espacios culturales infantiles?")

  buttons(["1","2","3","4","5"], async (v)=>{

    await supabaseClient.from("weekly_engagement").insert([{
      week: 1,
      question: "Espacios culturales infantiles",
      answer: parseInt(v),
      created_at: new Date().toISOString()
    }])

    bot("Perfecto. Y ahora, ¿qué quieres registrar?")

    setTimeout(()=> askType(), 900)
  })
}

/* ===================== */
/* FLUJO (igual lógica original) */
/* ===================== */

function askType(){
  buttons(["Incidencia","Propuesta de mejora"], v=>{
    formData.tipo = v
    bot("¿En qué área ocurre?")
    askArea()
  })
}

function askArea(){
  buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad","Otros"], v=>{
    formData.area = v
    bot("¿Cómo lo valoras del 1 al 5?")
    askRate()
  })
}

function askRate(){
  buttons(["1","2","3","4","5"], v=>{
    formData.valoracion = v
    showMap()
  })
}

/* ===================== */
/* MAPA (MISMO FUNCIONAMIENTO) */
/* ===================== */

function showMap(){

  bot("Indica dónde ocurre")

  controls.innerHTML = ""

  const search = document.createElement("input")
  search.placeholder = "Buscar dirección..."
  search.className = "border p-3 rounded-xl w-full mb-2 text-sm"

  const mapDiv = document.createElement("div")
  mapDiv.id = "map"
  mapDiv.style.height = "300px"
  mapDiv.className = "rounded-2xl shadow"

  controls.appendChild(search)
  controls.appendChild(mapDiv)

  setTimeout(()=>{

    if(currentMap) currentMap.remove()

    currentMap = L.map('map').setView([39.47,-0.37],13)

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(currentMap)

    let marker

    const geocoder = L.Control.Geocoder.nominatim()

    search.addEventListener("keydown",(e)=>{
      if(e.key==="Enter"){
        geocoder.geocode(search.value, results=>{
          if(results.length>0){
            const r = results[0]

            currentMap.setView(r.center,16)

            if(marker) currentMap.removeLayer(marker)
            marker = L.marker(r.center).addTo(currentMap)

            formData.lat = r.center.lat
            formData.lng = r.center.lng

            bot("Ubicación registrada")
            askDescription()
          }
        })
      }
    })

    currentMap.on("click", e=>{
      if(marker) currentMap.removeLayer(marker)
      marker = L.marker(e.latlng).addTo(currentMap)

      formData.lat = e.latlng.lat
      formData.lng = e.latlng.lng

      bot("Ubicación guardada")
      askDescription()
    })

  },300)
}

/* ===================== */
/* DESCRIPCIÓN + SUPABASE */
/* ===================== */

function askDescription(){

  bot("Descríbelo brevemente")

  controls.innerHTML = ""

  const input = document.createElement("input")
  input.className = "border p-3 rounded-xl flex-1 text-sm"
  input.placeholder = "Escribe aquí..."

  const send = document.createElement("button")
  send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
  send.innerText = "Enviar"

  send.onclick = async ()=>{

    if(!input.value) return

    user(input.value)
    formData.descripcion = input.value

    await supabaseClient.from("incidencias").insert([{
      tipo: formData.tipo,
      area: formData.area,
      valoracion: formData.valoracion,
      descripcion: formData.descripcion,
      lat: formData.lat,
      lng: formData.lng
    }])

    bot("Registro completado")

    controls.innerHTML = ""

    const close = document.createElement("button")
    close.className = "w-full bg-slate-200 p-3 rounded-xl"
    close.innerText = "Cerrar"
    close.onclick = ()=> location.reload()

    controls.appendChild(close)
  }

  controls.appendChild(input)
  controls.appendChild(send)
}

/* ===================== */
/* INIT */
/* ===================== */

const startBtn = document.createElement("button")
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
  controls.innerHTML = ""
  start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
