<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CitizenVoice</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
margin:0;
}

.container{
width:100%;
max-width:520px;
}

.title{
font-size:42px;
font-weight:bold;
text-align:center;
color:#2e7d32;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:15px;
}

.chat{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
height:70vh;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.bot{
background:#f1f1f1;
padding:14px;
border-radius:12px;
margin:6px 0;
max-width:85%;
}

.user{
background:#2e7d32;
color:white;
padding:12px;
border-radius:12px;
margin:6px 0;
align-self:flex-end;
max-width:85%;
font-size:12px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:16px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-top:6px;
}

.controls{
display:flex;
gap:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">CitizenVoice</div>
<div class="subtitle">Tu opinión en 30 segundos</div>

<div id="chat" class="chat"></div>

<button onclick="start()">Empezar encuesta</button>

</div>

<script>

let step=0
let data={}
const chat=document.getElementById("chat")

function speak(text){

let msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)

}

function bot(text){

let div=document.createElement("div")
div.className="bot"
div.innerText=text

chat.appendChild(div)

speak(text)

scroll()

}

function user(text){

let div=document.createElement("div")
div.className="user"
div.innerText=text

chat.appendChild(div)

scroll()

}

function scroll(){

setTimeout(()=>{
chat.scrollTop=chat.scrollHeight+500
},200)

}

function clearOptions(){

document.querySelectorAll(".option").forEach(b=>b.remove())

}

function start(){

document.querySelector("button").remove()

step=1
next()

}

function next(){

if(step==1){

bot("¿Sobre qué área quieres opinar?")

options([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
],area)

}

if(step==2){

bot("¿Es una incidencia o una propuesta?")

options(["Incidencia","Propuesta"],tipo)

}

if(step==3){

bot("Describe la incidencia")

let div=document.createElement("div")

div.id="descBox"

div.innerHTML=`

<textarea id="desc"></textarea>

<div class="controls">
<button onclick="voice()">🎤</button>
<button onclick="sendDesc()">Enviar</button>
</div>

`

chat.appendChild(div)

scroll()

}

if(step==4){

bot("Indica dirección o código de urna")

let div=document.createElement("div")

div.id="locBox"

div.innerHTML=`

<input id="loc" placeholder="Ej: Calle Mayor 10 o URNA-03">

<button onclick="sendLocation()">Enviar</button>

`

chat.appendChild(div)

scroll()

}

if(step==5){

bot("Valora el servicio")

options(["1","2","3","4","5"],rate)

}

if(step==6){

bot("Gracias. Opinión registrada.")

console.log(data)

}

}

function options(list,callback){

list.forEach(v=>{

let b=document.createElement("button")

b.innerText=v
b.className="option"

b.onclick=()=>{

clearOptions()

user(v)

callback(v)

}

chat.appendChild(b)

})

}

function area(v){

data.area=v
step=2
next()

}

function tipo(v){

data.tipo=v
step=3
next()

}

function sendDesc(){

let val=document.getElementById("desc").value

data.descripcion=val

user(val)

document.getElementById("descBox").remove()

step=4
next()

}

function sendLocation(){

let val=document.getElementById("loc").value

data.ubicacion=val

user(val)

document.getElementById("locBox").remove()

step=5
next()

}

function rate(v){

data.valoracion=v

user("Valoración "+v)

step=6
next()

}

function voice(){

if(!('webkitSpeechRecognition' in window)){
alert("Voz no soportada")
return
}

let rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=function(e){

document.getElementById("desc").value=e.results[0][0].transcript

}

rec.start()

}

</script>

</body>
</html>
