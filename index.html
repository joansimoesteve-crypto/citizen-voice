<script>

let step=0
let data={}
let currentOptions=null

const chat=document.getElementById("chat")

function speak(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

function scrollBottom(){
setTimeout(()=>{
chat.scrollTo({
top:chat.scrollHeight+500,
behavior:"smooth"
})
},200)
}

function addBot(text){
let div=document.createElement("div")
div.className="bubble"
div.innerText=text
chat.appendChild(div)
speak(text)
scrollBottom()
}

function addUser(text){
let div=document.createElement("div")
div.className="user history"
div.innerText=text
chat.appendChild(div)
scrollBottom()
}

function startChat(){

document.getElementById("startBtn").remove()

next()

}

function clearOptions(){
if(currentOptions) currentOptions.remove()
}

function next(){

step++

if(step==1){

addBot("¿Sobre qué área quieres opinar?")

createButtons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
],selectArea)

}

if(step==2){

addBot("¿Es una incidencia o una propuesta?")

createButtons([
"Incidencia",
"Propuesta"
],selectType)

}

if(step==3){

addBot("Describe la incidencia o propuesta")

let div=document.createElement("div")

div.innerHTML=`

<textarea id="desc"></textarea>

<div class="controls">
<button onclick="startVoice()">🎤</button>
<button onclick="sendDesc()">Enviar</button>
</div>

`

chat.appendChild(div)

scrollBottom()

}

if(step==4){

addBot("Indica la calle o lugar")

let div=document.createElement("div")

div.innerHTML=`

<input id="loc" onkeyup="searchStreet()" placeholder="Escribe una calle">

<div id="suggestions" class="suggestions"></div>

<button onclick="sendLocation()">Enviar ubicación</button>

`

chat.appendChild(div)

scrollBottom()

}

if(step==5){

addBot("Valora el servicio")

createButtons(["1","2","3","4","5"],rate)

}

if(step==6){

addBot("Gracias. Tu opinión ha sido registrada.")

sendToExcel()

}

}

function createButtons(arr,callback){

clearOptions()

let div=document.createElement("div")

arr.forEach(v=>{
let b=document.createElement("button")
b.innerText=v
b.onclick=()=>{
callback(v)
clearOptions()
}
div.appendChild(b)
})

chat.appendChild(div)

currentOptions=div

scrollBottom()

}

function selectArea(v){
data.area=v
addUser(v)
next()
}

function selectType(v){
data.tipo=v
addUser(v)
next()
}

function sendDesc(){

let val=document.getElementById("desc").value

data.descripcion=val

addUser(val)

next()

}

function sendLocation(){

let val=document.getElementById("loc").value

data.ubicacion=val

addUser(val)

next()

}

function rate(v){

data.valoracion=v

addUser("Valoración "+v)

next()

}

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Tu navegador no soporta voz")
return
}

let rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=function(e){
document.getElementById("desc").value=e.results[0][0].transcript
}

rec.start()

}

async function searchStreet(){

let q=document.getElementById("loc").value

if(q.length<3)return

let url="https://photon.komoot.io/api/?q="+q+"&limit=5"

let res=await fetch(url)

let result=await res.json()

let box=document.getElementById("suggestions")

box.innerHTML=""

result.features.forEach(place=>{

let name=place.properties.name || place.properties.street
let city=place.properties.city || ""

let label=name+" "+city

let div=document.createElement("div")

div.innerText=label

div.onclick=()=>{
document.getElementById("loc").value=label
box.innerHTML=""
}

box.appendChild(div)

})

}

function sendToExcel(){

fetch("TU_WEBHOOK_POWER_AUTOMATE",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

}

</script>
