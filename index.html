<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-[#EEF2F5] flex justify-center min-h-screen">

<div class="w-full max-w-md bg-white flex flex-col min-h-screen rounded-[30px] overflow-hidden shadow-xl">

<!-- HEADER -->
<div class="bg-gradient-to-r from-emerald-600 to-green-500 text-white p-4">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
      👤
    </div>
    <div>
      <div class="font-bold">Citizen Voice</div>
      <div class="text-xs opacity-80">Asistente ciudadano</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 p-3 overflow-y-auto flex flex-col gap-3"></div>

<!-- MAP -->
<div id="mapContainer" class="hidden p-3">
  <div id="map" class="h-[320px] w-full rounded-xl"></div>
</div>

<!-- CONTROLS -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ================= SUPABASE ================= */

const supabaseClient = supabase.createClient(
  "https://saiclsejxsycmeefuhvs.supabase.co",
  "sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

/* ================= HUGGING FACE (IA) ================= */

async function callAI(text){

  try {
    const res = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ inputs: text })
    })

    const data = await res.json()
    return data.generated_text || "Sin respuesta IA"

  } catch (e) {
    console.log("AI error", e)
    return "Error IA"
  }
}

/* ================= STATE ================= */

let form = {}
let map, marker

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapContainer = document.getElementById("mapContainer")

/* ================= VOZ ================= */

function speak(t){
  const msg = new SpeechSynthesisUtterance(t)
  msg.lang = "es-ES"
  speechSynthesis.cancel()
  speechSynthesis.speak(msg)
}

/* ================= BOT ================= */

function bot(t){
  const row = document.createElement("div")
  row.className = "flex gap-2"

  const avatar = document.createElement("div")
  avatar.className = "w-9 h-9 rounded-full bg-emerald-600 flex items-center justify-center"
  avatar.innerHTML = "🙂"

  const bubble = document.createElement("div")
  bubble.className = "bg-emerald-100 p-3 rounded-2xl text-sm"
  bubble.innerText = t

  row.appendChild(avatar)
  row.appendChild(bubble)

  chat.appendChild(row)
  chat.scrollTop = chat.scrollHeight

  speak(t)
}

/* ================= USER ================= */

function user(t){
  const d = document.createElement("div")
  d.className = "ml-auto bg-emerald-600 text-white p-3 rounded-2xl text-sm"
  d.innerText = t
  chat.appendChild(d)
}

/* ================= BUTTONS ================= */

function buttons(list, cb){
  controls.innerHTML = ""
  list.forEach(v=>{
    const b = document.createElement("button")
    b.className = "bg-emerald-100 px-3 py-2 rounded-xl text-sm"
    b.innerText = v
    b.onclick = ()=>{
      user(v)
      controls.innerHTML = ""
      cb(v)
    }
    controls.appendChild(b)
  })
}

/* ================= START ================= */

function start(){

  form = {}

  bot("Hola, soy Citizen Voice. Asistente virtual ciudadano.")

  bot("¿Qué quieres registrar?")

  buttons(["Incidencia","Mejora"], v=>{
    form.tipo = v
    askArea()
  })
}

/* ================= AREA ================= */

function askArea(){

  bot("¿En qué área ocurre?")

  buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
    form.area = v
    askDescription()
  })
}

/* ================= MAP ================= */

function showMap(){

  mapContainer.classList.remove("hidden")

  setTimeout(()=>{

    if(!map){
      map = L.map("map").setView([39.47,-0.37],13)
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)
    }

    map.invalidateSize()

    map.on("click", e=>{
      if(marker) map.removeLayer(marker)

      marker = L.marker(e.latlng).addTo(map)

      form.lat = e.latlng.lat
      form.lng = e.latlng.lng

      finish()
    })

  },200)
}

/* ================= IA + SAVE ================= */

async function askDescription(){

  bot("Describe la situación")

  controls.innerHTML = ""

  const input = document.createElement("input")
  input.className = "border p-2 rounded-xl flex-1 text-sm"

  const mic = document.createElement("button")
  mic.innerText = "🎤"
  mic.className = "px-3 bg-gray-200 rounded-xl"

  mic.onclick = ()=>{
    const r = new webkitSpeechRecognition()
    r.lang = "es-ES"
    r.start()
    r.onresult = e=>{
      input.value = e.results[0][0].transcript
    }
  }

  const send = document.createElement("button")
  send.innerText = "Mapa"
  send.className = "bg-emerald-600 text-white px-3 rounded-xl"

  send.onclick = async ()=>{

    if(!input.value) return

    user(input.value)
    form.descripcion = input.value

    /* 🔥 IA RESTAURADA */
    const ai = await callAI(input.value)

    form.resumen = ai

    showMap()
  }

  controls.appendChild(input)
  controls.appendChild(mic)
  controls.appendChild(send)
}

/* ================= SAVE ================= */

async function finish(){

  bot("Guardando registro...")

  /* limpiar payload */
  const payload = {
    tipo: form.tipo,
    area: form.area,
    descripcion: form.descripcion,
    lat: form.lat || null,
    lng: form.lng || null,
    resumen: form.resumen || ""
  }

  const { error } = await supabaseClient
    .from("incidencias")
    .insert([payload])

  if(error){
    console.log(error)
    bot("Error guardando en Supabase")
    return
  }

  await supabaseClient
    .from("weekly_engagement")
    .insert([{ created_at: new Date().toISOString() }])

  bot("Registro completado correctamente")

  showFinal()
}

/* ================= FINAL ================= */

function showFinal(){

  controls.innerHTML = ""

  const btn = document.createElement("button")
  btn.className = "bg-emerald-600 text-white px-4 py-2 rounded-xl"
  btn.innerText = "Ver datos"

  btn.onclick = ()=>{
    window.location.href =
    "https://citizen-voice-xjcc-24bhfesc1-joansimoesteve-cryptos-projects.vercel.app/citizen.html"
  }

  const close = document.createElement("button")
  close.className = "bg-gray-200 px-4 py-2 rounded-xl"
  close.innerText = "Cerrar"

  close.onclick = ()=> location.reload()

  controls.appendChild(btn)
  controls.appendChild(close)
}

/* ================= INIT ================= */

const startBtn = document.createElement("button")
startBtn.className = "w-full bg-emerald-600 text-white p-4 rounded-xl"
startBtn.innerText = "Empezar"

startBtn.onclick = ()=>{
  controls.innerHTML = ""
  start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
