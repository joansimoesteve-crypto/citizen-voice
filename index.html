<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CitizenVoice</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:500px;
}

.title{
font-size:42px;
font-weight:bold;
text-align:center;
color:#2e7d32;
}

.subtitle{
text-align:center;
margin-bottom:15px;
}

.chat{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
max-height:65vh;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.bubble{
background:#eee;
padding:12px;
border-radius:10px;
margin:5px 0;
}

.user{
background:#2e7d32;
color:white;
align-self:flex-end;
padding:12px;
border-radius:10px;
margin:5px 0;
}

button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
font-size:16px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="container">

<div class="title">CitizenVoice</div>

<div class="subtitle">
Tu opinión en 30 segundos
</div>

<div id="chat" class="chat"></div>

<button id="startBtn">Empezar encuesta</button>

</div>

<script>

let step = 0
let data = {}

const chat = document.getElementById("chat")
const startBtn = document.getElementById("startBtn")

startBtn.onclick = startChat

function bot(text){

let div=document.createElement("div")
div.className="bubble"
div.innerText=text

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

function user(text){

let div=document.createElement("div")
div.className="user"
div.innerText=text

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

function startChat(){

startBtn.style.display="none"

step=1

next()

}

function next(){

if(step==1){

bot("¿Sobre qué área quieres opinar?")

createButtons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
], areaSelected)

}

if(step==2){

bot("¿Es una incidencia o una propuesta?")

createButtons([
"Incidencia",
"Propuesta"
], typeSelected)

}

if(step==3){

bot("Describe la incidencia o propuesta")

let div=document.createElement("div")

div.innerHTML=`
<textarea id="desc"></textarea>
<button onclick="sendDesc()">Enviar</button>
`

chat.appendChild(div)

}

if(step==4){

bot("Indica la calle o lugar")

let div=document.createElement("div")

div.innerHTML=`
<input id="loc">
<button onclick="sendLoc()">Enviar ubicación</button>
`

chat.appendChild(div)

}

if(step==5){

bot("Valora el servicio")

createButtons(["1","2","3","4","5"],rate)

}

if(step==6){

bot("Gracias. Tu opinión ha sido registrada.")

console.log(data)

}

}

function createButtons(arr,callback){

arr.forEach(v=>{

let b=document.createElement("button")

b.innerText=v

b.onclick=()=>{

user(v)

callback(v)

}

chat.appendChild(b)

})

}

function areaSelected(v){

data.area=v

step=2

next()

}

function typeSelected(v){

data.tipo=v

step=3

next()

}

function sendDesc(){

let val=document.getElementById("desc").value

data.descripcion=val

user(val)

step=4

next()

}

function sendLoc(){

let val=document.getElementById("loc").value

data.ubicacion=val

user(val)

step=5

next()

}

function rate(v){

data.valoracion=v

user("Valoración "+v)

step=6

next()

}

</script>

</body>

</html>
