<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 CitizenVoice</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #e6f2e6;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}
#container {
  width: 100%;
  max-width: 500px;
  margin-top: 20px;
}
#title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #1faa59;
}
#chat {
  height: 65vh;
  background: #fff;
  border-radius: 15px;
  padding: 10px;
  overflow-y: auto;
  box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}
.bubble {
  padding: 16px;
  margin: 5px 0;
  max-width: 75%;
  border-radius: 20px;
  font-size: 1rem;
  transition: all 0.3s ease;
}
.bot {
  background: #f1f1f1;
}
.user {
  background: #1faa59;
  color: white;
  margin-left: auto;
}
button.option {
  display: block;
  width: 90%;
  max-width: 400px;
  margin: 8px auto;
  padding: 16px 0;
  font-size: 1.1rem;
  border-radius: 30px;
  background: #1faa59;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
input[type=text] {
  width: 70%;
  padding: 12px;
  margin-right: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 1rem;
}
button.sendBtn, button.micBtn, button.activateMic {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
button.sendBtn { background:#1faa59; color:white; }
button.micBtn { background:#4CAF50; color:white; }
button.activateMic { background:#1faaff; color:white; width:90%; margin:10px auto; display:block; }
#mapContainer { display:none; }
#map { height: 200px; margin-top:10px; border-radius:10px; }
</style>
</head>
<body>
<div id="container">
  <div id="title">🎤 CitizenVoice – Tu opinión importa</div>
  <button id="enableMic" class="activateMic">Activar voz y permisos de micrófono</button>
  <div id="chat"></div>
  <div id="mapContainer">
    <p>Selecciona tu ubicación o escribe tu calle:</p>
    <input id="addressInput" type="text" placeholder="Escribe tu calle...">
    <button id="sendLocation" class="sendBtn">Confirmar ubicación</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const chat = document.getElementById('chat');
const enableMic = document.getElementById('enableMic');

let speechAllowed=false;

enableMic.onclick = ()=>{
    speechAllowed=true;
    addBot("¡Micrófono activado! Ahora puedo hablarte.");
    enableMic.style.display='none';
}

// Funciones de conversación
function addBot(message){
    const div = document.createElement('div');
    div.className='bubble bot';
    div.innerText = message;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    if(speechAllowed){
        const utter = new SpeechSynthesisUtterance(message);
        utter.lang='es-ES';
        speechSynthesis.speak(utter);
    }
}

function addUser(message){
    const div = document.createElement('div');
    div.className='bubble user';
    div.innerText = message;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Variables
let area='', tipo='', descripcion='', puntuacion=0, lat=0, lon=0;

// Flujo
function askArea(){
    addBot('¿Sobre qué área quieres opinar?');
    ['Urbanismo','Limpieza','Movilidad','Seguridad','Parques','Otra'].forEach(a=>{
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=a;
        btn.onclick=()=>{
            addUser(a);
            area=a;
            askTipo();
        }
        chat.appendChild(btn);
    });
}

function askTipo(){
    addBot('¿Es una incidencia o propuesta?');
    ['Incidencia','Propuesta'].forEach(t=>{
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=t;
        btn.onclick=()=>{
            addUser(t);
            tipo=t;
            askDescripcion();
        }
        chat.appendChild(btn);
    });
}

function askDescripcion(){
    addBot('Describe tu mensaje usando voz o texto.');
    const input = document.createElement('input');
    input.type='text';
    input.placeholder='Escribe aquí o pulsa 🎤';
    const mic = document.createElement('button');
    mic.innerText='🎤';
    mic.className='micBtn';
    mic.onclick=()=>{
        if(!speechAllowed){ alert("Pulsa 'Activar voz' primero"); return; }
        let recognition;
        if(window.SpeechRecognition || window.webkitSpeechRecognition){
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang='es-ES';
            recognition.onresult = (e) => { input.value = e.results[0][0].transcript; }
            recognition.start();
        } else { alert("Tu navegador no soporta reconocimiento de voz"); }
    }
    const send = document.createElement('button');
    send.innerText='Enviar';
    send.className='sendBtn';
    send.onclick=()=>{
        if(input.value.trim()==='') return;
        addUser(input.value);
        descripcion=input.value;
        askPuntuacion();
    }
    chat.appendChild(input);
    chat.appendChild(mic);
    chat.appendChild(send);
}

function askPuntuacion(){
    addBot('Valora el servicio (1 = Muy malo, 5 = Excelente)');
    for(let i=1;i<=5;i++){
        const btn = document.createElement('button');
        btn.className='option';
        btn.innerText=i;
        btn.onclick=()=>{
            addUser(i);
            puntuacion=i;
            askUbicacion();
        }
        chat.appendChild(btn);
    }
}

function askUbicacion(){
    addBot('Indica tu ubicación escribiendo tu calle.');
    document.getElementById('mapContainer').style.display='block';
    const input = document.getElementById('addressInput');
    const sendLoc = document.getElementById('sendLocation');
    sendLoc.onclick=()=>{
        if(input.value.trim()==='') return;
        addUser(input.value);
        // Aquí se podría integrar autocomplete con Google Places API para sugerencias
        // y luego obtener lat/lon reales
        lat=0; lon=0;
        addBot('¡Gracias! Tu opinión ha sido registrada.');
        console.log({area,tipo,descripcion,puntuacion,lat,lon});
    }
}

// Inicia flujo
askArea();
</script>
</body>
</html>
