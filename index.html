<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>

<body class="bg-green-50 flex justify-center min-h-screen p-2">

<div class="w-full max-w-md h-[95vh] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white p-4">

<div class="flex items-center gap-3">

<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
<svg width="28" height="28" viewBox="0 0 24 24" fill="white">
<path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/>
<path d="M4 21c0-3.3 3.6-6 8-6s8 2.7 8 6"/>
</svg>
</div>

<div>
<div class="font-bold text-lg">Citizen Voice</div>
<div class="text-xs opacity-90">Asistente de participación ciudadana</div>
</div>

</div>

</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3"></div>

<!-- MAPA FIJO (ESTO ES LO QUE ARREGLA TODO) -->
<div id="mapContainer" class="hidden p-3">
<div id="map" class="w-full h-[480px] rounded-2xl shadow"></div>
</div>

<!-- CONTROLES -->
<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

/* ===================== */
/* SUPABASE */
/* ===================== */

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const mapContainer = document.getElementById("mapContainer")

let formData = {}
let map = null
let marker = null

/* ===================== */
/* BOT (SIN ICONOS LEÍBLES) */
/* ===================== */

function bot(text){

const row = document.createElement("div")
row.className = "flex items-start gap-2"

const avatar = document.createElement("div")
avatar.className = "w-10 h-10 rounded-full bg-green-600 flex items-center justify-center"

avatar.innerHTML = `
<svg width="20" height="20" viewBox="0 0 24 24" fill="white">
<path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/>
<path d="M4 21c0-3.3 3.6-6 8-6s8 2.7 8 6"/>
</svg>
`

const bubble = document.createElement("div")
bubble.className = "bg-green-100 p-3 rounded-2xl text-sm w-[80%]"
bubble.innerText = text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* USER */
/* ===================== */

function user(text){

const d = document.createElement("div")
d.className = "bg-green-600 text-white p-3 rounded-2xl text-sm w-[80%] ml-auto"
d.innerText = text

chat.appendChild(d)
chat.scrollTop = chat.scrollHeight
}

/* ===================== */
/* BOTONES */
/* ===================== */

function buttons(list, cb){

controls.innerHTML = ""

list.forEach(t=>{

const b = document.createElement("button")
b.className = "bg-green-100 px-4 py-2 rounded-xl text-sm"
b.innerText = t

b.onclick = ()=>{
controls.innerHTML = ""
user(t)
cb(t)
}

controls.appendChild(b)

})

}

/* ===================== */
/* START */
/* ===================== */

function start(){

bot("Bienvenido a Citizen Voice")

bot("#ConsultaSemanal-1")
bot("¿Qué importancia das a mejorar actividades culturales infantiles?")

buttons(["1","2","3","4","5"], v=>{
formData.weekly = v
askType()
})

}

/* ===================== */
/* FLUJO */
/* ===================== */

function askType(){

bot("¿Qué quieres registrar: incidencia o mejora?")

buttons(["Incidencia","Mejora"], v=>{
formData.tipo = v
askArea()
})

}

function askArea(){

bot("¿Cómo valoras esta área actualmente?")

buttons(["Movilidad","Limpieza","Urbanismo","Cultura","Seguridad"], v=>{
formData.area = v
showMap()
})

}

/* ===================== */
/* MAPA FIX DEFINITIVO */
/* ===================== */

function showMap(){

bot("Selecciona ubicación en el mapa")

controls.innerHTML = ""
mapContainer.classList.remove("hidden")

setTimeout(()=>{

if(!map){

map = L.map('map').setView([39.47, -0.37], 13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

} else {
map.invalidateSize()
}

const geocoder = L.Control.Geocoder.nominatim()

map.on("click", e => {

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

askDescription()

})

},200)

}

/* ===================== */
/* DESCRIPCIÓN */
/* ===================== */

function askDescription(){

bot("Describe el problema o mejora")

controls.innerHTML = ""

const input = document.createElement("input")
input.className = "border p-3 rounded-xl flex-1 text-sm"

const send = document.createElement("button")
send.className = "bg-green-600 text-white px-4 py-2 rounded-xl"
send.innerText = "Enviar"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)
formData.descripcion = input.value

await supabaseClient
.from("incidencias")
.insert([formData])

bot("Registro completado correctamente")

}

controls.appendChild(input)
controls.appendChild(send)

}

/* ===================== */
/* INIT */
/* ===================== */

const startBtn = document.createElement("button")
startBtn.innerText = "Empezar"
startBtn.className = "w-full bg-green-600 text-white py-4 rounded-xl text-lg"

startBtn.onclick = ()=>{
controls.innerHTML = ""
start()
}

controls.appendChild(startBtn)

</script>

</body>
</html>
