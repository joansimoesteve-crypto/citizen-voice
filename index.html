<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 flex items-center justify-center h-screen">

<div class="w-[420px] h-[90vh] bg-white rounded-xl shadow-xl flex flex-col">

<div class="bg-blue-600 text-white p-4 font-bold">
Asistente ciudadano
</div>

<div id="chat" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

<div id="controls" class="p-4 border-t"></div>

</div>

<script>

const chat=document.getElementById("chat")
const controls=document.getElementById("controls")

function bot(text){

const d=document.createElement("div")

d.className="bg-gray-100 p-3 rounded-lg max-w-[75%]"

d.innerText=text

chat.appendChild(d)

chat.scrollTop=chat.scrollHeight

}

function user(text){

const d=document.createElement("div")

d.className="bg-blue-600 text-white p-3 rounded-lg max-w-[75%] ml-auto"

d.innerText=text

chat.appendChild(d)

chat.scrollTop=chat.scrollHeight

}

function buttons(list,callback){

controls.innerHTML=""

list.forEach(o=>{

const b=document.createElement("button")

b.className="bg-gray-100 px-3 py-2 rounded-lg mr-2 mb-2"

b.innerText=o

b.onclick=()=>{

user(o)

callback(o)

}

controls.appendChild(b)

})

}

function start(){

bot("Hola 👋 ¿Qué quieres registrar?")

buttons(["Incidencia","Propuesta"],v=>{

bot("Has elegido: "+v)

})

}

start()

</script>

</body>

</html>
