<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Citizen Voice AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
background:
linear-gradient(
180deg,
#02120d 0%,
#06281f 45%,
#03140f 100%
);
overflow:hidden;
font-family:sans-serif;
}

/* HERO CON EL AURA BRUTAL ORIGINAL MEJORADA */

.hero{
position:relative;
height:240px;
overflow:hidden;
background:
radial-gradient(circle at top,#1dd1a1 0%,#065f46 45%,#02120d 100%);
}

.glow{
position:absolute;
width:260px;
height:260px;
background:rgba(16,185,129,.35);
filter:blur(70px);
border-radius:9999px;
top:-60px;
left:50%;
transform:translateX(-50%);
}

.avatar-wrapper{
position:absolute;
left:50%;
top:46%;
transform:translate(-50%,-50%);
z-index:10;
}

/* EL AURA BRUTAL ORIGINAL POR DETRÁS (MÁXIMA EXPANSIÓN Y GLOW) */
.avatar-aura {
position: absolute;
inset: -15px;
background: linear-gradient(45deg, #10b981, #34d399, #059669);
border-radius: 40% 60% 65% 35% / 40% 45% 55% 60%;
filter: blur(25px);
opacity: 0.5;
animation: morphAura 7s infinite linear;
z-index: 1;
transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Aura en Modo Hablar (Verde Esmeralda Líquido e Intenso) */
.avatar-aura.active {
opacity: 0.95;
inset: -32px;
filter: blur(18px);
animation: morphAuraActive 1.1s infinite linear;
}

/* Aura en Modo Escuchar (Azul Cian Eléctrico Avanzado) */
.avatar-aura.listening {
background: linear-gradient(45deg, #06b6d4, #22d3ee, #0891b2);
opacity: 0.95;
inset: -35px;
filter: blur(15px);
animation: morphAuraActive 0.6s infinite linear;
}

.avatar-ring{
position:absolute;
inset:-10px;
border-radius:9999px;
border:3px solid rgba(16,185,129,.5);
box-shadow: 0 0 15px rgba(16,185,129,.3);
animation:pulse 3s infinite ease-in-out;
transition: all 0.3s ease;
z-index: 2;
}

.avatar-ring.active {
animation: pulse-intense 0.8s infinite ease-in-out;
border-color: rgba(52,211,153,1);
box-shadow: 0 0 25px rgba(52,211,153,.8);
}

.avatar-ring.listening {
animation: pulse-intense 0.5s infinite ease-in-out;
border-color: #22d3ee;
box-shadow: 0 0 30px rgba(34, 211, 238, 0.9);
}

.avatar{
width:120px;
height:120px;
border-radius:9999px;
overflow:hidden;
border:4px solid rgba(255,255,255,.15);
box-shadow:0 25px 60px rgba(0,0,0,.45);
position:relative;
z-index:3;
background: #0f172a;
transition: all 0.3s ease;
}

.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center;
}

.status{
position:absolute;
bottom:6px;
right:6px;
width:18px;
height:18px;
background:#22c55e;
border:3px solid white;
border-radius:9999px;
z-index:20;
transition: all 0.3s ease;
}

.status.listening {
background: #06b6d4;
box-shadow: 0 0 12px #06b6d4;
}

/* ECUALIZADOR DIGITAL DE VOZ */
.equalizer {
display: flex;
justify-content: center;
align-items: flex-end;
gap: 3px;
width: 60px;
height: 20px;
position: absolute;
bottom: -32px;
left: 50%;
transform: translateX(-50%);
opacity: 0;
transition: opacity 0.3s ease;
z-index: 20;
}

.equalizer.active {
opacity: 1;
}

.equalizer .bar {
width: 4px;
height: 4px;
background: #34d399;
border-radius: 2px;
transition: background 0.3s ease;
}

.equalizer.active .bar:nth-child(1) { animation: equalizerGo 0.6s infinite ease-in-out alternate; }
.equalizer.active .bar:nth-child(2) { animation: equalizerGo 0.4s infinite ease-in-out alternate 0.1s; }
.equalizer.active .bar:nth-child(3) { animation: equalizerGo 0.7s infinite ease-in-out alternate 0.2s; }
.equalizer.active .bar:nth-child(4) { animation: equalizerGo 0.5s infinite ease-in-out alternate 0.15s; }
.equalizer.active .bar:nth-child(5) { animation: equalizerGo 0.6s infinite ease-in-out alternate 0.3s; }

/* CHAT */

#chat{
scroll-behavior:smooth;
}

#chat::-webkit-scrollbar{
width:4px;
}

#chat::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:20px;
}

/* BURBUJAS */

.bot-row{
display:flex;
gap:10px;
align-items:flex-end;
animation:fade .25s ease;
}

.bot-mini{
width:36px;
height:36px;
border-radius:9999px;
overflow:hidden;
flex-shrink:0;
border:2px solid rgba(255,255,255,.15);
background: #0f172a;
}

.bot-mini img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center;
}

.bot-bubble{
background:rgba(255,255,255,.11);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
padding:14px;
border-radius:22px;
color:white;
font-size:14px;
line-height:1.5;
max-width:80%;
box-shadow:0 10px 35px rgba(0,0,0,.18);
transition: all 0.2s ease;
}

/* PUNTOS SUSPENSIVOS ANIMADOS (CONVERSACIÓN NATURAL) */
.typing-dot {
width: 6px;
height: 6px;
background: rgba(255, 255, 255, 0.65);
border-radius: 50%;
animation: typingBounce 1.4s infinite ease-in-out both;
}
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }

.user-bubble{
background:
linear-gradient(
135deg,
#10b981,
#059669
);

padding:14px;
border-radius:22px;
color:white;
font-size:14px;
max-width:80%;
margin-left:auto;
box-shadow:0 10px 35px rgba(16,185,129,.25);
animation:fade .25s ease;
}

/* CONTROLES */

.controls{
background:rgba(0,0,0,.22);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.08);
flex-shrink: 0 !important;
}

.no-scrollbar::-webkit-scrollbar {
display: none;
}
.no-scrollbar {
-ms-overflow-style: none;
scrollbar-width: none;
}

.option-btn{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
color:white;
padding:6px 12px;
border-radius:12px;
font-size:12px;
transition:.2s;
backdrop-filter:blur(10px);
flex-shrink: 0;
}

.option-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.16);
}

.input{
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.08);
padding:10px;
border-radius:14px;
color:white;
width:100%;
outline:none;
font-size:13px;
}

.input::placeholder{
color:rgba(255,255,255,.45);
}

/* MAP */

#map{
border-radius:24px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

/* ANIMACIONES */

@keyframes morphAura {
0% { border-radius: 40% 60% 65% 35% / 40% 45% 55% 60%; transform: rotate(0deg); }
50% { border-radius: 60% 40% 35% 65% / 50% 60% 40% 50%; }
100% { border-radius: 40% 60% 65% 35% / 40% 45% 55% 60%; transform: rotate(360deg); }
}

@keyframes morphAuraActive {
0% { transform: rotate(0deg) scale(1); }
50% { transform: rotate(180deg) scale(1.1); filter: blur(14px); }
100% { transform: rotate(360deg) scale(1); }
}

@keyframes equalizerGo {
0% { height: 4px; }
100% { height: 20px; }
}

@keyframes typingBounce {
0%, 80%, 100% { transform: scale(0); }
40% { transform: scale(1); }
}

@keyframes pulse{
0%{
transform:scale(1);
opacity:0.8;
}
50%{
transform:scale(1.1);
opacity:0.4;
box-shadow: 0 0 25px rgba(16,185,129,.5);
}
100%{
transform:scale(1);
opacity:0.8;
}
}

@keyframes pulse-intense{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.18);
opacity:0.6;
box-shadow: 0 0 40px rgba(52,211,153,1);
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body class="flex justify-center items-center min-h-[100dvh] p-2">

<div class="w-full max-w-md h-[96dvh] rounded-[34px] overflow-hidden border border-white/10 bg-black/20 backdrop-blur-xl shadow-2xl flex flex-col">

<div class="hero">

<div class="glow"></div>

<button id="fullscreen-btn" class="absolute top-4 right-4 z-30 bg-white/10 hover:bg-white/20 text-white p-2 rounded-xl backdrop-blur-md transition-all duration-200" title="Pantalla completa">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4" />
  </svg>
</button>

<div class="avatar-wrapper">

<div id="aura" class="avatar-aura"></div>

<div id="ring" class="avatar-ring"></div>

<div class="avatar">
<img src="avatar.png" alt="Citizen Voice Avatar">
</div>

<div id="status" class="status"></div>

<div id="equalizer" class="equalizer">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

</div>

<div class="absolute bottom-5 left-0 right-0 text-center z-20">

<div class="text-white text-2xl font-bold tracking-wide">
Citizen Voice AI
</div>

<div class="text-emerald-100 text-sm opacity-90 mt-1">
Asistente virtual para participación ciudadana
</div>

</div>

</div>

<div
id="chat"
class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3"
></div>

<div
id="controls"
class="controls p-3 flex flex-col gap-2"
></div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://saiclsejxsycmeefuhvs.supabase.co",
"sb_publishable_47xYI_TzRSCVKyule8JK4g_mDx3t0VI"
)

const chat = document.getElementById("chat")
const controls = document.getElementById("controls")
const ring = document.getElementById("ring")
const aura = document.getElementById("aura")
const statusDot = document.getElementById("status")
const equalizer = document.getElementById("equalizer")
const fullscreenBtn = document.getElementById("fullscreen-btn")

fullscreenBtn.onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener("fullscreenchange", () => {
  if (document.fullscreenElement) {
    fullscreenBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>`;
  } else {
    fullscreenBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4" /></svg>`;
  }
});

let formData = {}
let currentMap = null

function getLocalISOString() {
const d = new Date();
const pad = num => String(num).padStart(2, '0');
const offset = -d.getTimezoneOffset();
const sign = offset >= 0 ? '+' : '-';
const offsetHours = pad(Math.floor(Math.abs(offset) / 60));
const offsetMins = pad(Math.abs(offset) % 60);

return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}${sign}${offsetHours}:${offsetMins}`;
}

function pulseRing(state, duration = 0) {
  ring.classList.remove("active", "listening");
  aura.classList.remove("active", "listening");
  statusDot.classList.remove("listening");
  equalizer.classList.remove("active");

  if(state === "speaking") {
    ring.classList.add("active");
    aura.classList.add("active");
    equalizer.classList.add("active");
    if(duration > 0) {
      setTimeout(() => pulseRing(false), duration);
    }
  } else if(state === "listening") {
    ring.classList.add("listening");
    aura.classList.add("listening");
    statusDot.classList.add("listening");
  }
}

function scrollToBottom() {
setTimeout(() => {
chat.scrollTop = chat.scrollHeight
}, 60)
}

function speak(text){

speechSynthesis.cancel()

const msg = new SpeechSynthesisUtterance(text)

msg.lang = "es-ES"
msg.rate = 1

speechSynthesis.speak(msg)

}

/* FUNCIÓN BOT TOTALMENTE HUMANA Y NATURAL (CON EFECTO DE ESCRITURA ORGÁNICA) */
function bot(text){

pulseRing("speaking");

const row = document.createElement("div")
row.className = "bot-row"

const avatar = document.createElement("div")
avatar.className = "bot-mini"
avatar.innerHTML = `<img src="avatar.png" alt="AI">`

const bubble = document.createElement("div")
// Inicializar con puntos suspensivos en movimiento
bubble.className = "bot-bubble flex items-center justify-center gap-1 py-4 px-5 min-w-[55px]"
bubble.innerHTML = `
  <div class="typing-dot"></div>
  <div class="typing-dot"></div>
  <div class="typing-dot"></div>
`

row.appendChild(avatar)
row.appendChild(bubble)
chat.appendChild(row)
scrollToBottom()

// Tras 1 segundo de "procesamiento cerebral", la IA habla y muestra el texto
setTimeout(() => {
  bubble.className = "bot-bubble"
  bubble.innerHTML = ""
  bubble.innerText = text
  scrollToBottom()
  speak(text)
  
  // Apagar la animación automáticamente de acuerdo a la extensión del texto
  setTimeout(() => {
    if(ring.classList.contains("active")) {
      pulseRing(false);
    }
  }, text.length * 65 + 400);
}, 1000);

}

function user(text){

const d = document.createElement("div")

d.className = "user-bubble"

d.innerText = text

chat.appendChild(d)

scrollToBottom()

}

function buttons(list, callback){

controls.innerHTML = ""

const btnRow = document.createElement("div")
btnRow.className = "flex flex-row flex-nowrap gap-2 overflow-x-auto w-full no-scrollbar py-1"
btnRow.style.webkitOverflowScrolling = "touch"

list.forEach(o=>{

const b = document.createElement("button")

b.className = "option-btn flex-shrink-0"

b.innerText = o

b.onclick = ()=>{

controls.innerHTML = ""

user(o)

callback(o)

}

btnRow.appendChild(b)

})

controls.appendChild(btnRow)
scrollToBottom()

}

/* TEXTO REFORMADO MÁS CORTO Y DIRECTO */
function weeklyQuestion(){

bot("Para empezar, una consulta semanal: ¿Qué importancia das a mejorar los espacios culturales?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], async (v)=>{

try{

await supabaseClient
.from("weekly_engagement")
.insert([{
week: 1,
question: "¿Qué importancia das a mejorar los espacios culturales?",
area: "Cultura",
answer: parseInt(v.charAt(v.length - 1)),
created_at: getLocalISOString()
}])

}catch(err){
console.log(err)
}

bot("Perfecto. ¿Qué deseas registrar?")

askType()

})

}

function askType(){

buttons([
"Incidencia",
"Propuesta de mejora"
], v=>{

formData.tipo = v

askArea()

})

}

function askArea(){

bot("¿En qué área afecta?")

buttons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Otros"
], v=>{

formData.area = v

askRate()

})

}

function askRate(){

bot("¿Cómo valoras esta área actualmente?")

buttons([
"😡 1",
"😕 2",
"😐 3",
"🙂 4",
"😄 5"
], v=>{

formData.valoracion =
parseInt(v.charAt(v.length - 1))

showMap()

})

}

function showMap(){

bot("Indica dónde ocurre en el mapa.")

controls.innerHTML = ""

const wrapper = document.createElement("div")
wrapper.className = "w-full flex flex-col gap-2"

const geoBtn = document.createElement("button")
geoBtn.type = "button"
geoBtn.className = "w-full py-2.5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-xl text-xs font-semibold shadow-md hover:opacity-90 transition flex items-center justify-center gap-1"
geoBtn.innerHTML = "📍 Usar mi ubicación actual"

const mapDiv = document.createElement("div")
mapDiv.id = "map"
mapDiv.style.height = "200px"

wrapper.appendChild(geoBtn)
wrapper.appendChild(mapDiv)

controls.appendChild(wrapper)
scrollToBottom()

setTimeout(()=>{

if(currentMap){
currentMap.remove()
}

currentMap = L.map('map').setView([39.4702,-0.3768],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(currentMap)

let marker

geoBtn.onclick = () => {
if (navigator.geolocation) {
geoBtn.innerText = "Buscando GPS..."
navigator.geolocation.getCurrentPosition(
(position) => {
const lat = position.coords.latitude
const lon = position.coords.longitude

currentMap.setView([lat, lon], 16)

if(marker) currentMap.removeLayer(marker)
marker = L.marker([lat, lon]).addTo(currentMap)

formData.lat = lat
formData.lng = lon

pulseRing("speaking", 1200)

setTimeout(() => {
wrapper.style.display = "none"
bot("Ubicación registrada.")
askDescription()
}, 1000)
},
(err) => {
geoBtn.innerHTML = "📍 Usar mi ubicación actual"
alert("No se ha podido acceder al GPS. Marca en el mapa.")
},
{ enableHighAccuracy: true, timeout: 8000 }
)
} else {
alert("Geolocalización no soportada.")
}
}

currentMap.on("click", e=>{
if(marker) currentMap.removeLayer(marker)

marker = L.marker(e.latlng).addTo(currentMap)

formData.lat = e.latlng.lat
formData.lng = e.latlng.lng

pulseRing("speaking", 1000)

setTimeout(() => {
wrapper.style.display = "none"
bot("Ubicación guardada.")
askDescription()
}, 800)
})

},300)

}

function askDescription(){

bot("Describe brevemente la situación.")

controls.innerHTML = ""

const row = document.createElement("div")
row.className = "flex flex-row w-full gap-2 items-center"

const input = document.createElement("input")

input.placeholder = "Escribe o usa voz"

input.className =
"input flex-1 min-w-0"

const mic = document.createElement("button")

mic.innerText = "🎤"

mic.className =
"option-btn flex-shrink-0"

mic.onclick = ()=>{

const r = new webkitSpeechRecognition()

r.lang = "es-ES"

r.start()
pulseRing("listening");

r.onresult = e=>{
input.value = e.results[0][0].transcript
pulseRing(false);
}

r.onerror = e=>{
pulseRing(false);
}

r.onend = e=>{
setTimeout(() => { if(ring.classList.contains("listening")) pulseRing(false); }, 1000);
}

}

const send = document.createElement("button")

send.innerText = "Enviar"

send.className =
"option-btn flex-shrink-0"

send.onclick = async ()=>{

if(!input.value) return

user(input.value)

formData.descripcion = input.value

saveData()

}

row.appendChild(input)
row.appendChild(mic)
row.appendChild(send)
controls.appendChild(row)
scrollToBottom()

}

async function saveData(){

try{

let ai = {
resumen:"",
acciones:[]
}

try{

const res = await fetch("/api/ai",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
description: formData.descripcion
})
})

ai = await res.json()

}catch(e){}

await supabaseClient
.from("incidencias")
.insert([{
tipo: formData.tipo,
area: formData.area,
valoracion: formData.valoracion,
descripcion: formData.descripcion,
lat: formData.lat,
lng: formData.lng,
resumen: ai.resumen || "",
acciones: ai.acciones || []
}])

pulseRing("speaking");

bot("Registro completado.")

controls.innerHTML = ""

const row = document.createElement("div")
row.className = "flex flex-row w-full gap-2"

const close = document.createElement("button")

close.className =
"option-btn flex-1"

close.innerText = "Cerrar"

close.onclick = () => {
pulseRing(false);
location.reload();
}

const panel = document.createElement("button")

panel.className =
"option-btn flex-1"

panel.innerText = "Ver datos"

/* NUEVO LINK DE VERCEL CORREGIDO */
panel.onclick = ()=>{

window.location.href =
"https://citizen-voice-xjcc-ie6myfj9h-joansimoesteve-cryptos-projects.vercel.app/citizen.html"

}

row.appendChild(close)
row.appendChild(panel)
controls.appendChild(row)
scrollToBottom()

}catch(err){

bot("Error al guardar.")

}

}

const startBtn = document.createElement("button")

startBtn.innerText = "Empezar"

startBtn.className =
"w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white py-2.5 rounded-2xl text-sm shadow-2xl flex-shrink-0"

startBtn.onclick = ()=>{

controls.innerHTML = ""

weeklyQuestion()

}

controls.appendChild(startBtn)
scrollToBottom()

</script>

</body>
</html>
