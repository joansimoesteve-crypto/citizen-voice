<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Citizen Voice</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-green-50 flex justify-center items-start min-h-screen p-2">

<div class="w-full max-w-md h-[85vh] bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden">

<!-- HEADER -->

<div class="bg-green-700 text-white p-4 text-center">

<div class="text-lg font-bold">
Citizen Voice
</div>

<div class="text-xs opacity-90">
Registra incidencias en 30 segundos con el asistente urbano
</div>

</div>

<!-- CHAT -->

<div id="chat" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

<!-- CONTROLES -->

<div id="controls" class="p-3 border-t flex flex-wrap gap-2"></div>

</div>

<script>

const chat=document.getElementById("chat")
const controls=document.getElementById("controls")

let data={}

/* VOZ BOT */

function speak(text){

const msg=new SpeechSynthesisUtterance(text)
msg.lang="es-ES"
speechSynthesis.speak(msg)

}

/* MENSAJE BOT */

function bot(text){

const row=document.createElement("div")
row.className="flex items-start gap-2 max-w-[85%]"

const avatar=document.createElement("div")
avatar.className="w-8 h-8 bg-green-600 rounded-full"

const bubble=document.createElement("div")
bubble.className="bg-green-100 p-3 rounded-xl text-sm"
bubble.innerText=text

row.appendChild(avatar)
row.appendChild(bubble)

chat.appendChild(row)

chat.scrollTop=chat.scrollHeight

speak(text)

}

/* MENSAJE USUARIO */

function user(text){

const d=document.createElement("div")

d.className="bg-green-600 text-white p-3 rounded-xl max-w-[75%] ml-auto text-sm"

d.innerText=text

chat.appendChild(d)

chat.scrollTop=chat.scrollHeight

}

/* BOTONES */

function buttons(list,callback){

controls.innerHTML=""

list.forEach(o=>{

const b=document.createElement("button")

b.className="bg-green-100 hover:bg-green-200 px-3 py-2 rounded-lg text-sm"

b.innerText=o

b.onclick=()=>{

controls.innerHTML=""

user(o)

callback(o)

}

controls.appendChild(b)

})

}

/* INICIO */

function start(){

bot("Hola. Soy el asistente urbano. ¿Qué deseas registrar?")

buttons(["Incidencia","Propuesta de mejora"],v=>{

data.tipo=v

askArea()

})

}

/* AREA */

function askArea(){

bot("¿En qué área?")

buttons(
["Limpieza","Movilidad","Seguridad","Espacio público"],
v=>{

data.area=v

askRate()

})

}

/* VALORACION */

function askRate(){

bot("¿Cómo valoras actualmente esta área del 1 al 5?")

buttons(["1","2","3","4","5"],v=>{

data.valoracion=v

askLocation()

})

}

/* UBICACION */

function askLocation(){

bot("Puedes enviar tu ubicación para localizar la incidencia")

controls.innerHTML=""

const b=document.createElement("button")

b.innerText="📍 Enviar ubicación"

b.className="bg-green-600 text-white px-3 py-2 rounded-lg"

b.onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

data.lat=pos.coords.latitude
data.lng=pos.coords.longitude

user("Ubicación enviada")

showMap()

})

}

controls.appendChild(b)

}

/* MAPA */

function showMap(){

bot("Ubicación registrada")

const mapDiv=document.createElement("div")

mapDiv.style.height="200px"
mapDiv.id="map"

chat.appendChild(mapDiv)

const map=L.map('map').setView([data.lat,data.lng],16)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

L.marker([data.lat,data.lng]).addTo(map)

askDescription()

}

/* DESCRIPCION */

function askDescription(){

bot("Describe brevemente la incidencia o propuesta")

controls.innerHTML=""

const input=document.createElement("input")

input.placeholder="Escribe o usa el micrófono"

input.className="border rounded-lg p-2 flex-1 text-sm"

const mic=document.createElement("button")
mic.innerText="🎤"
mic.className="bg-gray-100 px-3 py-2 rounded-lg"

mic.onclick=()=>{

const r=new webkitSpeechRecognition()

r.lang="es-ES"

r.start()

r.onresult=e=>{

input.value=e.results[0][0].transcript

}

}

const send=document.createElement("button")

send.innerText="Enviar"

send.className="bg-green-600 text-white px-3 py-2 rounded-lg text-sm"

send.onclick=()=>{

user(input.value)

data.descripcion=input.value

controls.innerHTML=""

finish()

}

controls.appendChild(input)
controls.appendChild(mic)
controls.appendChild(send)

}

/* FINAL */

function finish(){

bot("Gracias. Tu aportación ayuda a mejorar la ciudad.")

console.log(data)

}

/* BOTON EMPEZAR */

controls.innerHTML=""

const startBtn=document.createElement("button")

startBtn.innerText="Empezar"

startBtn.className="bg-green-600 text-white px-4 py-2 rounded-lg"

startBtn.onclick=()=>{

controls.innerHTML=""

start()

}

controls.appendChild(startBtn)

</script>

</body>
</html>
