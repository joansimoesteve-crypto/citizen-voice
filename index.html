<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CitizenVoice</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
margin:0;
}

.container{
width:100%;
max-width:520px;
}

.title{
font-size:46px;
font-weight:bold;
text-align:center;
color:#2e7d32;
}

.subtitle{
text-align:center;
margin-bottom:15px;
color:#666;
}

.chat{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
max-height:70vh;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.bubble{
background:#f1f1f1;
padding:14px;
border-radius:12px;
margin:4px 0;
max-width:85%;
}

.user{
background:#2e7d32;
color:white;
padding:12px;
border-radius:12px;
margin:4px 0;
align-self:flex-end;
max-width:85%;
font-size:13px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:16px;
}

textarea,input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-top:5px;
}

.controls{
display:flex;
gap:6px;
}

</style>

<!-- GOOGLE MAPS AUTOCOMPLETE -->
<script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&libraries=places"></script>

</head>

<body>

<div class="container">

<div class="title">CitizenVoice</div>
<div class="subtitle">Tu opinión en 30 segundos</div>

<div id="chat" class="chat"></div>

<button id="startBtn" onclick="startSurvey()">Empezar encuesta</button>

</div>

<script>

let step=0
let data={}

const chat=document.getElementById("chat")

function speak(text){

let msg=new SpeechSynthesisUtterance(text)

msg.lang="es-ES"

speechSynthesis.cancel()

speechSynthesis.speak(msg)

}

function addBot(text){

let div=document.createElement("div")

div.className="bubble"

div.innerText=text

chat.appendChild(div)

speak(text)

chat.scrollTop=chat.scrollHeight

}

function addUser(text){

let div=document.createElement("div")

div.className="user"

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function startSurvey(){

document.getElementById("startBtn").remove()

step=1

next()

}

function next(){

if(step==1){

addBot("¿Sobre qué área quieres opinar?")

createButtons([
"Movilidad",
"Limpieza",
"Urbanismo",
"Cultura",
"Seguridad",
"Tramitación",
"Otros"
],selectArea)

}

if(step==2){

addBot("¿Es una incidencia o una propuesta?")

createButtons([
"Incidencia",
"Propuesta"
],selectType)

}

if(step==3){

addBot("Describe la incidencia o propuesta")

let div=document.createElement("div")

div.innerHTML=`

<textarea id="desc"></textarea>

<div class="controls">
<button onclick="startVoice()">🎤</button>
<button onclick="sendDesc()">Enviar</button>
</div>
`

chat.appendChild(div)

}

if(step==4){

addBot("Indica la calle o lugar")

let div=document.createElement("div")

div.innerHTML=`

<input id="loc" placeholder="Empieza a escribir calle">

<div class="controls">
<button onclick="sendLocation()">Enviar</button>
<button onclick="useGPS()">📍 GPS</button>
</div>

`

chat.appendChild(div)

let input=document.getElementById("loc")

new google.maps.places.Autocomplete(input,{
types:['geocode'],
componentRestrictions:{country:'es'}
})

}

if(step==5){

addBot("Valora el servicio")

createButtons(["1","2","3","4","5"],rate)

}

if(step==6){

addBot("Gracias. Tu opinión ha sido registrada.")

console.log(data)

}

}

function createButtons(arr,callback){

arr.forEach(v=>{

let b=document.createElement("button")

b.innerText=v

b.onclick=()=>{

addUser(v)

callback(v)

}

chat.appendChild(b)

})

}

function selectArea(v){

data.area=v

step=2

next()

}

function selectType(v){

data.tipo=v

step=3

next()

}

function sendDesc(){

let val=document.getElementById("desc").value

data.descripcion=val

addUser(val)

step=4

next()

}

function sendLocation(){

let val=document.getElementById("loc").value

data.ubicacion=val

addUser(val)

step=5

next()

}

function rate(v){

data.valoracion=v

addUser("Valoración "+v)

step=6

next()

}

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Tu navegador no soporta voz")
return
}

let rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=function(e){
document.getElementById("desc").value=e.results[0][0].transcript
}

rec.start()

}

function useGPS(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let coords="Lat "+pos.coords.latitude.toFixed(5)+", Lng "+pos.coords.longitude.toFixed(5)

document.getElementById("loc").value=coords

})

}

}

</script>

</body>
</html>
