body{
background:
linear-gradient(
180deg,
#02120d 0%,
#06281f 45%,
#03140f 100%

overflow:hidden;
font-family:sans-serif;
height: 100dvh;
}

/* HERO - Más compacto para garantizar espacio de botones en móvil */
.hero{
position:relative;
height:140px;
overflow:hidden;
background:
radial-gradient(circle at top,#1dd1a1 0%,#065f46 45%,#02120d 100%);
}

.glow{
position:absolute;
width:260px;
height:260px;
background:rgba(16,185,129,.35);
filter:blur(70px);
border-radius:9999px;
top:-60px;
left:50%;
transform:translateX(-50%);
}

.avatar-wrapper{
position:absolute;
left:50%;
top:40%;
transform:translate(-50%,-50%);
z-index:10;
}

.avatar-ring{
position:absolute;
inset:-10px;
border-radius:9999px;
border:2px solid rgba(255,255,255,.15);
animation:pulse 3s infinite;
}

.avatar{
width:85px;
height:85px;
border-radius:9999px;
overflow:hidden;
border:4px solid rgba(255,255,255,.15);
box-shadow:0 25px 60px rgba(0,0,0,.45);
position:relative;
z-index:2;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.status{
position:absolute;
bottom:4px;
right:4px;
width:16px;
height:16px;
background:#22c55e;
border:3px solid white;
border-radius:9999px;
z-index:20;
}

/* CHAT */

#chat{
scroll-behavior:smooth;
}

#chat::-webkit-scrollbar{
width:4px;
}

#chat::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:20px;
}

/* BURBUJAS */

.bot-row{
display:flex;
gap:10px;
align-items:flex-end;
animation:fade .25s ease;
}

.bot-mini{
width:36px;
height:36px;
border-radius:9999px;
overflow:hidden;
flex-shrink:0;
border:2px solid rgba(255,255,255,.15);
}

.bot-mini img{
width:100%;
height:100%;
object-fit:cover;
}
